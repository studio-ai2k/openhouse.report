  const avatars = team.map(m => renderAvatar(m.initials, m.tone)).join("");
  const moreTag = more > 0 ? `<div class="avatar-more">+${more}</div>` : "";
  return `<div class="avatar-stack">${avatars}${moreTag}</div>`;
}

function renderSearch() {
  return `
    <div class="search">
      ${icon.search()}
      <input type="text" placeholder="Rechercher..." aria-label="Rechercher" />
    </div>
  `;
}

function renderTopbar() {
  return `
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="hamburger" data-action="open-sidebar" aria-label="Ouvrir le menu">${icon.menu()}</button>
        <h1 class="page-title">${routeTitles[state.route] || ""}</h1>
      </div>
      <div class="topbar-actions">
        <div class="topbar-actions-icons">
          <button class="icon-btn" data-action="add-lead" aria-label="Ajouter un prospect" title="Ajouter un prospect">${icon.plus()}</button>
          <button class="icon-btn" aria-label="Notifications">
            ${icon.bell()}
            ${state.notifications > 0 ? `<span class="notif-badge">${state.notifications}</span>` : ""}
          </button>
        </div>
        ${renderSearch()}
        ${renderUserMenu()}
      </div>
    </header>
  `;
}

/* ───── Leads content (Step 2 Layer 1) ─────
   Route "leads" renders the Leads page. Every primitive below is
   data-driven off state + the helpers defined earlier (stageLabel,
   stageColors, typeLabel, leadPrice, leadTimeline). */

/* Single source of truth for the filtered view. Returns the visible leads
   plus the counts used by the context chip, pipeline bar, and filter tabs.

   Counts discipline:
   - typeCounts    = raw totals per type, ignoring search. Powers the
                     context chip so "10 acquéreurs actifs / 3 vendeurs
                     actifs" reads the honest volume even mid-search.
   - stageCounts   = per-stage counts within current type + search. Powers
                     both the pipeline bar and the filter tabs. Counts stay
                     stable as the user clicks between tabs.
   - lostCount     = same scope as stageCounts but for the terminal "lost".
   - totalFiltered = type + search filtered total; shown in "Tous" tab. */
function computeLeadsView() {
  const type     = state.leadType;
  const pipeline = state.agency.pipeline[type] || [];
  const search   = state.leadsSearch.trim().toLowerCase();

  // Raw per-type totals (ignore search — context chip must read true volume).
  const typeCounts = {
    buyer:  state.leads.filter(l => l.type === "buyer").length,
    seller: state.leads.filter(l => l.type === "seller").length,
  };

  // Apply type + search to get the set all tab/pipeline counts are based on.
  const baseFiltered = state.leads.filter(l => {
    if (l.type !== type) return false;
    if (!search) return true;
    const hay = `${l.name} ${l.email} ${l.zone || ""}`.toLowerCase();
    return hay.includes(search);
  });

  // Count per stage id, plus terminal "lost".
  const stageCounts = {};
  pipeline.forEach(s => { stageCounts[s.id] = 0; });
  let lostCount = 0;
  baseFiltered.forEach(l => {
    if (l.status === "lost") lostCount++;
    else if (stageCounts[l.status] !== undefined) stageCounts[l.status]++;
  });

  // Apply filter tab on top of the base set.
  // Layer 2 note: "all" excludes lost — the Statut column is gone, so a
  // lost lead in the default view has no visual cue distinguishing it
  // from an active one. Lost leads become reachable again when the
  // Filter popover ships (it'll add a "Afficher les perdus" toggle that
  // sets filterTab to "lost"). The "lost" code path is kept alive here
  // so the popover can use it without refactor.
  const visible = baseFiltered.filter(l => {
    if (state.filterTab === "all")  return l.status !== "lost";
    if (state.filterTab === "lost") return l.status === "lost";
    return l.status === state.filterTab;
  });

  // Apply column sort. null = default order (by state.leads insertion = by id).
  // Sort happens LAST so filter + search don't depend on sort direction.
  if (state.leadsSort) {
    const cmp = leadComparator(state.leadsSort.column);
    const factor = state.leadsSort.direction === "asc" ? 1 : -1;
    visible.sort((a, b) => cmp(a, b) * factor);
  }

  return {
    visible,
    pipeline,
    type,
    search,
    counts: { stageCounts, lostCount, totalFiltered: baseFiltered.length, typeCounts },
  };
}

/* Compact segmented pill toggle. Active option's text + icon recolor via
   --type-accent (set on the .leads parent's mode-buyer / mode-seller class,
   so the whole surface re-palettes in one place when the toggle flips). */
function renderLeadsToggle() {
  const opt = (typeKey, iconKey, label) => {
    const active = state.leadType === typeKey;
    return `
      <button class="leads-toggle-tab"
              role="tab"
              aria-selected="${active}"
              data-action="set-lead-type"
              data-type="${typeKey}">
        ${icon[iconKey]()}
        <span>${label}</span>
      </button>
    `;
  };
  return `
    <div class="leads-toggle" role="tablist" aria-label="Type de lead">
      ${opt("buyer",  "home", "Acquéreurs")}
      ${opt("seller", "key",  "Vendeurs")}
    </div>
  `;
}

/* Context chip: shows raw active-type count in words. Lives next to the
   toggle so the type-aware signal reinforces the toggle rather than
   fighting it. Grammar handles singular/plural. */
function renderLeadsContextChip(typeKey, count) {
  const noun    = typeKey === "buyer" ? "acquéreur" : "vendeur";
  const plural  = count === 1 ? "" : "s";
  const adj     = count === 1 ? "actif" : "actifs";
  const iconKey = typeKey === "buyer" ? "home" : "key";
  return `
    <span class="leads-context-chip" aria-label="${count} ${noun}${plural} ${adj}">
      ${icon[iconKey]()}
      <span>${count} ${noun}${plural} ${adj}</span>
    </span>
  `;
}

/* In-page search. Distinct from topbar search (topbar is hidden on the
   Leads route via body[data-route="leads"] CSS — see §topbar-search
   suppression near the top of the stylesheet). Input events delegated. */
function renderLeadsSearch() {
  const value = state.leadsSearch.replace(/"/g, "&quot;");
  return `
    <div class="leads-search">
      ${icon.search()}
      <input type="text"
             placeholder="Rechercher par nom, email, zone…"
             aria-label="Rechercher dans les leads"
             value="${value}"
             data-action="filter-search"
             autocomplete="off" />
    </div>
  `;
}

/* Stage KPI cards (Step 2 Layer 2): one Prodex-style card per pipeline
   stage for the active type. Each card shows an icon badge (circular,
   stage-tinted), label, and count. Clicking a card filters the table to
   that stage; clicking the active card deselects (back to "all").
   This row replaces both the Layer 1 pipeline bar AND the filter tabs
   row — the KPI cards ARE the filter. Tous = no card selected (default).
   Perdu: terminal state, not in this row — will live inside the Filter
   button popover (see renderLeadsTable). */
function renderStageCards(pipeline, stageCounts, activeStage) {
  const stageIcons = {
    to_process:      "inbox",
    contacted:       "phone",
    qualified:       "target",
    visit_planned:   "calendar",
    offer_made:      "fileText",
    converted:       "trophy",
    estimation_sent: "fileText",
    appointment:     "calendar",
    mandate_signed:  "fileText",
    sold:            "trophy",
  };
  const cards = pipeline.map(stage => {
    const c = stageColors(stage.id);
    const n = stageCounts[stage.id] || 0;
    const active = activeStage === stage.id;
    const iconKey = stageIcons[stage.id] || "inbox";
    return `
      <button class="stage-card ${active ? "stage-card--active" : ""}"
              data-action="set-filter-tab"
              data-tab-id="${stage.id}"
              aria-pressed="${active}"
              style="--stage-bg:${c.bg};--stage-fg:${c.fg};--stage-deep:${c.deep};">
        <span class="stage-card-icon">${icon[iconKey]()}</span>
        <span class="stage-card-text">
          <span class="stage-card-label">${stage.label}</span>
          <span class="stage-card-count">${n}</span>
        </span>
      </button>
    `;
  }).join("");
  return `<div class="stage-cards" role="group" aria-label="Filtrer par étape du pipeline">${cards}</div>`;
}

/* Score chip: Chaud / Tiède / Froid with a colored dot. */
function renderScoreChip(score) {
  const map = {
    hot:  { label: "Chaud", mod: "hot"  },
    warm: { label: "Tiède", mod: "warm" },
    cold: { label: "Froid", mod: "cold" },
  };
  const m = map[score] || { label: score || "—", mod: "none" };
  return `<span class="score-chip score-chip--${m.mod}"><span class="score-chip-dot"></span>${m.label}</span>`;
}

/* Source icon: compact branded tile. Pure CSS + initial letter — we avoid
   shipping brand SVGs both for trademark hygiene and for a consistent
   visual weight across sources at 18px. */
function renderSourceIcon(source) {
  // Upgraded from text-char to SVG chip (v0.10). Used in drawer header;
  // future Filter popover + re-added table column will reuse this primitive.
  const map = {
    ig:     { title: "Instagram",    iconKey: "instagram" },
    fb:     { title: "Facebook",     iconKey: "facebook"  },
    web:    { title: "Site web",     iconKey: "globe"     },
    email:  { title: "Email",        iconKey: "mail"      },
    manual: { title: "Ajout manuel", iconKey: "userPlus"  },
  };
  const m = map[source] || { title: source || "Inconnu", iconKey: "help" };
  return `<span class="source-chip source-chip--${source}" title="${m.title}" aria-label="Source : ${m.title}">${icon[m.iconKey]()}</span>`;
}

/* Empty states. kind="no-sellers" when type=seller and no seller leads
   exist at all. kind="no-match" when filter + search returned nothing. */
function renderLeadsEmptyState(kind) {
  if (kind === "no-sellers") {
    return `
      <div class="leads-empty">
        <div class="leads-empty-title">Aucun vendeur pour l'instant</div>
        <div class="leads-empty-body">Les leads vendeurs arrivent via les formulaires Meta marqués « vendeur » ou par ajout manuel. Utilisez le bouton « + » en haut à droite pour saisir un vendeur.</div>
      </div>
    `;
  }
  return `
    <div class="leads-empty">
      <div class="leads-empty-title">Aucun résultat</div>
      <div class="leads-empty-body">Aucun lead ne correspond à ce filtre. Effacez la recherche, déselectionnez l'étape active, ou essayez un autre critère.</div>
    </div>
  `;
}

/* Single table row. Click anywhere on the row opens the drawer for that
   lead — uses the existing open-drawer action. Selected row carries
   data-selected for a subtle highlight. Agent column falls back to an
   em-dash when unassigned; same convention as the Layer 1 card. */
/* Sortable column header. `key` matches the leadComparator switch keys +
   the column width modifier class. Clickable. Displays a tri-state
   indicator: unsorted → muted double-chevron; active asc → arrow up;
   active desc → arrow down. Click cycles desc → asc → unsorted. */
function renderColumnHeader(key, label, colClass) {
  const sort = state.leadsSort;
  const isActive = sort && sort.column === key;
  let indicator;
  if (!isActive) {
    indicator = `<span class="leads-col-sort leads-col-sort--idle">${icon.chevronsUpDown()}</span>`;
  } else if (sort.direction === "desc") {
    indicator = `<span class="leads-col-sort leads-col-sort--active">${icon.arrowDown()}</span>`;
  } else {
    indicator = `<span class="leads-col-sort leads-col-sort--active">${icon.arrowUp()}</span>`;
  }
  return `
    <button class="leads-col ${colClass} leads-col-header"
            data-action="sort-column"
            data-column="${key}"
            aria-sort="${isActive ? sort.direction + "ending" : "none"}">
      <span>${label}</span>${indicator}
    </button>
  `;
}

/* Single table row. In default mode, click = open drawer. In select mode,
   click = toggle selection for that lead (drawer NOT opened). The mode
   branch happens in the click handler, not here — the row always carries
   data-lead-id + a dual-purpose data-action. */
function renderLeadRow(lead) {
  const selected     = state.drawer?.leadId === lead.id;
  const picked       = state.selectedLeadIds.includes(lead.id);
  const agent        = lead.assignedAgentId != null
    ? state.team.find(t => t.id === lead.assignedAgentId)
    : null;
  const agentCell    = agent
    ? `<span class="leads-row-agent" title="${agent.name}">${renderAvatar(agent.initials, agent.tone, 26)}</span>`
    : `<span class="leads-row-agent leads-row-agent--none" aria-label="Non assigné">—</span>`;
  const zone         = lead.zone || "—";
  const timeline     = leadTimeline(lead);
  const checkboxCell = state.selectionMode
    ? `<div class="leads-col leads-col--check"><span class="leads-checkbox ${picked ? "leads-checkbox--on" : ""}" aria-hidden="true">${picked ? icon.check() : ""}</span></div>`
    : "";
  return `
    <div class="leads-row${picked ? " leads-row--picked" : ""}"
         data-action="row-click"
         data-lead-id="${lead.id}"
         data-selected="${selected}"
         role="button" tabindex="0">
      ${checkboxCell}
      <div class="leads-col leads-col--nom">
        ${renderAvatar(lead.initials, lead.tone, 34)}
        <div class="leads-col-nom-text">
          <div class="leads-col-nom-name">${lead.name}</div>
          <div class="leads-col-nom-email">${lead.email}</div>
        </div>
      </div>
      <div class="leads-col leads-col--budget">${leadPrice(lead)}</div>
      <div class="leads-col leads-col--zone">${zone}${timeline ? ` · ${timeline}` : ""}</div>
      <div class="leads-col leads-col--score">${renderScoreChip(lead.score)}</div>
      <div class="leads-col leads-col--agent">${agentCell}</div>
      <div class="leads-col leads-col--date">${formatLeadDate(lead.createdAt)}</div>
    </div>
  `;
}

/* Bulk action bar: pinned to the bottom of the table card when at least
   one lead is selected. Slides in from below. Actions are stubs for now
   (popovers ship as a follow-up), but the selection semantics are live. */
function renderBulkActionBar() {
  const n = state.selectedLeadIds.length;
  if (n === 0) return "";
  const countText = `${n} sélectionné${n === 1 ? "" : "s"}`;
  return `
    <div class="leads-bulk-bar" role="region" aria-label="Actions groupées">
      <div class="leads-bulk-bar-count">
        <span class="leads-bulk-bar-dot" aria-hidden="true"></span>
        ${countText}
      </div>
      <div class="leads-bulk-bar-actions">
        <button class="leads-bulk-btn" data-action="bulk-assign">${icon.userCheck()}<span>Assigner</span></button>
        <button class="leads-bulk-btn" data-action="bulk-change-status">${icon.target()}<span>Changer le statut</span></button>
        <button class="leads-bulk-btn" data-action="bulk-archive">${icon.archive()}<span>Archiver</span></button>
        <button class="leads-bulk-btn leads-bulk-btn--danger" data-action="bulk-delete">${icon.trash()}<span>Supprimer</span></button>
      </div>
      <button class="leads-bulk-bar-clear" data-action="clear-selection" aria-label="Effacer la sélection">${icon.close()}</button>
    </div>
  `;
}

/* Leads table card: contained Prodex-style card. Header is now minimal —
   just the title "Liste des leads" (no icon, no meta line), search, and
   the two action buttons (Sélectionner / Annuler, then Filtrer). When in
   select mode, the leftmost column becomes a checkbox column — header
   gets a "select all visible" checkbox, rows get per-row checkboxes.
   When selection > 0, a bulk action bar renders at the bottom of the card. */
function renderLeadsTable(view) {
  const totalVisible     = view.visible.length;
  const visibleIds       = view.visible.map(l => l.id);
  const filterActive     = state.filterTab !== "all" && state.filterTab !== "lost";
  const filterBadge      = filterActive
    ? `<span class="leads-table-btn-badge">1</span>`
    : "";
  // "Select all visible" is on when every visible id is already picked.
  const allVisiblePicked = totalVisible > 0 && visibleIds.every(id => state.selectedLeadIds.includes(id));
  const selectBtnLabel   = state.selectionMode ? "Annuler" : "Sélectionner";
  const selectBtnClass   = state.selectionMode
    ? "leads-table-btn leads-table-btn--active"
    : "leads-table-btn";

  const checkHead = state.selectionMode
    ? `<div class="leads-col leads-col--check leads-col-header leads-col-header--check"
            data-action="toggle-select-all"
            role="columnheader"
            aria-label="Tout sélectionner">
        <span class="leads-checkbox ${allVisiblePicked ? "leads-checkbox--on" : ""}">${allVisiblePicked ? icon.check() : ""}</span>
      </div>`
    : "";

  const noSellers = view.type === "seller" && view.counts.typeCounts.seller === 0;
  const body = noSellers
    ? renderLeadsEmptyState("no-sellers")
    : totalVisible === 0
      ? renderLeadsEmptyState("no-match")
      : `
        <div class="leads-table-head${state.selectionMode ? " leads-table-head--selectable" : ""}" role="row">
          ${checkHead}
          ${renderColumnHeader("name",   "Nom",    "leads-col--nom")}
          ${renderColumnHeader("budget", "Budget", "leads-col--budget")}
          ${renderColumnHeader("zone",   "Zone",   "leads-col--zone")}
          ${renderColumnHeader("score",  "Score",  "leads-col--score")}
          ${renderColumnHeader("agent",  "Agent",  "leads-col--agent")}
          ${renderColumnHeader("date",   "Date",   "leads-col--date")}
        </div>
        <div class="leads-table-body${state.selectionMode ? " leads-table-body--selectable" : ""}" role="rowgroup">
          ${view.visible.map(renderLeadRow).join("")}
        </div>
      `;

  return `
    <div class="leads-table-card">
      <div class="leads-table-header">
        <div class="leads-table-header-title">
          <span class="leads-table-title">Liste des leads</span>
        </div>
        <div class="leads-table-header-actions">
          ${renderLeadsSearch()}
          <button class="${selectBtnClass}" data-action="toggle-select-mode">
            ${icon.check()}<span>${selectBtnLabel}</span>
          </button>
          <button class="leads-table-btn" data-action="open-filter-panel" aria-label="Filtrer">
            ${icon.filter()}<span>Filtrer</span>${filterBadge}
          </button>
        </div>
      </div>
      ${body}
      ${renderBulkActionBar()}
    </div>
  `;
}

/* Leads page composition. Wrapped in a .leads root that carries a
   mode-buyer or mode-seller class — every type-accent CSS rule reads
   from custom properties set by that class, so the whole surface
   re-palettes in one place when the user flips the toggle. */
function renderLeadsContent() {
  const view      = computeLeadsView();
  const modeClass = `mode-${state.leadType}`;
  const typeCount = view.counts.typeCounts[state.leadType];
  return `
    <div class="leads ${modeClass}">
      <div class="leads-topedge" aria-hidden="true"></div>
      <div class="leads-toggle-row">
        ${renderLeadsToggle()}
        ${renderLeadsContextChip(state.leadType, typeCount)}
        <span class="leads-updated-meta">Mis à jour il y a 2 min</span>
      </div>
      ${renderStageCards(view.pipeline, view.counts.stageCounts, state.filterTab)}
      ${renderLeadsTable(view)}
    </div>
  `;
}

function renderContent() {
  return `
    <main class="content">
      ${renderRouteContent()}
    </main>
  `;
}

function renderRouteContent() {
  if (state.route === "leads") return renderLeadsContent();
  return renderRouteComingSoon();
}

function renderRouteComingSoon() {
  const labels = {
    dashboard: "Tableau de bord",
    agents:    "Agents",
    campaigns: "Campagnes",
    database:  "Database",
    settings:  "Paramètres",
    help:      "Aide",
  };
  const title = labels[state.route] || state.route;
  return `
    <div class="empty-state">
      <div class="empty-state-left">
        <div class="empty-state-title">${title}</div>
        <div class="empty-state-body">Page à construire. Cette section sera implémentée après l'étape 2 (Leads) et l'étape 3 (tiroir).</div>
      </div>
      <div class="empty-state-chip">v0.9.0</div>
    </div>
  `;
}

function isMobile() {
  // Matches the breakpoint used in the @media query at the bottom of <style>.
  return window.matchMedia("(max-width: 768px)").matches;
}

function renderDrawer() {
  // Mounted conditionally — only renders the DOM when state.drawer is set.
  // Sliding animation handled by the data-open attribute on the container.
  // Opened from the Leads page by clicking a lead card (data-action="open-drawer").
  if (!state.drawer) return "";
  const lead = state.leads.find(l => l.id === state.drawer.leadId);
  if (!lead) return "";
  const activeTab = state.drawer.tab;
  const tabs = [
    { id: "infos",         label: "Infos" },
    { id: "qualification", label: "Qualification" },
    { id: "activite",      label: "Activité" },
    { id: "notes",         label: "Notes" },
  ];
  const statusC = stageColors(lead.status);
  return `
    <aside class="drawer" data-open="true" role="dialog" aria-label="Détails du prospect">
      <div class="drawer-header">
        <div class="drawer-header-text">
          <div class="drawer-name">
            ${lead.name}
            <span class="drawer-badge" style="background:${statusC.bg};color:${statusC.fg};">${stageLabel(lead.type, lead.status)}</span>
          </div>
          <div class="drawer-meta">${leadPrice(lead)} · ${lead.zone} · ${typeLabel(lead.type)} · ${leadTimeline(lead)}</div>
          <div class="drawer-header-extras">
            ${renderSourceIcon(lead.source)}
          </div>
        </div>
        <button class="icon-btn drawer-close" data-action="close-drawer" aria-label="Fermer">
          ${isMobile() ? icon.arrowLeft() : icon.close()}
        </button>
      </div>
      <div class="drawer-tabs" role="tablist">
        ${tabs.map(t => `
          <button class="drawer-tab"
                  role="tab"
                  aria-selected="${t.id === activeTab}"
                  data-action="switch-drawer-tab"
                  data-tab="${t.id}">${t.label}</button>
        `).join("")}
      </div>
      <div class="drawer-body" role="tabpanel">
        <div class="drawer-placeholder">
          <strong>Onglet « ${tabs.find(t => t.id === activeTab).label} »</strong>
          Contenu à venir — onglet construit à l'étape 3. Pour l'instant la structure, les transitions et les boundaries du tiroir sont opérationnelles.
        </div>
      </div>
      <div class="drawer-footer">
        ${renderButton({ icon: icon.phone(),         label: "Appeler" })}
        ${renderButton({ icon: icon.messageCircle(), label: "WhatsApp" })}
        ${renderButton({ icon: icon.send(),          label: "Template", variant: "primary" })}
      </div>
    </aside>
  `;
}

/* ───── Root render ───── */
function renderApp() {
  return `
    <div class="app-shell">
      ${renderSidebar()}
      <div class="main">
        ${renderTopbar()}
        ${renderContent()}
      </div>
    </div>
    <div class="mobile-overlay" data-visible="${state.sidebarOpen}"></div>
    ${renderDrawer()}
  `;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER + EVENT DELEGATION
   One render function. One event listener. All interactions route
   through data-action / data-route attributes.
   ═══════════════════════════════════════════════════════════════ */
function render() {
  document.getElementById("app").innerHTML = renderApp();
  // Reflect drawer state on body so mobile CSS can lock scroll.
  document.body.setAttribute("data-drawer-open", state.drawer ? "true" : "false");
  // Reflect active route on body. Used by route-scoped CSS (e.g. topbar
  // search suppression on Leads routes). Kept inside render() so state and
  // DOM stay in sync — same pragmatic pattern as the drawer attr above.
  document.body.setAttribute("data-route", state.route);
  // Sync browser tab title with current route.
  document.title = `${routeTitles[state.route] || "Open House"} · Open House Prospects`;
}

document.addEventListener("click", (e) => {
  // Outside-click closes the agency switcher
  if (state.agencySwitcherOpen && !e.target.closest(".agency-switcher-wrap")) {
    setState({ agencySwitcherOpen: false });
    // fall through so other handlers can still react
  }

  // Outside-click closes the user menu
  if (state.userMenuOpen && !e.target.closest(".user-menu-wrap")) {
    setState({ userMenuOpen: false });
  }

  const target = e.target.closest("[data-action], [data-route]");
  if (!target) return;

  // Nav
  const route = target.getAttribute("data-route");
  if (route) {
    setState({
      route,
      sidebarOpen: false,
      agencySwitcherOpen: false,
      userMenuOpen: false,
    });
    return;
  }

  // Actions
  const action = target.getAttribute("data-action");
  switch (action) {
    case "toggle-darkmode":
      setState({ darkMode: !state.darkMode });
      break;
    case "open-sidebar":
      setState({ sidebarOpen: true });
      break;
    case "toggle-agency-switcher":
      setState({ agencySwitcherOpen: !state.agencySwitcherOpen, userMenuOpen: false });
      break;
    case "toggle-user-menu":
      setState({ userMenuOpen: !state.userMenuOpen, agencySwitcherOpen: false });
      break;
    case "select-city": {
      const cityId = Number(target.getAttribute("data-city-id"));
      setState({
        agency: { ...state.agency, currentCityId: cityId },
        agencySwitcherOpen: false,
      });
      break;
    }
    case "go-profile":
    case "go-preferences":
    case "go-help":
      // Stubs — will route to the right page when those pages exist
      setState({ userMenuOpen: false });
      break;
    case "logout":
      // Stub — real logout posts to /api/auth/logout on the Express backend later
      setState({ userMenuOpen: false });
      break;
    case "add-lead":
      // Stub — opens the "Ajouter un prospect" modal. Form built after Step 2.
      alert("Ajouter un prospect — à venir. Construit après l'étape 2.");
      break;
    case "row-click": {
      const leadId = Number(target.getAttribute("data-lead-id"));
      // In select mode, row click toggles lead selection. Out of select mode,
      // row click opens (or toggles) the drawer. One click target, two modes.
      if (state.selectionMode) {
        const picked = state.selectedLeadIds.includes(leadId);
        const nextIds = picked
          ? state.selectedLeadIds.filter(id => id !== leadId)
          : [...state.selectedLeadIds, leadId];
        setState({ selectedLeadIds: nextIds });
      } else {
        // Same-lead click closes; different-lead click swaps.
        if (state.drawer?.leadId === leadId) setState({ drawer: null });
        else                                 setState({ drawer: { leadId, tab: "infos" } });
      }
      break;
    }
    case "open-drawer": {
      // Legacy alias — kept so any older `data-action="open-drawer"` still works
      // (e.g. future drawer-sourced deep links). Identical to row-click out of
      // select mode. In select mode, never routes here (rows emit row-click).
      const leadId = Number(target.getAttribute("data-lead-id"));
      if (state.drawer?.leadId === leadId) setState({ drawer: null });
      else                                 setState({ drawer: { leadId, tab: "infos" } });
      break;
    }
    case "close-drawer":
      setState({ drawer: null });
      break;
    case "switch-drawer-tab": {
      const tab = target.getAttribute("data-tab");
      setState({ drawer: { ...state.drawer, tab } });
      break;
    }
    case "set-lead-type": {
      // Toggle Acquéreurs ↔ Vendeurs. Always reset filterTab to "all" — stage
      // ids aren't guaranteed to exist across types (e.g. "visit_planned" is
      // buyer-only), so carrying an active tab across a type flip risks an
      // active filter that matches nothing.
      const typeKey = target.getAttribute("data-type");
      if (typeKey === state.leadType) break;  // no-op if clicking the active tab
      setState({ leadType: typeKey, filterTab: "all" });
      break;
    }
    case "set-filter-tab": {
      const tabId = target.getAttribute("data-tab-id");
      // Clicking the already-active stage card deselects back to "all" —
      // Prodex-style toggle-filter behavior. Other code paths still treat
      // filterTab === "all" as "no stage filter active".
      if (tabId === state.filterTab) setState({ filterTab: "all" });
      else                           setState({ filterTab: tabId });
      break;
    }
    case "sort-column": {
      // Click cycle on a column header: desc → asc → no sort (back to default id order).
      // First click on any column is always desc because real-estate data is
      // "newest/biggest/hottest first" most of the time.
      const col = target.getAttribute("data-column");
      const curr = state.leadsSort;
      let next;
      if (!curr || curr.column !== col)           next = { column: col, direction: "desc" };
      else if (curr.direction === "desc")         next = { column: col, direction: "asc" };
      else                                         next = null;
      setState({ leadsSort: next });
      break;
    }
    case "toggle-select-mode": {
      // Entering: turn the checkbox column on. Leaving: also clear selection —
      // matches the mental model that "Annuler" means "cancel this operation".
      if (state.selectionMode) {
        setState({ selectionMode: false, selectedLeadIds: [] });
      } else {
        setState({ selectionMode: true });
      }
      break;
    }
    case "toggle-select-all": {
      // Acts on the CURRENTLY VISIBLE rows (the view returned by computeLeadsView).
      // If every visible lead is already picked, deselect them. Otherwise, add
      // any missing ones to the selection. Leads picked-but-hidden stay picked.
      const view = computeLeadsView();
      const visibleIds = view.visible.map(l => l.id);
      const allVisiblePicked = visibleIds.length > 0 && visibleIds.every(id => state.selectedLeadIds.includes(id));
      const nextIds = allVisiblePicked
        ? state.selectedLeadIds.filter(id => !visibleIds.includes(id))
        : [...new Set([...state.selectedLeadIds, ...visibleIds])];
      setState({ selectedLeadIds: nextIds });
      break;
    }
    case "clear-selection":
      // X on the bulk bar. Clears selection but stays in select mode —
      // user can continue picking. Full exit is via the Annuler button / ESC.
      setState({ selectedLeadIds: [] });
      break;
    case "bulk-assign":
    case "bulk-change-status":
    case "bulk-archive":
    case "bulk-delete": {
      // Stubs: popovers + confirms ship as a follow-up. Keep the selection
      // intact so the user can see what would have been acted on.
      const n = state.selectedLeadIds.length;
      const verb = {
        "bulk-assign":        "Assigner un agent à",
        "bulk-change-status": "Changer le statut de",
        "bulk-archive":       "Archiver",
        "bulk-delete":        "Supprimer",
      }[action];
      alert(`${verb} ${n} lead${n === 1 ? "" : "s"} — action à construire.`);
      break;
    }
    case "open-filter-panel": {
      // Stub: the Filter popover (multi-dimensional refinement — score,
      // source, agent, verified, date range, show-lost) ships as a
      // follow-up. The "1" badge on the button reflects the current active
      // stage filter from the KPI cards.
      alert("Filtres avancés — panneau à construire.");
      break;
    }
    case "filter-search":
      // Bubbled by input events via the delegated input listener below.
      // Mouse-clicking the input field also fires click; ignore here.
      break;
  }
});

// Close mobile sidebar on overlay click
document.addEventListener("click", (e) => {
  if (e.target.classList.contains("mobile-overlay")) {
    setState({ sidebarOpen: false });
  }
});

/* Delegated input listener for the Leads-page search. State drives render,
   so every keystroke re-renders the whole app — including the input. That
   would lose focus and cursor position mid-typing. We capture both before
   setState and restore them after it synchronously rebuilds the DOM. */
document.addEventListener("input", (e) => {
  const target = e.target.closest("[data-action='filter-search']");
  if (!target) return;
  const value     = target.value;
  const cursorPos = target.selectionStart ?? value.length;
  setState({ leadsSearch: value });
  const next = document.querySelector("[data-action='filter-search']");
  if (next) {
    next.focus();
    try { next.setSelectionRange(cursorPos, cursorPos); } catch (_) { /* no-op on unsupported inputs */ }
  }
});

/* ESC key closes open drawers and dropdowns.
   Priority: drawer > select mode > user menu > agency switcher > sidebar.
   Drawer wins first because it's the most "modal" surface visually. Select
   mode is second because it's a global state the user has actively entered. */
document.addEventListener("keydown", (e) => {
  if (e.key !== "Escape") return;
  if (state.drawer)              { setState({ drawer: null });             return; }
  if (state.selectionMode)       { setState({ selectionMode: false, selectedLeadIds: [] }); return; }
  if (state.userMenuOpen)        { setState({ userMenuOpen: false });      return; }
  if (state.agencySwitcherOpen)  { setState({ agencySwitcherOpen: false });return; }
  if (state.sidebarOpen)         { setState({ sidebarOpen: false });       return; }
});

/* Scroll-aware topbar: add a subtle bottom border once content scrolls under it */
let scrolledState = false;
window.addEventListener("scroll", () => {
  const scrolled = window.scrollY > 4;
  if (scrolled !== scrolledState) {
    scrolledState = scrolled;
    const topbar = document.querySelector(".topbar");
    if (topbar) topbar.setAttribute("data-scrolled", scrolled ? "true" : "false");
  }
}, { passive: true });

/* Re-render across the mobile breakpoint so the drawer close button
   swaps between X (desktop) and back-arrow (mobile) on window resize. */
let wasMobile = isMobile();
window.addEventListener("resize", () => {
  const nowMobile = isMobile();
  if (nowMobile !== wasMobile) {
    wasMobile = nowMobile;
    if (state.drawer) render();
  }
}, { passive: true });

/* Initial render */
render();
</script>

</body>
</html>
