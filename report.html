<!doctype html>
<!--
  Open House Prospects — v0.9.0
  Step 2 Layer 2+ — Select mode + column sort shipped; table header stripped
  Reference: docs/DESIGN_SPEC.md + Prodex Top Products card
  Workflow: docs/DESIGN_PROTOCOL.md

  v0.9.0 is a polish + capability push on the Layer 2 table. Four user
  calls drove the changes:

    1. Drop the icon beside "Liste des leads" — the title is unambiguous,
       the icon was visual noise. Removed from renderLeadsTable + CSS.
    2. Drop the "Mis à jour il y a 2 min / N leads filtrés par…" sub-meta
       line. The stage card row up top already carries both signals
       (active-card highlight = what's filtered, updated-time = toggle row).
    3. Drop the Trier button. Column headers are now clickable and cycle
       desc → asc → no-sort. Double-chevron indicator when idle, single
       arrow when active. One column sortable at a time.
    4. Add a Sélectionner button for bulk actions. Click → enter select
       mode: leftmost checkbox column appears, header gets a "select all
       visible" checkbox, rows get per-row checkboxes. Row click toggles
       selection instead of opening drawer. When selectedLeadIds > 0, a
       bulk action bar pins to the bottom of the card with Assigner /
       Changer statut / Archiver / Supprimer buttons.

  Select mode semantics:
  - Selection PERSISTS across filter changes and type flip. "I picked
    these to act on" beats "these happen to be visible right now". The
    count on the bulk bar may exceed visible-row count — that's fine.
  - "Select all visible" only adds currently-visible rows to the pick
    set; existing off-screen picks stay picked.
  - Clicking the active Sélectionner button (now labelled Annuler) exits
    select mode AND clears the pick set.
  - The X on the bulk bar clears the pick set but STAYS in select mode.
  - ESC priority: drawer → select mode → user menu → agency switcher →
    sidebar.

  Bulk actions (Assigner, Changer statut, Archiver, Supprimer) are all
  stubbed with alerts. Popovers and confirms ship as a follow-up, but the
  mode + selection UX is live and real.

  Sort implementation:
  - state.leadsSort = null | { column, direction }.
  - leadComparator(column) returns a (a, b) => number comparator per column.
  - computeLeadsView applies sort LAST, after filter + search.
  - Numeric fields parse digits out of formatted strings (leadPriceNumeric).
  - Date is stored as ISO "2026-04-09" now (was "09 avr. 2026" in v0.8.0);
    formatLeadDate(iso) renders the French short form for display.
  - Score orders hot(3) > warm(2) > cold(1). Agent sorts by name with
    empty string for unassigned.

  State adds (v0.9.0):
  - leadsSort:       null | { column, direction }
  - selectionMode:   boolean
  - selectedLeadIds: number[]

  New click handlers: sort-column, toggle-select-mode, toggle-select-all,
  clear-selection, bulk-assign, bulk-change-status, bulk-archive, bulk-delete.
  The old open-drawer action is kept as a legacy alias; new rows emit
  row-click which checks selectionMode and dispatches accordingly.

  New icons: arrowUp, arrowDown, chevronsUpDown, trash, userCheck.

  Deleted from v0.8.0:
  - .leads-table-header-icon + .leads-table-meta CSS
  - renderLeadsTable's icon + meta-line JSX
  - The Trier button (data-action open-sort-panel deleted along with the
    stub handler — it was only wired to an alert).
  - Static column header labels (now rendered through renderColumnHeader).

  What v0.9.0 does NOT include (deferred):
  - Real popovers for Assigner / Changer statut / Filtrer (all stubs)
  - A confirmation modal for Supprimer
  - Indeterminate visual on the "select all" header checkbox when only
    some visible rows are picked (skipped for MVP — checked or unchecked)
  - Step 3 drawer bodies (Infos / Qualification / Activité / Notes)
-->
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Open House Prospects</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
  /* ═══════════════════════════════════════════════════════════════
     DESIGN TOKENS — single source of truth. Every color, radius,
     shadow, font-size lives here. No magic numbers below this block.
     ═══════════════════════════════════════════════════════════════ */
  :root {
    /* Neutrals — cool palette (locked) */
    --frame:          #F5F5F7;
    --sidebar-bg:     #FAFAFB;
    --panel:          #FFFFFF;
    --surface-tint:   #F4F4F6;  /* general tint surface */
    --hover-warm:     #EFEFF2;  /* nav hover (name retained from warm era — it's just "hover") */
    --active-warm:    #E7E7EC;  /* nav active */
    --row-hover:      #FAFAFB;

    --border-subtle:  #ECECEF;
    --border-divider: #E6E6EA;
    --border-strong:  #D8D8DE;  /* NEW — visible borders (icon buttons, user menu, search) */

    --text-primary:   #1C1C1F;
    --text-body:      #3D3A35;
    --text-secondary: #6E6B64;
    --text-muted:     #9B9892;

    /* Accents */
    --accent-blue:    #5B6DFF;
    --accent-green:   #4CC38A;
    --accent-red:     #FF6B6B;
    --accent-amber:   #F5B94C;

    /* Accent-soft (badge tints) */
    --blue-soft:   #E8ECFF;
    --green-soft:  #E4F4E9;
    --red-soft:    #FDE7E7;
    --amber-soft:  #FBF0DC;
    --violet-soft: #EDE7FF;  /* for "En cours" status pill */

    /* Radius */
    --r-xs: 6px;
    --r-sm: 10px;
    --r-md: 14px;
    --r-lg: 16px;
    --r-xl: 20px;
    --r-pill: 999px;

    /* Shadow */
    --shadow-none:   none;
    --shadow-xs:     0 1px 2px rgba(0,0,0,0.02);
    --shadow-sm:     0 2px 8px rgba(0,0,0,0.03);
    --shadow-md:     0 8px 24px rgba(0,0,0,0.04);
    --shadow-shell:  0 8px 32px rgba(0,0,0,0.04);
    --shadow-drawer: -12px 0 40px rgba(0,0,0,0.08);

    /* Type */
    --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;

    /* Layout */
    --sidebar-w: 260px;
    --header-h: 88px;
    --shell-pad: 24px;
  }

  /* Cool palette is now the default — warm A/B toggle removed at design lock */

  /* ═══════════════════════════════════════════════════════════════
     BASE
     ═══════════════════════════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-sans);
    background: var(--frame);
    color: var(--text-body);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  input, select { font: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border-divider); border-radius: var(--r-pill); }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ═══════════════════════════════════════════════════════════════
     APP SHELL
     ═══════════════════════════════════════════════════════════════ */
  .app-shell {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    min-height: 100vh;
    background: var(--frame);
  }

  /* ───────── Sidebar ───────── */
  .sidebar {
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border-divider);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 8px;
    margin-bottom: 16px;
  }
  .brand-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, #5B6DFF 0%, #9B7CFF 100%);
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 3px;
    padding: 6px;
  }
  .brand-mark span {
    background: rgba(255,255,255,0.9);
    border-radius: 2px;
  }
  .brand-mark span:nth-child(2) { background: rgba(255,255,255,0.6); }
  .brand-mark span:nth-child(3) { background: rgba(255,255,255,0.7); }
  .brand-mark span:nth-child(4) { background: rgba(255,255,255,0.95); }

  .brand-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.2px;
  }

  /* Agency + city switcher */
  .agency-switcher {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    cursor: pointer;
    margin-bottom: 20px;
    transition: border-color 120ms ease, background 120ms ease;
  }
  .agency-switcher:hover { background: var(--hover-warm); }
  .agency-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #1C1C1F;
    color: #fff;
    display: grid;
    place-items: center;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: -0.2px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .agency-avatar[data-variant="logo"] {
    background: #FFFFFF;
    border: 1px solid var(--border-strong);
    padding: 4px;
  }
  .agency-avatar img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .agency-text {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    line-height: 1.2;
  }
  .agency-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .agency-city {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .agency-city svg {
    width: 11px;
    height: 11px;
    display: inline-block;
    vertical-align: -1px;
    margin-right: 3px;
    stroke-width: 2;
    color: var(--text-muted);
  }
  .agency-switcher > svg { color: var(--text-muted); flex-shrink: 0; transition: transform 160ms ease; }
  .agency-switcher[aria-expanded="true"] > svg { transform: rotate(180deg); }

  .agency-switcher-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  .agency-switcher-wrap .agency-switcher { margin-bottom: 0; }

  .agency-menu {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    box-shadow: var(--shadow-md);
    padding: 6px;
    z-index: 40;
  }
  .agency-menu-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 6px 10px 4px;
  }
  .agency-menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: var(--r-xs);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-body);
    cursor: pointer;
    transition: background 100ms ease;
  }
  .agency-menu-item svg {
    width: 14px;
    height: 14px;
    color: var(--text-muted);
    flex-shrink: 0;
    stroke-width: 2;
  }
  .agency-menu-item span {
    flex: 1;
  }
  .agency-menu-item:hover { background: var(--hover-warm); }
  .agency-menu-item[data-active="true"] {
    color: var(--text-primary);
    font-weight: 600;
  }
  .agency-menu-item[data-active="true"] svg:last-child {
    color: var(--accent-blue);
  }

  /* Section label */
  .nav-section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: 0.8px;
    padding: 0 10px;
    margin: 0 0 8px;
    text-transform: uppercase;
  }
  .nav-group + .nav-group { margin-top: 20px; }

  /* Nav items */
  .nav-list { list-style: none; padding: 0; margin: 0; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 40px;
    padding: 0 10px;
    border-radius: var(--r-sm);
    color: var(--text-body);
    cursor: pointer;
    transition: background 120ms ease;
    position: relative;
  }
  .nav-item svg {
    width: 16px;
    height: 16px;
    color: var(--text-secondary);
    flex-shrink: 0;
    stroke-width: 1.5;
  }
  .nav-item-label {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
  }
  .nav-item-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    background: var(--panel);
    padding: 2px 7px;
    border-radius: var(--r-pill);
    border: 1px solid var(--border-subtle);
  }
  .nav-item:hover { background: var(--hover-warm); }
  .nav-item[data-active="true"] {
    background: var(--active-warm);
  }
  .nav-item[data-active="true"] .nav-item-label { font-weight: 600; color: var(--text-primary); }
  .nav-item[data-active="true"] svg { color: var(--text-primary); }

  /* Sidebar footer */
  .sidebar-spacer { flex: 1; }

  .sidebar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 10px;
    height: 40px;
    color: var(--text-secondary);
    font-size: 14px;
  }
  .sidebar-row svg { width: 16px; height: 16px; stroke-width: 1.5; }
  .sidebar-row-label { flex: 1; }

  /* Toggle switch */
  .switch {
    position: relative;
    width: 32px;
    height: 18px;
    border-radius: var(--r-pill);
    background: var(--border-divider);
    cursor: pointer;
    transition: background 140ms ease;
  }
  .switch::after {
    content: "";
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
    box-shadow: var(--shadow-xs);
    transition: transform 160ms cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .switch[data-on="true"] { background: var(--text-primary); }
  .switch[data-on="true"]::after { transform: translateX(14px); }

  /* Help / info card at bottom */
  .sidebar-card {
    margin-top: 16px;
    padding: 16px;
    border-radius: var(--r-md);
    background: var(--blue-soft);
    border: 1px solid rgba(91, 109, 255, 0.12);
  }
  .sidebar-card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  .sidebar-card-body {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 12px;
    line-height: 1.4;
  }
  /* Sidebar feedback-card CTA.
     Intentionally NOT using .btn — this is tuned to the card's compact container.
     Generic buttons (drawer, forms, filters) use the .btn system. */
  .sidebar-card-cta {
    display: block;
    width: 100%;
    padding: 8px 12px;
    background: var(--text-primary);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    border-radius: var(--r-sm);
    text-align: center;
    transition: background 120ms ease;
  }
  .sidebar-card-cta:hover { background: #000; }

  /* ═══════════════════════════════════════════════════════════════
     MAIN CONTENT
     ═══════════════════════════════════════════════════════════════ */
  .main {
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  /* ───────── Top header ───────── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 30;
    height: var(--header-h);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    background: var(--frame);
    transition: box-shadow 180ms ease;
  }
  .topbar[data-scrolled="true"] {
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06), 0 8px 24px rgba(0, 0, 0, 0.04);
  }
  .page-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.4px;
    margin: 0;
  }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .topbar-actions-icons {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Avatar stack */
  .avatar-stack {
    display: flex;
    align-items: center;
  }
  .avatar-stack .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--frame);
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    display: grid;
    place-items: center;
    margin-left: -10px;
  }
  .avatar-stack .avatar:first-child { margin-left: 0; }
  .avatar-more {
    margin-left: -10px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--panel);
    border: 2px solid var(--frame);
    color: var(--text-secondary);
    font-size: 11px;
    font-weight: 600;
    display: grid;
    place-items: center;
    box-shadow: var(--shadow-xs);
  }

  /* Icon button */
  .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    color: var(--text-body);
    display: grid;
    place-items: center;
    position: relative;
    box-shadow: var(--shadow-xs);
    transition: all 120ms ease;
  }
  .icon-btn:hover {
    border-color: var(--text-muted);
    color: var(--text-primary);
    box-shadow: var(--shadow-sm);
  }
  .icon-btn svg { width: 18px; height: 18px; stroke-width: 2; }

  .notif-badge {
    position: absolute;
    top: -3px;
    right: -3px;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    border-radius: var(--r-pill);
    background: var(--accent-red);
    color: #fff;
    font-size: 9px;
    font-weight: 600;
    display: grid;
    place-items: center;
    border: 2px solid var(--frame);
    line-height: 1;
  }

  /* ═══════════════════════════════════════════════════════════════
     BUTTON SYSTEM (Option B — Bordered clean)
     Locked in Step 1. Every clickable text-action in the product
     uses these classes. Icon-only buttons use .icon-btn instead.
     ═══════════════════════════════════════════════════════════════ */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 9px 14px;
    font: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-body);
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    cursor: pointer;
    white-space: nowrap;
    box-shadow: var(--shadow-xs);
    transition: all 120ms ease;
  }
  .btn svg {
    width: 15px;
    height: 15px;
    stroke-width: 1.75;
    flex-shrink: 0;
  }
  .btn:hover {
    border-color: var(--text-muted);
    box-shadow: var(--shadow-sm);
  }
  .btn:active {
    transform: translateY(0.5px);
  }
  .btn:disabled,
  .btn[aria-disabled="true"] {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* Variants */
  .btn--primary {
    background: var(--text-primary);
    color: #fff;
    border-color: var(--text-primary);
    font-weight: 600;
  }
  .btn--primary:hover {
    background: #000;
    border-color: #000;
  }
  .btn--ghost {
    background: transparent;
    border-color: transparent;
    box-shadow: none;
  }
  .btn--ghost:hover {
    background: var(--surface-tint);
    border-color: transparent;
    box-shadow: none;
  }
  .btn--danger {
    border-color: #F5BDBD;
    color: #C63636;
  }
  .btn--danger:hover {
    background: #FDE7E7;
    border-color: #E89898;
  }

  /* Sizes */
  .btn--sm {
    padding: 6px 11px;
    font-size: 12px;
  }
  .btn--sm svg { width: 13px; height: 13px; }
  .btn--lg {
    padding: 12px 20px;
    font-size: 14px;
  }
  .btn--lg svg { width: 16px; height: 16px; }

  /* Full-width (for drawer footers, mobile actions, forms) */
  .btn--block { width: 100%; }

  /* Search */
  .search {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 320px;
    height: 40px;
    padding: 0 16px;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-pill);
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .search:focus-within {
    border-color: var(--text-secondary);
    box-shadow: 0 0 0 3px rgba(91, 109, 255, 0.08);
  }
  .search svg {
    width: 16px;
    height: 16px;
    color: var(--text-body);
    stroke-width: 2;
    flex-shrink: 0;
  }
  .search input {
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    font-size: 14px;
    color: var(--text-primary);
  }
  .search input::placeholder { color: var(--text-muted); }

  /* Topbar search suppression on the Leads route.
     The topbar search is reserved for future global search. On Leads, the
     page-level search IS the search — so the topbar one hides to avoid two
     competing affordances. Non-Leads routes keep it visible.
     Uses body[data-route] which is set in render(). Base rule, not media-query. */
  body[data-route="leads"] .topbar .search { display: none; }

  /* User menu */
  .user-menu-wrap {
    position: relative;
  }
  .user-menu {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px 4px 4px;
    border-radius: var(--r-pill);
    background: var(--panel);
    border: 1px solid var(--border-strong);
    box-shadow: var(--shadow-xs);
    transition: all 120ms ease;
  }
  .user-menu:hover {
    border-color: var(--text-muted);
    box-shadow: var(--shadow-sm);
  }
  .user-menu[aria-expanded="true"] {
    border-color: var(--text-muted);
    background: var(--surface-tint);
  }
  .user-menu .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    display: grid;
    place-items: center;
  }
  .user-menu svg {
    width: 14px;
    height: 14px;
    color: var(--text-secondary);
    transition: transform 160ms ease;
  }
  .user-menu[aria-expanded="true"] svg { transform: rotate(180deg); }

  /* User menu dropdown */
  .user-menu-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 260px;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-md);
    box-shadow: var(--shadow-md);
    padding: 6px;
    z-index: 40;
  }
  .user-menu-identity {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 10px 12px;
  }
  .user-menu-identity .avatar {
    flex-shrink: 0;
  }
  .user-menu-identity-text {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    line-height: 1.3;
  }
  .user-menu-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .user-menu-email {
    font-size: 12px;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .user-menu-role {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .user-menu-divider {
    height: 1px;
    background: var(--border-subtle);
    margin: 4px 2px;
  }
  .user-menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: var(--r-xs);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-body);
    cursor: pointer;
    transition: background 100ms ease;
  }
  .user-menu-item svg {
    width: 15px;
    height: 15px;
    color: var(--text-secondary);
    flex-shrink: 0;
    stroke-width: 1.7;
  }
  .user-menu-item:hover { background: var(--hover-warm); }
  .user-menu-item--danger {
    color: var(--accent-red);
  }
  .user-menu-item--danger svg {
    color: var(--accent-red);
  }
  .user-menu-item--danger:hover {
    background: var(--red-soft);
  }

  /* ───────── Content area ───────── */
  .content {
    flex: 1;
    padding: 0 32px 32px;
    min-height: 0;
  }

  /* Step-1 empty state (will be removed in Step 2) */
  .empty-state {
    margin-top: 4px;
    padding: 24px 28px;
    border: 1px dashed var(--border-divider);
    border-radius: var(--r-md);
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .empty-state-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .empty-state-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
  }
  .empty-state-body {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .empty-state code {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 1px 5px;
    background: var(--surface-tint);
    border-radius: var(--r-xs);
    color: var(--text-body);
  }
  .empty-state-chip {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 4px 10px;
    background: var(--surface-tint);
    border-radius: var(--r-pill);
    white-space: nowrap;
  }

  /* ═══════════════════════════════════════════════════════════════
     RESPONSIVE rules live at the bottom of the stylesheet so they
     override all base rules regardless of base-rule source order.
     See end of this <style> block.
     ═══════════════════════════════════════════════════════════════ */

  .hamburger {
    display: none;
    width: 36px;
    height: 36px;
    border-radius: var(--r-sm);
    place-items: center;
    color: var(--text-secondary);
  }
  .hamburger:hover { background: var(--surface-tint); color: var(--text-primary); }
  .hamburger svg { width: 20px; height: 20px; stroke-width: 1.5; }

  .mobile-overlay {
    position: fixed;
    inset: 0;
    background: rgba(28,28,31,0.3);
    backdrop-filter: blur(4px);
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease;
  }
  .mobile-overlay[data-visible="true"] {
    opacity: 1;
    pointer-events: auto;
  }

  /* ═══════════════════════════════════════════════════════════════
     DRAWER (lead detail panel)
     Desktop: below-topbar, respects-sidebar, 480px, no backdrop.
     Mobile:  full-screen takeover with back arrow.
     Structure per DESIGN_SPEC.md §17 drawer-boundaries decision.
     Contents are placeholder — real form lives in Step 3.
     ═══════════════════════════════════════════════════════════════ */
  .drawer {
    position: fixed;
    top: var(--header-h);
    right: 0;
    bottom: 0;
    width: 480px;
    background: var(--panel);
    border-left: 1px solid var(--border-divider);
    box-shadow: -16px 0 48px rgba(0, 0, 0, 0.08);
    display: flex;
    flex-direction: column;
    z-index: 20;
    transform: translateX(100%);
    transition: transform 280ms cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .drawer[data-open="true"] {
    transform: translateX(0);
  }

  .drawer-header {
    padding: 20px 24px 40px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  /* Close button on desktop uses the same .icon-btn style as the topbar + and bell.
     Positioned by DOM order — it comes AFTER the header-text in the flex row,
     so it sits on the right. On mobile it's overridden to be a top-left back arrow. */
  .drawer-close {
    flex-shrink: 0;
    order: 2;         /* force to the right end of the flex row on desktop */
  }
  .drawer-header-text {
    flex: 1;
    min-width: 0;
    order: 1;
  }
  .drawer-name {
    font-size: 19px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .drawer-badge {
    display: inline-block;
    padding: 2px 8px;
    background: #E4F4E9;
    color: #2F9D6F;
    font-size: 11px;
    font-weight: 600;
    border-radius: var(--r-pill);
  }
  .drawer-meta {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* Source chip — lead origin indicator in the drawer header.
     Small circular badge containing a 14px stroke icon. Monochrome
     on all sources to stay consistent with the app's Lucide-style
     icon set (see icon.instagram / facebook / globe / mail / userPlus). */
  .drawer-header-extras {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }
  .source-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--surface-tint, #F5F5F7);
    color: var(--text-secondary);
    border: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }
  .source-chip svg {
    width: 14px;
    height: 14px;
    stroke-width: 1.75;
  }

  .drawer-tabs {
    display: flex;
    padding: 0 24px;
    border-bottom: 1px solid var(--border-subtle);
    gap: 24px;
  }
  .drawer-tab {
    padding: 12px 0;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    border-bottom: 2px solid transparent;
    cursor: pointer;
    background: transparent;
    border-top: 0;
    border-left: 0;
    border-right: 0;
    font-family: inherit;
    transition: color 120ms ease, border-color 120ms ease;
  }
  .drawer-tab:hover { color: var(--text-body); }
  .drawer-tab[aria-selected="true"] {
    color: var(--text-primary);
    font-weight: 600;
    border-bottom-color: var(--accent-blue);
  }

  .drawer-body {
    flex: 1;
    padding: 20px 24px;
    overflow-y: auto;
    background: var(--surface-tint);
  }
  .drawer-placeholder {
    padding: 28px 20px;
    border: 1px dashed var(--border-divider);
    border-radius: var(--r-md);
    background: var(--panel);
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.6;
  }
  .drawer-placeholder strong {
    display: block;
    color: var(--text-secondary);
    margin-bottom: 4px;
    font-size: 14px;
  }

  .drawer-footer {
    padding: 14px 24px;
    border-top: 1px solid var(--border-subtle);
    display: flex;
    gap: 10px;
    background: var(--panel);
  }
  .drawer-footer .btn { flex: 1; }

  /* ═══════════════════════════════════════════════════════════════
     LEADS PAGE — v0.7.0 controls + card list
     Base rules only. Mobile-specific rules live in the @media block
     at the bottom of this stylesheet (source-order cascade — see §5
     architecture notes in HANDOFF).
     ═══════════════════════════════════════════════════════════════ */

  /* "Mis à jour il y a 2 min" meta in the toggle row, right-aligned. */
  .leads-updated-meta {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: -0.05px;
  }

  /* Page-level Leads search. Used inside the leads-table-card header.
     Matches the .search pill shape for visual rhyme. */
  .leads-search {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 240px;
    max-width: 100%;
    height: 36px;
    padding: 0 12px;
    background: var(--bg);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-sm);
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .leads-search:focus-within {
    border-color: var(--text-secondary);
    box-shadow: 0 0 0 3px rgba(91, 109, 255, 0.08);
  }
  .leads-search svg {
    width: 15px;
    height: 15px;
    color: var(--text-muted);
    stroke-width: 2;
    flex-shrink: 0;
  }
  .leads-search input {
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    font-family: inherit;
    font-size: 13px;
    color: var(--text-primary);
    min-width: 0;
  }
  .leads-search input::placeholder { color: var(--text-muted); }

  /* Stage KPI cards — the Prodex-style row that sits above the table.
     Six cards per type. Click = filter the table to that stage. Click the
     active card again = deselect to "all". Card face treatment flips
     between default and active states:
       Default: white bg · soft border · colored icon in soft-tint badge
       Active:  soft-tint bg (stage.bg) · no border · white icon badge ·
                deeper text so label + count stay readable on the tint. */
  .stage-cards {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .stage-card {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 16px;
    background: var(--panel);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    min-width: 0;
    transition: border-color 120ms ease, background 120ms ease, box-shadow 120ms ease;
  }
  .stage-card:hover:not(.stage-card--active) {
    border-color: var(--border-strong);
    box-shadow: var(--shadow-xs);
  }
  .stage-card--active {
    background: var(--stage-bg);
    border-color: transparent;
  }
  .stage-card-icon {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--stage-bg);
    color: var(--stage-fg);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 120ms ease;
  }
  .stage-card--active .stage-card-icon { background: var(--panel); }
  .stage-card-icon svg { width: 18px; height: 18px; }
  .stage-card-text { min-width: 0; display: block; }
  .stage-card-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: -0.1px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .stage-card--active .stage-card-label { color: var(--stage-fg); }
  .stage-card-count {
    display: block;
    font-size: 26px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1;
    letter-spacing: -0.5px;
    font-variant-numeric: tabular-nums;
  }
  .stage-card--active .stage-card-count { color: var(--stage-deep); }

  /* Score chip — Chaud / Tiède / Froid. Colored dot + label inside a
     tinted pill. Chosen so all three weights read at the same visual
     volume (no one chip shouts louder than another). */
  .score-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 9px;
    border-radius: var(--r-pill);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: -0.1px;
    line-height: 1.3;
  }
  .score-chip-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .score-chip--hot  { background: #FCEBEB; color: #A32D2D; }
  .score-chip--hot  .score-chip-dot { background: #E24B4A; }
  .score-chip--warm { background: #FAEEDA; color: #854F0B; }
  .score-chip--warm .score-chip-dot { background: #F5B94C; }
  .score-chip--cold { background: #E6F1FB; color: #0C447C; }
  .score-chip--cold .score-chip-dot { background: #85B7EB; }

  /* Leads table card — contained Prodex-style card. Whole table (header +
     column labels + rows) lives inside one surface. Click a row → drawer.
     Design notes:
       - Header row: identity left (icon + title + meta) · actions right
         (search + Sort button + Filter button). Actions wrap on narrow.
       - Column headers are muted uppercase, subtle hairline under.
       - Rows are CSS grid with named column widths so body + header align.
       - Selected row gets a soft tint matching the drawer-open lead.
       - Last row has no hairline to avoid a double border with the card. */
  .leads-table-card {
    background: var(--panel);
    border: 1px solid var(--border-subtle);
    border-radius: 16px;
    overflow: hidden;
  }
  .leads-table-header {
    padding: 16px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border-subtle);
    flex-wrap: wrap;
  }
  .leads-table-header-title {
    flex: 1;
    min-width: 0;
  }
  .leads-table-title {
    display: block;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.15px;
  }
  .leads-table-header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .leads-table-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    height: 36px;
    padding: 0 13px;
    background: var(--panel);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-sm);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
    box-shadow: var(--shadow-xs);
    letter-spacing: -0.05px;
    transition: background 120ms ease, border-color 120ms ease;
  }
  .leads-table-btn:hover {
    background: var(--row-hover);
    border-color: var(--border-strong);
  }
  .leads-table-btn svg { width: 14px; height: 14px; stroke-width: 2; }
  .leads-table-btn--active {
    background: var(--text-primary);
    border-color: var(--text-primary);
    color: var(--panel);
    box-shadow: none;
  }
  .leads-table-btn--active:hover {
    background: var(--text-primary);
    border-color: var(--text-primary);
    color: var(--panel);
    opacity: 0.92;
  }
  .leads-table-btn-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    padding: 0 6px;
    background: var(--accent-blue);
    color: var(--panel);
    font-size: 10px;
    font-weight: 600;
    border-radius: var(--r-pill);
    line-height: 1;
  }

  /* Table grid — header + body share identical column widths.
     Widths are tuned for an ~880px content area on desktop; tablet and
     mobile collapse via the @media rules at the bottom of this stylesheet. */
  .leads-table-head,
  .leads-row {
    display: grid;
    grid-template-columns:
      minmax(180px, 2.2fr)  /* Nom (avatar + name + email)   */
      minmax(100px, 1fr)    /* Budget                         */
      minmax(140px, 1.4fr)  /* Zone · timeline                */
      minmax(90px,  0.9fr)  /* Score chip                     */
      minmax(70px,  0.8fr)  /* Agent avatar                   */
      minmax(72px,  0.9fr); /* Date                           */
    gap: 14px;
    align-items: center;
  }
  /* Select-mode variant: prepend a 44px checkbox column. Applied via
     --selectable modifier set on the head and body when state.selectionMode. */
  .leads-table-head--selectable,
  .leads-table-body--selectable .leads-row {
    grid-template-columns:
      44px                  /* Checkbox (fixed width)        */
      minmax(180px, 2.2fr)
      minmax(100px, 1fr)
      minmax(140px, 1.4fr)
      minmax(90px,  0.9fr)
      minmax(70px,  0.8fr)
      minmax(72px,  0.9fr);
  }
  .leads-table-head {
    padding: 12px 22px 10px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.3px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border-subtle);
  }
  .leads-table-body { display: block; }
  .leads-row {
    padding: 14px 22px;
    border-bottom: 1px solid var(--border-subtle);
    cursor: pointer;
    transition: background 80ms ease;
  }
  .leads-row:hover { background: var(--row-hover); }
  .leads-row[data-selected="true"] { background: #F2F5FF; }
  .leads-row--picked { background: #EEF2FF; }
  .leads-row--picked:hover { background: #E0E7FF; }
  .leads-row:last-child { border-bottom: 0; }

  /* Sortable column header — clickable. Muted double-chevron when idle,
     coloured arrow when active. Reset button reset + hover affordance. */
  .leads-col-header {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 0;
    background: transparent;
    border: 0;
    font-family: inherit;
    font-size: inherit;
    font-weight: inherit;
    color: inherit;
    text-transform: inherit;
    letter-spacing: inherit;
    cursor: pointer;
    user-select: none;
    text-align: left;
  }
  .leads-col-header:hover { color: var(--text-primary); }
  .leads-col-header[aria-sort="ascending"],
  .leads-col-header[aria-sort="descending"] { color: var(--text-primary); }
  .leads-col-sort {
    display: inline-flex;
    align-items: center;
    flex-shrink: 0;
  }
  .leads-col-sort svg {
    width: 12px;
    height: 12px;
    stroke-width: 2;
  }
  .leads-col-sort--idle { opacity: 0.45; }
  .leads-col-sort--active {
    color: var(--accent-blue);
    opacity: 1;
  }

  /* Checkbox column + checkbox cell visual. The input itself isn't rendered —
     the row click is the toggle, and we draw a styled span with an optional
     check icon inside. Keeps the tap-target large and the visual crisp. */
  .leads-col--check {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .leads-col-header--check {
    padding: 0;                /* override cell padding, center the box */
    justify-content: center;
    cursor: pointer;
  }
  .leads-checkbox {
    width: 18px;
    height: 18px;
    border-radius: 5px;
    border: 1.5px solid var(--border-strong);
    background: var(--panel);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--panel);
    transition: background 100ms ease, border-color 100ms ease;
  }
  .leads-checkbox svg { width: 12px; height: 12px; stroke-width: 3; }
  .leads-checkbox--on {
    background: var(--accent-blue);
    border-color: var(--accent-blue);
    color: var(--panel);
  }
  .leads-col-header--check:hover .leads-checkbox:not(.leads-checkbox--on) {
    border-color: var(--accent-blue);
  }

  /* Bulk action bar: lives inside the table card at the bottom. When
     selection > 0, it enters from below. Sticky to the card's bottom edge
     during scroll — sits visually on top of the last row without a gap. */
  .leads-bulk-bar {
    position: sticky;
    bottom: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 22px;
    background: var(--panel);
    border-top: 1px solid var(--border-subtle);
    box-shadow: 0 -6px 18px -12px rgba(15, 23, 42, 0.18);
  }
  .leads-bulk-bar-count {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: -0.05px;
  }
  .leads-bulk-bar-dot {

    body[data-drawer-open="true"] { overflow: hidden; }

/* "buyer" → "Acquéreur", "seller" → "Vendeur". Falls back to the raw key. */
function typeLabel(typeKey) {
  return { buyer: "Acquéreur", seller: "Vendeur" }[typeKey] || typeKey;
}

/* Look up a stage label from the agency pipeline. "lost" is a terminal state
   outside the pipeline array — renders as "Perdu". Unknown ids fall back to
   the id itself so missing data is visible rather than silently blank. */
function stageLabel(typeKey, stageId) {
  if (stageId === "lost") return "Perdu";
  const pipeline = state.agency.pipeline[typeKey] || [];
  const stage = pipeline.find(s => s.id === stageId);
  return stage ? stage.label : stageId;
}

  // bg   = soft tint (icon badge on default card, card surface on active)
  // fg   = mid-saturation color (icon stroke, active-state label/accent)
  // deep = dark variant for bold text on the tinted surface (active card's count)

    // Buyer pipeline
    to_process:      { bg: "#E8ECFF", fg: "#5B6DFF", deep: "#2A3AB8" },  // blue — fresh
    contacted:       { bg: "#EDE7FF", fg: "#6D48DB", deep: "#3E2595" },  // violet — in motion
    qualified:       { bg: "#E4F4E9", fg: "#2F9D6F", deep: "#15653E" },  // green — qualified
    visit_planned:   { bg: "#E8ECFF", fg: "#5B6DFF", deep: "#2A3AB8" },  // blue — progressing
    offer_made:      { bg: "#FBF0DC", fg: "#8C5A08", deep: "#5A3A05" },  // amber — committed
    converted:       { bg: "#D8EEDF", fg: "#1F7D54", deep: "#0D5034" },  // dark green — won
    // Seller pipeline (shared where semantically equivalent)
    estimation_sent: { bg: "#EDE7FF", fg: "#6D48DB", deep: "#3E2595" },  // violet
    appointment:     { bg: "#E8ECFF", fg: "#5B6DFF", deep: "#2A3AB8" },  // blue

    // Terminal
    lost:            { bg: "#FDE7E7", fg: "#C44343", deep: "#7A1F1F" },  // red
  }[stageId] || { bg: "#F4F4F6", fg: "#6E6B64", deep: "#3B3A35" };       // fallback = neutral
}

/* Price field differs by type — buyers declare a budget range, sellers
   state an expected price. Both are pre-formatted strings with € suffix. */
function leadPrice(lead) {
  return lead.type === "seller" ? lead.expectedPrice : lead.budget;
}

/* Timeline likewise differs — buyer.timeline is purchase horizon,
   seller.sellingTimeline is listing horizon. */
function leadTimeline(lead) {
  return lead.type === "seller" ? lead.sellingTimeline : lead.timeline;
}

/* French-short formatter for the ISO createdAt field. Stored ISO (sortable),
   displayed French. When the backend lands and real timestamps come in,
   this is the single function to upgrade (moment/intl). */
const MONTHS_FR_SHORT = ["janv.", "févr.", "mars", "avr.", "mai", "juin",
                         "juil.", "août", "sept.", "oct.", "nov.", "déc."];
function formatLeadDate(iso) {
  if (!iso) return "—";
  const [y, m, d] = iso.split("-").map(Number);
  if (!y || !m || !d) return iso;  // malformed — show raw so bugs are visible
  return `${String(d).padStart(2, "0")} ${MONTHS_FR_SHORT[m - 1]} ${y}`;
}

/* Extract numeric budget for sort. budget/expectedPrice are formatted strings
   like "1 200 000 €" — strip non-digits and parse. Missing values sort last
   (returned Infinity in asc, -Infinity conceptually in desc via sign flip).
   Returns 0 if nothing numeric (unset). */
function leadPriceNumeric(lead) {
  const raw = lead.type === "seller" ? lead.expectedPrice : lead.budget;
  if (!raw) return 0;
  const digits = String(raw).replace(/\D/g, "");
  return digits ? parseInt(digits, 10) : 0;
}

/* score sort order: hot > warm > cold (decreasing urgency).
   Unknown scores sort last. */
const SCORE_ORDER = { hot: 3, warm: 2, cold: 1 };
function leadScoreOrder(lead) { return SCORE_ORDER[lead.score] || 0; }

/* Agent name lookup for sort. Unassigned leads sort as empty string (top in
   asc, bottom in desc). */
function leadAgentName(lead) {
  if (lead.assignedAgentId == null) return "";
  const agent = state.team.find(t => t.id === lead.assignedAgentId);
  return agent ? agent.name : "";
}

/* Sort comparator factory. Returns a function (a, b) => number per column.
   Direction applied by the caller (multiply result by -1 for desc). */
function leadComparator(column) {
  switch (column) {
    case "name":   return (a, b) => a.name.localeCompare(b.name,   "fr");
    case "budget": return (a, b) => leadPriceNumeric(a) - leadPriceNumeric(b);
    case "zone":   return (a, b) => (a.zone || "").localeCompare(b.zone || "", "fr");
    case "score":  return (a, b) => leadScoreOrder(a) - leadScoreOrder(b);
    case "agent":  return (a, b) => leadAgentName(a).localeCompare(leadAgentName(b), "fr");
    case "date":   return (a, b) => (a.createdAt || "").localeCompare(b.createdAt || "");  // ISO string compare = chronological
    default:       return (a, b) => a.id - b.id;
  }
}

/**
 * Button primitive. Every clickable text-action uses this.
 * Icon-only buttons use `.icon-btn` directly (topbar plus/bell).
 *
 *   variant: "default" | "primary" | "ghost" | "danger"   (default: "default")
 *   size:    "sm" | "md" | "lg"                           (default: "md")
 *   block:   boolean — full-width                         (default: false)
 *   icon:    SVG string (from icon.*()) placed before label
 *   label:   button text
 *   action:  data-action value to dispatch on click
 *   disabled: boolean
 *   extra:   additional class names (rare)
 */
function renderButton({ variant = "default", size = "md", block = false, icon = "", label = "", action = "", disabled = false, extra = "" } = {}) {
  const classes = [
    "btn",
    variant !== "default" && `btn--${variant}`,
    size !== "md" && `btn--${size}`,
    block && "btn--block",
    extra,
  ].filter(Boolean).join(" ");
  const attrs = [
    `class="${classes}"`,
    action ? `data-action="${action}"` : "",
    disabled ? `disabled aria-disabled="true"` : "",
  ].filter(Boolean).join(" ");
  return `<button ${attrs}>${icon}${label ? `<span>${label}</span>` : ""}</button>`;
}
