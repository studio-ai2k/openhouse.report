<!doctype html>
<!--
  Open House Prospects — v0.10.4
  Path A — createdAt becomes full ISO datetime · mobile card shows time

  v0.10.4 ships the §10b "mobile card date-with-time" item. Data-model
  change: `createdAt` upgrades from date-only "2026-04-18" to full ISO
  datetime "2026-04-18T07:42:00Z" across all 12 dummy leads. Display:
  mobile card renders "18 avril · à 07h42" (full month · French time
  style); desktop table keeps "18 avr. 2026" (terse, no time).

    1. `formatLeadDate` gains two opts: `showTime` (default false) and
       `longMonth` (default false). `MONTHS_FR_LONG` added alongside
       `MONTHS_FR_SHORT`. Time format is `{HH}h{MM}` — native French
       (16h35, not 16:35h). Separator before time is middle-dot " · "
       to match the app's other content separators.

    2. All 12 `state.leads` backfilled with realistic times. Meta-sourced
       leads spread across morning browse / lunch / evening / weekend
       patterns. Lucas (lost, late-night tire-kicker at 23:47) and
       Antoine (Sunday 21:08) anchor the plausibility check.

    3. Two latent comparison bugs caught + fixed (would have broken
       immediately post-upgrade): `computeLeadsView`'s `filterTab==="today"`
       branch and `computeCrossCuttingCards`'s todayCount — both used
       to do `l.createdAt === today`, which is always false once
       createdAt is a datetime. Both now slice(0, 10) before comparing.

    4. Mobile card caller updated to pass `{ longMonth: true,
       showTime: true, showYear: false }`. Desktop table caller
       unchanged (defaults preserve the terse format).

  Nothing else changed. Drawer, KPI row, mode card (v0.10.3), select
  mode, sort — all untouched. `leadComparator` date-sort still works
  because ISO datetime strings compare chronologically via localeCompare.

  Not in v0.10.4 (remaining §10b items, each needs more input):
  - Agent vs Manager view (needs product discussion)
  - Sidebar header whitespace (parked per Leo — may get used in
    the next phase's design)
  - CAPI §8 framing rewrite (deferred to Step 3 cycle)
  - PWA push notifications (scoped as Path B, sequenced for VPS migration)

  For prior version history, see HANDOFF.md §13 (audit notes).
-->
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Open House Prospects</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
  /* ═══════════════════════════════════════════════════════════════
     DESIGN TOKENS — single source of truth. Every color, radius,
     shadow, font-size lives here. No magic numbers below this block.
     ═══════════════════════════════════════════════════════════════ */
  :root {
    /* Neutrals — cool palette (locked) */
    --frame:          #F5F5F7;
    --sidebar-bg:     #FAFAFB;
    --panel:          #FFFFFF;
    --surface-tint:   #F4F4F6;  /* general tint surface */
    --hover-warm:     #EFEFF2;  /* nav hover (name retained from warm era — it's just "hover") */
    --active-warm:    #E7E7EC;  /* nav active */
    --row-hover:      #FAFAFB;

    --border-subtle:  #ECECEF;
    --border-divider: #E6E6EA;
    --border-strong:  #D8D8DE;  /* NEW — visible borders (icon buttons, user menu, search) */

    --text-primary:   #1C1C1F;
    --text-body:      #3D3A35;
    --text-secondary: #6E6B64;
    --text-muted:     #9B9892;

    /* Accents */
    --accent-blue:    #5B6DFF;
    --accent-green:   #4CC38A;
    --accent-red:     #FF6B6B;
    --accent-amber:   #F5B94C;

    /* Accent-soft (badge tints) */
    --blue-soft:   #E8ECFF;
    --green-soft:  #E4F4E9;
    --red-soft:    #FDE7E7;
    --amber-soft:  #FBF0DC;
    --violet-soft: #EDE7FF;  /* for "En cours" status pill */

    /* Radius */
    --r-xs: 6px;
    --r-sm: 10px;
    --r-md: 14px;
    --r-lg: 16px;
    --r-xl: 20px;
    --r-pill: 999px;

    /* Shadow */
    --shadow-none:   none;
    --shadow-xs:     0 1px 2px rgba(0,0,0,0.02);
    --shadow-sm:     0 2px 8px rgba(0,0,0,0.03);
    --shadow-md:     0 8px 24px rgba(0,0,0,0.04);
    --shadow-shell:  0 8px 32px rgba(0,0,0,0.04);
    --shadow-drawer: -12px 0 40px rgba(0,0,0,0.08);

    /* Type */
    --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;

    /* Layout */
    --sidebar-w: 260px;
    --header-h: 88px;
    --shell-pad: 24px;
  }

  /* Cool palette is now the default — warm A/B toggle removed at design lock */

  /* ═══════════════════════════════════════════════════════════════
     BASE
     ═══════════════════════════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-sans);
    background: var(--frame);
    color: var(--text-body);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  input, select { font: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border-divider); border-radius: var(--r-pill); }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ═══════════════════════════════════════════════════════════════
     APP SHELL
     ═══════════════════════════════════════════════════════════════ */
  .app-shell {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    min-height: 100vh;
    background: var(--frame);
  }

  /* ───────── Sidebar ───────── */
  .sidebar {
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border-divider);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 8px;
    margin-bottom: 16px;
  }
  .brand-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, #5B6DFF 0%, #9B7CFF 100%);
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 3px;
    padding: 6px;
  }
  .brand-mark span {
    background: rgba(255,255,255,0.9);
    border-radius: 2px;
  }
  .brand-mark span:nth-child(2) { background: rgba(255,255,255,0.6); }
  .brand-mark span:nth-child(3) { background: rgba(255,255,255,0.7); }
  .brand-mark span:nth-child(4) { background: rgba(255,255,255,0.95); }

  .brand-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.2px;
  }

  /* Agency + city switcher */
  .agency-switcher {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    cursor: pointer;
    margin-bottom: 20px;
    transition: border-color 120ms ease, background 120ms ease;
  }
  .agency-switcher:hover { background: var(--hover-warm); }
  .agency-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #1C1C1F;
    color: #fff;
    display: grid;
    place-items: center;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: -0.2px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .agency-avatar[data-variant="logo"] {
    background: #FFFFFF;
    border: 1px solid var(--border-strong);
    padding: 4px;
  }
  .agency-avatar img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .agency-text {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    line-height: 1.2;
  }
  .agency-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .agency-city {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .agency-city svg {
    width: 11px;
    height: 11px;
    display: inline-block;
    vertical-align: -1px;
    margin-right: 3px;
    stroke-width: 2;
    color: var(--text-muted);
  }
  .agency-switcher > svg { color: var(--text-muted); flex-shrink: 0; transition: transform 160ms ease; }
  .agency-switcher[aria-expanded="true"] > svg { transform: rotate(180deg); }

  .agency-switcher-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  .agency-switcher-wrap .agency-switcher { margin-bottom: 0; }

  .agency-menu {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    box-shadow: var(--shadow-md);
    padding: 6px;
    z-index: 40;
  }
  .agency-menu-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 6px 10px 4px;
  }
  .agency-menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: var(--r-xs);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-body);
    cursor: pointer;
    transition: background 100ms ease;
  }
  .agency-menu-item svg {
    width: 14px;
    height: 14px;
    color: var(--text-muted);
    flex-shrink: 0;
    stroke-width: 2;
  }
  .agency-menu-item span {
    flex: 1;
  }
  .agency-menu-item:hover { background: var(--hover-warm); }
  .agency-menu-item[data-active="true"] {
    color: var(--text-primary);
    font-weight: 600;
  }
  .agency-menu-item[data-active="true"] svg:last-child {
    color: var(--accent-blue);
  }

  /* Section label */
  .nav-section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: 0.8px;
    padding: 0 10px;
    margin: 0 0 8px;
    text-transform: uppercase;
  }
  .nav-group + .nav-group { margin-top: 20px; }

  /* Nav items */
  .nav-list { list-style: none; padding: 0; margin: 0; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 40px;
    padding: 0 10px;
    border-radius: var(--r-sm);
    color: var(--text-body);
    cursor: pointer;
    transition: background 120ms ease;
    position: relative;
  }
  .nav-item svg {
    width: 16px;
    height: 16px;
    color: var(--text-secondary);
    flex-shrink: 0;
    stroke-width: 1.5;
  }
  .nav-item-label {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
  }
  .nav-item-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    background: var(--panel);
    padding: 2px 7px;
    border-radius: var(--r-pill);
    border: 1px solid var(--border-subtle);
  }
  .nav-item:hover { background: var(--hover-warm); }
  .nav-item[data-active="true"] {
    background: var(--active-warm);
  }
  .nav-item[data-active="true"] .nav-item-label { font-weight: 600; color: var(--text-primary); }
  .nav-item[data-active="true"] svg { color: var(--text-primary); }

  /* Sidebar footer */
  .sidebar-spacer { flex: 1; }

  .sidebar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 10px;
    height: 40px;
    color: var(--text-secondary);
    font-size: 14px;
  }
  .sidebar-row svg { width: 16px; height: 16px; stroke-width: 1.5; }
  .sidebar-row-label { flex: 1; }

  /* Toggle switch */
  .switch {
    position: relative;
    width: 32px;
    height: 18px;
    border-radius: var(--r-pill);
    background: var(--border-divider);
    cursor: pointer;
    transition: background 140ms ease;
  }
  .switch::after {
    content: "";
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
    box-shadow: var(--shadow-xs);
    transition: transform 160ms cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .switch[data-on="true"] { background: var(--text-primary); }
  .switch[data-on="true"]::after { transform: translateX(14px); }

  /* Help / info card at bottom */
  .sidebar-card {
    margin-top: 16px;
    padding: 16px;
    border-radius: var(--r-md);
    background: var(--blue-soft);
    border: 1px solid rgba(91, 109, 255, 0.12);
  }
  .sidebar-card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  .sidebar-card-body {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 12px;
    line-height: 1.4;
  }
  /* Sidebar feedback-card CTA.
     Intentionally NOT using .btn — this is tuned to the card's compact container.
     Generic buttons (drawer, forms, filters) use the .btn system. */
  .sidebar-card-cta {
    display: block;
    width: 100%;
    padding: 8px 12px;
    background: var(--text-primary);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    border-radius: var(--r-sm);
    text-align: center;
    transition: background 120ms ease;
  }
  .sidebar-card-cta:hover { background: #000; }

  /* ═══════════════════════════════════════════════════════════════
     MAIN CONTENT
     ═══════════════════════════════════════════════════════════════ */
  .main {
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  /* ───────── Top header ───────── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 30;
    height: var(--header-h);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    background: var(--frame);
    transition: box-shadow 180ms ease;
  }
  .topbar[data-scrolled="true"] {
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06), 0 8px 24px rgba(0, 0, 0, 0.04);
  }
  .page-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.4px;
    margin: 0;
  }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .topbar-actions-icons {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Avatar stack */
  .avatar-stack {
    display: flex;
    align-items: center;
  }
  .avatar-stack .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--frame);
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    display: grid;
    place-items: center;
    margin-left: -10px;
  }
  .avatar-stack .avatar:first-child { margin-left: 0; }
  .avatar-more {
    margin-left: -10px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--panel);
    border: 2px solid var(--frame);
    color: var(--text-secondary);
    font-size: 11px;
    font-weight: 600;
    display: grid;
    place-items: center;
    box-shadow: var(--shadow-xs);
  }

  /* Icon button */
  .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    color: var(--text-body);
    display: grid;
    place-items: center;
    position: relative;
    box-shadow: var(--shadow-xs);
    transition: all 120ms ease;
  }
  .icon-btn:hover {
    border-color: var(--text-muted);
    color: var(--text-primary);
    box-shadow: var(--shadow-sm);
  }
  .icon-btn svg { width: 18px; height: 18px; stroke-width: 2; }

  .notif-badge {
    position: absolute;
    top: -3px;
    right: -3px;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    border-radius: var(--r-pill);
    background: var(--accent-red);
    color: #fff;
    font-size: 9px;
    font-weight: 600;
    display: grid;
    place-items: center;
    border: 2px solid var(--frame);
    line-height: 1;
  }

  /* ═══════════════════════════════════════════════════════════════
     BUTTON SYSTEM (Option B — Bordered clean)
     Locked in Step 1. Every clickable text-action in the product
     uses these classes. Icon-only buttons use .icon-btn instead.
     ═══════════════════════════════════════════════════════════════ */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 9px 14px;
    font: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-body);
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    cursor: pointer;
    white-space: nowrap;
    box-shadow: var(--shadow-xs);
    transition: all 120ms ease;
  }
  .btn svg {
    width: 15px;
    height: 15px;
    stroke-width: 1.75;
    flex-shrink: 0;
  }
  .btn:hover {
    border-color: var(--text-muted);
    box-shadow: var(--shadow-sm);
  }
  .btn:active {
    transform: translateY(0.5px);
  }
  .btn:disabled,
  .btn[aria-disabled="true"] {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* Variants */
  .btn--primary {
    background: var(--text-primary);
    color: #fff;
    border-color: var(--text-primary);
    font-weight: 600;
  }
  .btn--primary:hover {
    background: #000;
    border-color: #000;
  }
  .btn--ghost {
    background: transparent;
    border-color: transparent;
    box-shadow: none;
  }
  .btn--ghost:hover {
    background: var(--surface-tint);
    border-color: transparent;
    box-shadow: none;
  }
  .btn--danger {
    border-color: #F5BDBD;
    color: #C63636;
  }
  .btn--danger:hover {
    background: #FDE7E7;
    border-color: #E89898;
  }

  /* Sizes */
  .btn--sm {
    padding: 6px 11px;
    font-size: 12px;
  }
  .btn--sm svg { width: 13px; height: 13px; }
  .btn--lg {
    padding: 12px 20px;
    font-size: 14px;
  }
  .btn--lg svg { width: 16px; height: 16px; }

  /* Full-width (for drawer footers, mobile actions, forms) */
  .btn--block { width: 100%; }

  /* Search */
  .search {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 320px;
    height: 40px;
    padding: 0 16px;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-pill);
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .search:focus-within {
    border-color: var(--text-secondary);
    box-shadow: 0 0 0 3px rgba(91, 109, 255, 0.08);
  }
  .search svg {
    width: 16px;
    height: 16px;
    color: var(--text-body);
    stroke-width: 2;
    flex-shrink: 0;
  }
  .search input {
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    font-size: 14px;
    color: var(--text-primary);
  }
  .search input::placeholder { color: var(--text-muted); }

  /* Topbar search suppression on the Leads route.
     The topbar search is reserved for future global search. On Leads, the
     page-level search IS the search — so the topbar one hides to avoid two
     competing affordances. Non-Leads routes keep it visible.
     Uses body[data-route] which is set in render(). Base rule, not media-query. */
  body[data-route="leads"] .topbar .search { display: none; }

  /* User menu */
  .user-menu-wrap {
    position: relative;
  }
  .user-menu {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px 4px 4px;
    border-radius: var(--r-pill);
    background: var(--panel);
    border: 1px solid var(--border-strong);
    box-shadow: var(--shadow-xs);
    transition: all 120ms ease;
  }
  .user-menu:hover {
    border-color: var(--text-muted);
    box-shadow: var(--shadow-sm);
  }
  .user-menu[aria-expanded="true"] {
    border-color: var(--text-muted);
    background: var(--surface-tint);
  }
  .user-menu .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    display: grid;
    place-items: center;
  }
  .user-menu svg {
    width: 14px;
    height: 14px;
    color: var(--text-secondary);
    transition: transform 160ms ease;
  }
  .user-menu[aria-expanded="true"] svg { transform: rotate(180deg); }

  /* User menu dropdown */
  .user-menu-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 260px;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-md);
    box-shadow: var(--shadow-md);
    padding: 6px;
    z-index: 40;
  }
  .user-menu-identity {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 10px 12px;
  }
  .user-menu-identity .avatar {
    flex-shrink: 0;
  }
  .user-menu-identity-text {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    line-height: 1.3;
  }
  .user-menu-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .user-menu-email {
    font-size: 12px;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .user-menu-role {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .user-menu-divider {
    height: 1px;
    background: var(--border-subtle);
    margin: 4px 2px;
  }
  .user-menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: var(--r-xs);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-body);
    cursor: pointer;
    transition: background 100ms ease;
  }
  .user-menu-item svg {
    width: 15px;
    height: 15px;
    color: var(--text-secondary);
    flex-shrink: 0;
    stroke-width: 1.7;
  }
  .user-menu-item:hover { background: var(--hover-warm); }
  .user-menu-item--danger {
    color: var(--accent-red);
  }
  .user-menu-item--danger svg {
    color: var(--accent-red);
  }
  .user-menu-item--danger:hover {
    background: var(--red-soft);
  }

  /* ───────── Content area ───────── */
  .content {
    flex: 1;
    padding: 0 32px 32px;
    min-height: 0;
  }

  /* Step-1 empty state (will be removed in Step 2) */
  .empty-state {
    margin-top: 4px;
    padding: 24px 28px;
    border: 1px dashed var(--border-divider);
    border-radius: var(--r-md);
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .empty-state-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .empty-state-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
  }
  .empty-state-body {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .empty-state code {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 1px 5px;
    background: var(--surface-tint);
    border-radius: var(--r-xs);
    color: var(--text-body);
  }
  .empty-state-chip {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 4px 10px;
    background: var(--surface-tint);
    border-radius: var(--r-pill);
    white-space: nowrap;
  }

  /* ═══════════════════════════════════════════════════════════════
     RESPONSIVE rules live at the bottom of the stylesheet so they
     override all base rules regardless of base-rule source order.
     See end of this <style> block.
     ═══════════════════════════════════════════════════════════════ */

  .hamburger {
    display: none;
    width: 36px;
    height: 36px;
    border-radius: var(--r-sm);
    place-items: center;
    color: var(--text-secondary);
  }
  .hamburger:hover { background: var(--surface-tint); color: var(--text-primary); }
  .hamburger svg { width: 20px; height: 20px; stroke-width: 1.5; }

  .mobile-overlay {
    position: fixed;
    inset: 0;
    background: rgba(28,28,31,0.3);
    backdrop-filter: blur(4px);
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease;
  }
  .mobile-overlay[data-visible="true"] {
    opacity: 1;
    pointer-events: auto;
  }

  /* ═══════════════════════════════════════════════════════════════
     DRAWER (lead detail panel)
     Desktop: below-topbar, respects-sidebar, 480px, no backdrop.
     Mobile:  full-screen takeover with back arrow.
     Structure per DESIGN_SPEC.md §17 drawer-boundaries decision.
     Contents are placeholder — real form lives in Step 3.
     ═══════════════════════════════════════════════════════════════ */
  .drawer {
    position: fixed;
    top: var(--header-h);
    right: 0;
    bottom: 0;
    width: 480px;
    background: var(--panel);
    border-left: 1px solid var(--border-divider);
    box-shadow: -16px 0 48px rgba(0, 0, 0, 0.08);
    display: flex;
    flex-direction: column;
    z-index: 20;
    transform: translateX(100%);
    transition: transform 280ms cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .drawer[data-open="true"] {
    transform: translateX(0);
  }

  .drawer-header {
    padding: 20px 24px 40px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  /* Close button on desktop uses the same .icon-btn style as the topbar + and bell.
     Positioned by DOM order — it comes AFTER the header-text in the flex row,
     so it sits on the right. On mobile it's overridden to be a top-left back arrow. */
  .drawer-close {
    flex-shrink: 0;
    order: 2;         /* force to the right end of the flex row on desktop */
  }
  .drawer-header-text {
    flex: 1;
    min-width: 0;
    order: 1;
  }
  .drawer-name {
    font-size: 19px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .drawer-badge {
    display: inline-block;
    padding: 2px 8px;
    background: #E4F4E9;
    color: #2F9D6F;
    font-size: 11px;
    font-weight: 600;
    border-radius: var(--r-pill);
    flex-shrink: 0;
  }

  /* v0.10.1 — Drawer header rebuilt per locked spec. Old .drawer-meta
     (budget · zone · type · timeline) retired — that data moved to
     Infos tab. New structure: campaign line · chip row · contact row. */

  /* Campaign name: megaphone icon + text, row 2 of the header. Muted
     tone so it reads as attribution metadata, not primary lead data.
     Treats empty/"—" campaign as "don't render" — handled in JSX. */
  .drawer-campaign {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 2px;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
    min-width: 0;
  }
  .drawer-campaign svg {
    width: 14px;
    height: 14px;
    stroke: var(--text-muted);
    fill: none;
    stroke-width: 1.75;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }
  .drawer-campaign span {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  /* Chip row: source · type · score, row 3 of the header. Three chips,
     similar visual weight, each with a distinct job. Source = where
     they came from; Type = buyer/seller (type-accent palette); Score
     = how hot.

     v0.10.2 — drawer-scoped override: strip the circle container on
     the source chip when it's inside this row, so all 4 drawer icons
     (campaign megaphone, source, phone, mail) read as a coherent
     family of naked stroke icons. The mobile card keeps the full
     source-chip pill treatment via the unscoped .source-chip rule. */
  .drawer-chip-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .drawer-chip-row .source-chip {
    width: auto;
    height: auto;
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 0;
    color: var(--text-muted);
  }
  .drawer-chip-row .source-chip svg {
    width: 14px;
    height: 14px;
    stroke-width: 1.75;
  }

  /* Type chip — buyer/seller identifier with type-accent palette,
     echoing the Leads page 4px top band color. Text-only, no icon. */
  .type-chip {
    display: inline-flex;
    align-items: center;
    padding: 3px 9px;
    border-radius: var(--r-pill);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2px;
    line-height: 1.3;
    flex-shrink: 0;
  }
  .type-chip--buyer  { background: var(--blue-soft);  color: #3E4DD4; }
  .type-chip--seller { background: var(--amber-soft); color: #8C5A08; }

  /* Contact row: phone + email stacked. Each item is a tappable line
     with an icon. Phone → tel: link (native call on mobile). Email →
     data-action="copy-email" (copies to clipboard; feedback mechanism
     deferred per §10a parked list). */
  .drawer-contact {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 12px;
  }
  .drawer-contact-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-body);
    text-decoration: none;
    font-variant-numeric: tabular-nums;
    min-width: 0;
    line-height: 1.4;
  }
  .drawer-contact-item:hover { color: var(--text-primary); }
  .drawer-contact-item svg {
    width: 14px;
    height: 14px;
    stroke: var(--text-muted);
    fill: none;
    stroke-width: 1.75;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }
  .drawer-contact-text {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  /* Verify badge — inline with the phone number. Green pill + check
     when phoneVerified=true; amber pill + warning triangle when
     false. */
  .verify-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 1px 7px;
    font-size: 10px;
    font-weight: 600;
    border-radius: var(--r-pill);
    letter-spacing: 0.2px;
    flex-shrink: 0;
  }
  .verify-badge--ok { background: #E4F4E9; color: #2F9D6F; }
  .verify-badge--no { background: #FFF1DB; color: #B06100; }
  .verify-badge svg {
    width: 9px;
    height: 9px;
    stroke: currentColor;
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .source-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--surface-tint, #F5F5F7);
    color: var(--text-secondary);
    border: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }
  .source-chip svg {
    width: 14px;
    height: 14px;
    stroke-width: 1.75;
  }

  .drawer-tabs {
    display: flex;
    padding: 0 24px;
    border-bottom: 1px solid var(--border-subtle);
    gap: 24px;
  }
  .drawer-tab {
    padding: 12px 0;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    border-bottom: 2px solid transparent;
    cursor: pointer;
    background: transparent;
    border-top: 0;
    border-left: 0;
    border-right: 0;
    font-family: inherit;
    transition: color 120ms ease, border-color 120ms ease;
  }
  .drawer-tab:hover { color: var(--text-body); }
  .drawer-tab[aria-selected="true"] {
    color: var(--text-primary);
    font-weight: 600;
    border-bottom-color: var(--accent-blue);
  }

  .drawer-body {
    flex: 1;
    padding: 20px 24px;
    overflow-y: auto;
    background: var(--surface-tint);
  }
  .drawer-placeholder {
    padding: 28px 20px;
    border: 1px dashed var(--border-divider);
    border-radius: var(--r-md);
    background: var(--panel);
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.6;
  }
  .drawer-placeholder strong {
    display: block;
    color: var(--text-secondary);
    margin-bottom: 4px;
    font-size: 14px;
  }

  .drawer-footer {
    padding: 14px 24px;
    border-top: 1px solid var(--border-subtle);
    display: flex;
    gap: 10px;
    background: var(--panel);
  }
  .drawer-footer .btn { flex: 1; }

  /* ═══════════════════════════════════════════════════════════════
     LEADS PAGE — v0.7.0 controls + card list
     Base rules only. Mobile-specific rules live in the @media block
     at the bottom of this stylesheet (source-order cascade — see §5
     architecture notes in HANDOFF).
     ═══════════════════════════════════════════════════════════════ */

  /* "Mis à jour il y a 2 min" meta — lives in .leads-meta-row now.
     v0.10.3: kept as a utility class, margin-left:auto pushes it to
     the right of the meta row. */
  .leads-updated-meta {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: -0.05px;
  }

  /* Page-level Leads search. Used inside the leads-table-card header.
     Matches the .search pill shape for visual rhyme. */
  .leads-search {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 240px;
    max-width: 100%;
    height: 36px;
    padding: 0 12px;
    background: var(--bg);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-sm);
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .leads-search:focus-within {
    border-color: var(--text-secondary);
    box-shadow: 0 0 0 3px rgba(91, 109, 255, 0.08);
  }
  .leads-search svg {
    width: 15px;
    height: 15px;
    color: var(--text-muted);
    stroke-width: 2;
    flex-shrink: 0;
  }
  .leads-search input {
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    font-family: inherit;
    font-size: 13px;
    color: var(--text-primary);
    min-width: 0;
  }
  .leads-search input::placeholder { color: var(--text-muted); }

  /* Stage KPI cards — the Prodex-style row that sits above the table.
     Six cards per type. Click = filter the table to that stage. Click the
     active card again = deselect to "all". Card face treatment flips
     between default and active states:
       Default: white bg · soft border · colored icon in soft-tint badge
       Active:  soft-tint bg (stage.bg) · no border · white icon badge ·
                deeper text so label + count stay readable on the tint. */
  .stage-cards {
    /* v0.10 — switched from 6-col grid to single-row flex so cards
       progressively hide (rather than wrap) as viewport narrows. The
       Filter popover will carry the same stage filters, so hiding a
       card doesn't remove filtering capability — only glance visibility.
       Priority order (not pipeline flow) determines drop order — see
       STAGE_PRIORITY in renderStageCards. Cards with
       .stage-card--prio-{n} hide at breakpoints below. Active card
       always stays visible via .stage-card--active override. */
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .stage-cards .stage-card { flex: 1 1 0; min-width: 0; }
  .stage-card {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 16px;
    background: var(--panel);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    min-width: 0;
    transition: border-color 120ms ease, background 120ms ease, box-shadow 120ms ease;
  }
  .stage-card:hover:not(.stage-card--active) {
    border-color: var(--border-strong);
    box-shadow: var(--shadow-xs);
  }
  .stage-card--active {
    background: var(--stage-bg);
    border-color: transparent;
  }
  .stage-card-icon {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--stage-bg);
    color: var(--stage-fg);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 120ms ease;
  }
  .stage-card--active .stage-card-icon { background: var(--panel); }
  .stage-card-icon svg { width: 18px; height: 18px; }
  .stage-card-text { min-width: 0; display: block; }
  .stage-card-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: -0.1px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .stage-card--active .stage-card-label { color: var(--stage-fg); }
  .stage-card-count {
    display: block;
    font-size: 26px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1;
    letter-spacing: -0.5px;
    font-variant-numeric: tabular-nums;
  }
  .stage-card--active .stage-card-count { color: var(--stage-deep); }

  /* v0.9.2 — Cross-cutting KPI cards (Leads aujourd'hui, Non assignés).
     These are NOT pipeline-stage cards — they filter by time/assignment
     criteria, not by stage id. Use neutral colors to read as a distinct
     category from stage cards. The --stage-* custom properties used by
     the default stage-card rules aren't set on neutral cards, so we
     provide neutral-specific rules for badge, active-state, and count. */
  .stage-card--neutral .stage-card-icon {
    background: var(--surface-tint);
    color: var(--text-secondary);
  }
  .stage-card--neutral.stage-card--active {
    background: var(--active-warm);
    border-color: transparent;
  }
  .stage-card--neutral.stage-card--active .stage-card-icon {
    background: var(--panel);
    color: var(--text-primary);
  }
  .stage-card--neutral.stage-card--active .stage-card-label {
    color: var(--text-primary);
  }
  .stage-card--neutral.stage-card--active .stage-card-count {
    color: var(--text-primary);
  }

  /* Score chip — Chaud / Tiède / Froid. Colored dot + label inside a
     tinted pill. Chosen so all three weights read at the same visual
     volume (no one chip shouts louder than another). */
  .score-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 9px;
    border-radius: var(--r-pill);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: -0.1px;
    line-height: 1.3;
  }
  .score-chip-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .score-chip--hot  { background: #FCEBEB; color: #A32D2D; }
  .score-chip--hot  .score-chip-dot { background: #E24B4A; }
  .score-chip--warm { background: #FAEEDA; color: #854F0B; }
  .score-chip--warm .score-chip-dot { background: #F5B94C; }
  .score-chip--cold { background: #E6F1FB; color: #0C447C; }
  .score-chip--cold .score-chip-dot { background: #85B7EB; }

  /* Leads table card — contained Prodex-style card. Whole table (header +
     column labels + rows) lives inside one surface. Click a row → drawer.
     Design notes:
       - Header row: identity left (icon + title + meta) · actions right
         (search + Sort button + Filter button). Actions wrap on narrow.
       - Column headers are muted uppercase, subtle hairline under.
       - Rows are CSS grid with named column widths so body + header align.
       - Selected row gets a soft tint matching the drawer-open lead.
       - Last row has no hairline to avoid a double border with the card. */
  .leads-table-card {
    background: var(--panel);
    border: 1px solid var(--border-subtle);
    border-radius: 16px;
    overflow: hidden;
  }
  .leads-table-header {
    padding: 16px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border-subtle);
    flex-wrap: wrap;
  }
  .leads-table-header-title {
    flex: 1;
    min-width: 0;
  }
  .leads-table-title {
    display: block;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.15px;
  }
  .leads-table-header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .leads-table-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    height: 36px;
    padding: 0 13px;
    background: var(--panel);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-sm);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
    box-shadow: var(--shadow-xs);
    letter-spacing: -0.05px;
    transition: background 120ms ease, border-color 120ms ease;
  }
  .leads-table-btn:hover {
    background: var(--row-hover);
    border-color: var(--border-strong);
  }
  .leads-table-btn svg { width: 14px; height: 14px; stroke-width: 2; }
  /* v0.10.2 — Sélectionner active state lightened. Previously filled
     with --text-primary (near-black) which out-weighted everything
     else on the page. New treatment: surface-tint background + bold
     text + strong border. Still clearly reads as "active" without
     shouting. Same ghost pattern the Filter popover will adopt when
     it ships. */
  .leads-table-btn--active {
    background: var(--surface-tint);
    border-color: var(--border-strong);
    color: var(--text-primary);
    font-weight: 600;
    box-shadow: none;
  }
  .leads-table-btn--active:hover {
    background: var(--row-hover);
    border-color: var(--text-secondary);
  }
  .leads-table-btn-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    padding: 0 6px;
    background: var(--accent-blue);
    color: var(--panel);
    font-size: 10px;
    font-weight: 600;
    border-radius: var(--r-pill);
    line-height: 1;
  }

  /* Table grid — header + body share identical column widths.
     Widths are tuned for an ~880px content area on desktop; tablet and
     mobile collapse via the @media rules at the bottom of this stylesheet. */
  .leads-table-head,
  .leads-row {
    display: grid;
    grid-template-columns:
      minmax(180px, 2.2fr)  /* Nom (avatar + name + email)   */
      minmax(100px, 1fr)    /* Budget                         */
      minmax(140px, 1.4fr)  /* Zone · timeline                */
      minmax(90px,  0.9fr)  /* Score chip                     */
      minmax(70px,  0.8fr)  /* Agent avatar                   */
      minmax(72px,  0.9fr); /* Date                           */
    gap: 14px;
    align-items: center;
  }
  /* Select-mode variant: prepend a 44px checkbox column. Applied via
     --selectable modifier set on the head and body when state.selectionMode. */
  .leads-table-head--selectable,
  .leads-table-body--selectable .leads-row {
    grid-template-columns:
      44px                  /* Checkbox (fixed width)        */
      minmax(180px, 2.2fr)
      minmax(100px, 1fr)
      minmax(140px, 1.4fr)
      minmax(90px,  0.9fr)
      minmax(70px,  0.8fr)
      minmax(72px,  0.9fr);
  }
  .leads-table-head {
    padding: 12px 22px 10px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.3px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border-subtle);
  }
  .leads-table-body { display: block; }
  .leads-row {
    padding: 14px 22px;
    border-bottom: 1px solid var(--border-subtle);
    cursor: pointer;
    transition: background 80ms ease;
  }
  .leads-row:hover { background: var(--row-hover); }
  .leads-row[data-selected="true"] { background: #F2F5FF; }
  .leads-row--picked { background: #EEF2FF; }
  .leads-row--picked:hover { background: #E0E7FF; }
  .leads-row:last-child { border-bottom: 0; }

  /* Sortable column header — clickable. Muted double-chevron when idle,
     coloured arrow when active. Reset button reset + hover affordance. */
  .leads-col-header {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 0;
    background: transparent;
    border: 0;
    font-family: inherit;
    font-size: inherit;
    font-weight: inherit;
    color: inherit;
    text-transform: inherit;
    letter-spacing: inherit;
    cursor: pointer;
    user-select: none;
    text-align: left;
  }
  .leads-col-header:hover { color: var(--text-primary); }
  .leads-col-header[aria-sort="ascending"],
  .leads-col-header[aria-sort="descending"] { color: var(--text-primary); }
  .leads-col-sort {
    display: inline-flex;
    align-items: center;
    flex-shrink: 0;
  }
  .leads-col-sort svg {
    width: 12px;
    height: 12px;
    stroke-width: 2;
  }
  .leads-col-sort--idle { opacity: 0.45; }
  .leads-col-sort--active {
    color: var(--accent-blue);
    opacity: 1;
  }

  /* Checkbox column + checkbox cell visual. The input itself isn't rendered —
     the row click is the toggle, and we draw a styled span with an optional
     check icon inside. Keeps the tap-target large and the visual crisp. */
  .leads-col--check {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .leads-col-header--check {
    padding: 0;                /* override cell padding, center the box */
    justify-content: center;
    cursor: pointer;
  }
  .leads-checkbox {
    width: 18px;
    height: 18px;
    border-radius: 5px;
    border: 1.5px solid var(--border-strong);
    background: var(--panel);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--panel);
    transition: background 100ms ease, border-color 100ms ease;
  }
  .leads-checkbox svg { width: 12px; height: 12px; stroke-width: 3; }
  .leads-checkbox--on {
    background: var(--accent-blue);
    border-color: var(--accent-blue);
    color: var(--panel);
  }
  .leads-col-header--check:hover .leads-checkbox:not(.leads-checkbox--on) {
    border-color: var(--accent-blue);
  }

  /* Bulk action bar: lives inside the table card at the bottom. When
     selection > 0, it enters from below. Sticky to the card's bottom edge
     during scroll — sits visually on top of the last row without a gap. */
  .leads-bulk-bar {
    position: sticky;
    bottom: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 22px;
    background: var(--panel);
    border-top: 1px solid var(--border-subtle);
    box-shadow: 0 -6px 18px -12px rgba(15, 23, 42, 0.18);
  }
  .leads-bulk-bar-count {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: -0.05px;
  }
  .leads-bulk-bar-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-blue);
    flex-shrink: 0;
  }
  /* v0.9.1 — hidden-count hint inside the bulk bar. Renders when the
     selection includes leads outside the current filter/search view. */
  .leads-bulk-bar-hidden {
    color: var(--text-muted);
    font-weight: 400;
  }
  .leads-bulk-bar-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    flex-wrap: wrap;
  }
  .leads-bulk-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 32px;
    padding: 0 11px;
    background: var(--panel);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-sm);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
    letter-spacing: -0.05px;
    transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
  }
  .leads-bulk-btn:hover {
    background: var(--row-hover);
    border-color: var(--border-strong);
  }
  .leads-bulk-btn svg { width: 13px; height: 13px; stroke-width: 2; }
  .leads-bulk-btn--danger { color: #B91C1C; }
  .leads-bulk-btn--danger:hover {
    background: #FEE2E2;
    border-color: #F5A5A5;
    color: #7F1D1D;
  }
  .leads-bulk-bar-clear {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: transparent;
    border: 0;
    color: var(--text-muted);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 120ms ease, color 120ms ease;
  }
  .leads-bulk-bar-clear:hover {
    background: var(--row-hover);
    color: var(--text-primary);
  }
  .leads-bulk-bar-clear svg { width: 16px; height: 16px; stroke-width: 2; }

  .leads-col { min-width: 0; }
  .leads-col--nom {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .leads-col-nom-text { min-width: 0; }
  .leads-col-nom-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: -0.1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .leads-col-nom-email {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  /* v0.10 fix — body-cell type styles scoped to body rows only.
     Prior to v0.10, .leads-col--budget/zone/date were unscoped and also
     styled the column header buttons (which share the same class names),
     causing font-leak in header labels. */
  .leads-table-body .leads-col--budget {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.2px;
  }
  .leads-table-body .leads-col--zone {
    font-size: 13px;
    color: var(--text-body);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .leads-table-body .leads-col--date {
    font-size: 12px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .leads-row-agent { display: inline-flex; align-items: center; flex-shrink: 0; }
  .leads-row-agent--none {
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 400;
  }

  /* Score pill inside the table row — sized slightly smaller than the
     standalone .score-chip elsewhere in the app. */
  .leads-col--score .score-chip {
    font-size: 11px;
    padding: 3px 9px;
  }

  /* Empty-state inside the leads table card. Softer than the main app
     empty-state — visually a panel at the spot where rows would have been. */
  .leads-empty {
    padding: 48px 24px;
    text-align: center;
  }
  .leads-empty-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 6px;
  }
  .leads-empty-body {
    font-size: 13px;
    color: var(--text-secondary);
    max-width: 440px;
    margin: 0 auto;
    line-height: 1.55;
  }

  /* ═══════════════════════════════════════════════════════════════
     LEADS — mobile card layout (v0.10.0)
     Renders below 600px viewport (see media query at end of stylesheet).
     Card-per-lead replaces the 6-column table which doesn't fit phone
     widths. Structure: avatar (left, centered) + content block (name +
     summary + source/date stacked) + activity badge stack (right).
     Left accent bar triggers when lead has zero activity entries.
     Click anywhere on card opens drawer (or toggles selection in
     select mode) via the existing row-click action.
     ═══════════════════════════════════════════════════════════════ */
  .leads-cards-list {
    display: none;  /* hidden by default; shown below 600px */
  }
  .leads-card {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border-subtle);
    cursor: pointer;
    transition: background 100ms ease;
    font-family: inherit;
    text-align: left;
    background: transparent;
  }
  .leads-card:last-child { border-bottom: none; }
  .leads-card:hover { background: var(--surface-tint); }
  .leads-card:active { background: var(--hover-warm); }
  .leads-card--picked { background: var(--blue-soft); }
  .leads-card[data-selected="true"] { background: var(--blue-soft); }

  /* Left accent bar — inserted via ::before so it's one rule, paints
     inside the card's left padding. Only visible when lead is untouched
     (no activity entries). Uses --type-accent so it re-palettes with
     the buyer/seller toggle. */
  .leads-card--untouched::before {
    content: "";
    position: absolute;
    left: 0;
    top: 10px;
    bottom: 10px;
    width: 3px;
    background: var(--type-accent);
    border-radius: 0 2px 2px 0;
  }

  /* Content column — name + summary + source/date stacked tight.
     flex:1 takes remaining width after avatar + activity stack. */
  .leads-card-content {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .leads-card-row1 {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .leads-card-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
    flex: 1;
  }
  .leads-card-row1 .score-chip {
    font-size: 10px;
    padding: 2px 8px;
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0;
  }
  .leads-card-row1 .score-chip-dot { width: 6px; height: 6px; }

  .leads-card-summary {
    font-size: 13px;
    color: var(--text-body);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .leads-card-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .leads-card-meta .source-chip {
    width: 20px;
    height: 20px;
  }
  .leads-card-meta .source-chip svg {
    width: 11px;
    height: 11px;
  }
  .leads-card-date { font-variant-numeric: tabular-nums; }

  /* Activity badge stack — right column, top-aligned, vertical. Shows
     one badge per distinct activity type present on the lead (call,
     email, whatsapp, note). Outline-only done style: muted grey border,
     muted icon, transparent fill. Sits quietly alongside the name /
     score chip without competing. Not clickable — card-level tap
     handles everything. */
  .leads-card-activity {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
    width: 20px;
    padding-top: 2px;
  }
  /* v0.10.2 — badges now ALWAYS show all 4 action types per lead.
     .activity-badge--done: action has been taken. Solid border, muted
       secondary color — reads as "checked off."
     .activity-badge--pending: action not yet taken. Dashed border +
       muted-er color — reads as "yet to do, not yet a signal."
     Slightly smaller than v0.10.1 (20px vs 24px) to reduce visual
     weight in the card's right column. */
  .activity-badge {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    flex-shrink: 0;
  }
  .activity-badge--done {
    border: 1px solid var(--text-secondary);
    color: var(--text-secondary);
  }
  .activity-badge--pending {
    border: 1px dashed var(--border-strong);
    color: var(--text-muted);
  }
  .activity-badge svg {
    width: 11px;
    height: 11px;
    stroke-width: 2;
  }

  /* Select-mode checkbox on the card — slides in on the left (before
     avatar in DOM order). Same visual as the table row's .leads-checkbox. */
  .leads-card-checkbox {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    border: 1.5px solid var(--border-strong);
    background: var(--panel);
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .leads-card-checkbox--on {
    background: var(--text-primary);
    border-color: var(--text-primary);
  }
  .leads-card-checkbox--on svg {
    width: 12px;
    height: 12px;
    stroke: white;
    stroke-width: 2.5;
  }

  /* ═══════════════════════════════════════════════════════════════
     LEADS — toggle + type-accent surface cues.
     Everything type-aware reads from --type-accent / --type-accent-bg /
     --type-accent-strong, which are set on the .leads mode-* root
     class. Flipping the toggle re-palettes the whole surface in one
     place. The stage KPI cards, table card header icon, and toggle
     tabs all pick up these variables.
     ═══════════════════════════════════════════════════════════════ */
  .leads {
    --type-accent:        var(--accent-blue);
    --type-accent-bg:     var(--blue-soft);
    --type-accent-strong: var(--accent-blue);
  }
  .leads.mode-seller {
    --type-accent:        #8C5A08;              /* amber-deep (readable) */
    --type-accent-bg:     var(--amber-soft);
    --type-accent-strong: var(--accent-amber);  /* vibrant for the strip */
  }

  /* v0.10.3 — §10b toggle redesign (V11).
     Replaces: 4px top band, pill-shaped segmented toggle, and
     context-chip meta row. New structure is three blocks stacked:
       1. .leads-title       — H1 with active mode accented inline
       2. .leads-mode-card   — slim split card, icon+label per half
       3. .leads-meta-row    — context chip + "Mis à jour" timestamp
     The --type-accent CSS custom properties (set on .leads root) are
     unchanged — KPI active card + untouched-card left bar continue
     reading from them. Only the page-top chrome changes. */

  /* Page title. Active mode is accented (picks up --type-accent)
     and sits inline with a muted "Prospects ·" prefix. */
  .leads .leads-title {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 10px;
    letter-spacing: -0.015em;
  }
  .leads .leads-title-prefix {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    position: relative;
    top: -2px;
    letter-spacing: 0;
  }
  .leads .leads-title-mode {
    font-size: 22px;
    font-weight: 700;
    color: var(--type-accent);
  }

  /* Split-card toggle — slim, natural width, left-aligned.
     Shorter than a KPI card (no count, just icon + label). Single
     card visually, two halves separated by a 1px vertical divider.
     Active half is filled with type-accent-bg; inactive half stays
     white with muted content. */
  .leads .leads-mode-card {
    display: inline-grid;
    grid-template-columns: 1fr auto 1fr;
    background: var(--panel);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-sm);
    overflow: hidden;
    box-shadow: var(--shadow-xs);
    margin-bottom: 10px;
  }
  .leads .leads-mode-half {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    background: transparent;
    border: 0;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: -0.005em;
    cursor: pointer;
    white-space: nowrap;
    transition: background 120ms ease, color 120ms ease;
    min-width: 160px;  /* prevent the halves from collapsing below icon+label */
  }
  .leads .leads-mode-half:hover:not([aria-selected="true"]) {
    background: var(--surface-tint);
    color: var(--text-primary);
  }
  .leads .leads-mode-half-ico {
    width: 22px;
    height: 22px;
    border-radius: 999px;
    background: var(--surface-tint);
    display: grid;
    place-items: center;
    color: var(--text-muted);
    flex-shrink: 0;
    transition: background 120ms ease, color 120ms ease;
  }
  .leads .leads-mode-half-ico svg {
    width: 12px;
    height: 12px;
    stroke-width: 2;
  }
  .leads .leads-mode-half[aria-selected="true"] {
    background: var(--type-accent-bg);
    color: var(--type-accent);
    font-weight: 600;
  }
  .leads .leads-mode-half[aria-selected="true"] .leads-mode-half-ico {
    background: var(--type-accent-strong);
    color: var(--panel);
  }
  .leads-mode-divider {
    width: 1px;
    background: var(--border-subtle);
    align-self: stretch;
  }

  /* Meta row — context chip (type count in words) + "Mis à jour"
     timestamp. Same content as the old toggle-row remnants, now on
     its own line below the mode card. */
  .leads .leads-meta-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .leads .leads-context-chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 4px 10px;
    border-radius: var(--r-xs);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: -0.1px;
    white-space: nowrap;
    background: var(--panel);
    border: 1px solid var(--border-subtle);
    color: var(--text-secondary);
  }
  .leads .leads-context-chip svg {
    width: 12px;
    height: 12px;
    stroke-width: 2;
    flex-shrink: 0;
    color: var(--text-muted);
  }
  /* ═══════════════════════════════════════════════════════════════
     RESPONSIVE (placed last so these override all base rules
     regardless of the order base rules appear above)
     ═══════════════════════════════════════════════════════════════ */
  @media (max-width: 1024px) {
    :root { --sidebar-w: 208px; }
    .topbar { padding: 0 24px; }
    .content { padding: 0 24px 24px; }
    .search { width: 240px; }

    /* Leads Layer 2 — tablet narrows search. Stage cards handled by
       progressive-hide rules below (see .stage-card--prio-N). */
    .leads-search { width: 200px; }
  }

  /* v0.10 — stage KPI progressive-hide breakpoints.
     Priority order 0..5 (most→least important, see STAGE_PRIORITY).
     As viewport narrows, lowest-priority cards (index 5, 4, ...) hide.
     Active filter card never hides — override at the bottom. */
  @media (max-width: 1280px) { .stage-card--prio-5 { display: none; } }
  @media (max-width: 1024px) { .stage-card--prio-4 { display: none; } }
  @media (max-width: 860px)  { .stage-card--prio-3 { display: none; } }
  @media (max-width: 720px)  { .stage-card--prio-2 { display: none; } }
  /* v0.10.0 — 560px rule removed. Previously hid prio-1 at phone
     width, collapsing the KPI row to 1 card. The two cross-cutting
     cards (Leads aujourd'hui, Non assignés at prio 0-1) are the most
     valuable glance data on mobile, so both stay visible at all
     widths. Pipeline cards (prio 2+) still hide progressively — stage
     filtering at phone width belongs in the Filter popover. */
  /* The active filter card is preserved regardless of priority — ensures
     a user filtering by "Converti" at narrow width still sees that card
     so they can deselect it. Highest specificity wins over hide rules. */
  .stage-cards .stage-card--active { display: flex !important; }

  @media (max-width: 768px) {
    /* Leads Layer 2 — mobile: stage gap tightens, cards keep same flex
       row (progressive hide handles card count). Table header stacks.
       Below ~600px, the mobile card fallback replaces the table (see
       .leads-cards-list). */
    .stage-cards { gap: 8px; }
    .stage-card { padding: 14px; }
    .stage-card-count { font-size: 22px; }

    .leads-table-header { padding: 14px 16px; }
    .leads-table-header-title { flex: 1 1 100%; }
    .leads-table-header-actions {
      flex: 1 1 100%;
      justify-content: flex-start;
    }
    .leads-search { width: 100%; flex: 1 1 200px; }

    .leads-table-head,
    .leads-row {
      padding-left: 16px;
      padding-right: 16px;
      gap: 10px;
    }
    .leads-updated-meta { flex: 1 1 100%; margin-left: 0; }

    /* v0.10.3 — V11 mode card goes full-width on mobile so both
       halves get generous tap targets; title scales down. */
    .leads .leads-mode-card { display: grid; width: 100%; }
    .leads .leads-mode-half { min-width: 0; justify-content: center; }
    .leads .leads-title-mode { font-size: 20px; }
    .leads .leads-title-prefix { font-size: 12px; top: -1px; }

    /* Mobile bulk bar: wrap; drop count-text on tight widths via min-widths */
    .leads-bulk-bar {
      padding: 10px 16px;
      flex-wrap: wrap;
    }
    .leads-bulk-bar-actions { gap: 5px; }
    .leads-bulk-btn { padding: 0 9px; font-size: 11px; }
    .leads-bulk-btn span { display: none; }  /* icons only on mobile */
    .leads-bulk-btn { height: 30px; width: 36px; justify-content: center; padding: 0; }

/* "buyer" → "Acquéreur", "seller" → "Vendeur". Falls back to the raw key. */
function typeLabel(typeKey) {
  return { buyer: "Acquéreur", seller: "Vendeur" }[typeKey] || typeKey;
}

/* Look up a stage label from the agency pipeline. "lost" is a terminal state
   outside the pipeline array — renders as "Perdu". Unknown ids fall back to
   the id itself so missing data is visible rather than silently blank. */
function stageLabel(typeKey, stageId) {
  if (stageId === "lost") return "Perdu";
  const pipeline = state.agency.pipeline[typeKey] || [];
  const stage = pipeline.find(s => s.id === stageId);
  return stage ? stage.label : stageId;
}

/* Stage id → { bg, fg } pill colors. Values chosen to match DESIGN_SPEC §8
   status semantics (new = blue, progress = violet, qualified = green,
   converted = dark green, terminal-fail = red, amber for offer/mandate-signed).
   Buyer and seller stage ids share colors where the semantic matches
   ("contacted" same in both, "converted" ↔ "sold" both dark green, etc.).
   If the status CSS tokens get formalized in :root later, swap hex for var(). */
function stageColors(stageId) {
  // bg   = soft tint (icon badge on default card, card surface on active)
  // fg   = mid-saturation color (icon stroke, active-state label/accent)
  // deep = dark variant for bold text on the tinted surface (active card's count)
  return {
    // Buyer pipeline
    to_process:      { bg: "#E8ECFF", fg: "#5B6DFF", deep: "#2A3AB8" },  // blue — fresh
    contacted:       { bg: "#EDE7FF", fg: "#6D48DB", deep: "#3E2595" },  // violet — in motion
    qualified:       { bg: "#E4F4E9", fg: "#2F9D6F", deep: "#15653E" },  // green — qualified
    visit_planned:   { bg: "#E8ECFF", fg: "#5B6DFF", deep: "#2A3AB8" },  // blue — progressing
    offer_made:      { bg: "#FBF0DC", fg: "#8C5A08", deep: "#5A3A05" },  // amber — committed
    converted:       { bg: "#D8EEDF", fg: "#1F7D54", deep: "#0D5034" },  // dark green — won
    // Seller pipeline (shared where semantically equivalent)
    estimation_sent: { bg: "#EDE7FF", fg: "#6D48DB", deep: "#3E2595" },  // violet
    appointment:     { bg: "#E8ECFF", fg: "#5B6DFF", deep: "#2A3AB8" },  // blue
    mandate_signed:  { bg: "#FBF0DC", fg: "#8C5A08", deep: "#5A3A05" },  // amber
    sold:            { bg: "#D8EEDF", fg: "#1F7D54", deep: "#0D5034" },  // dark green
    // Terminal
    lost:            { bg: "#FDE7E7", fg: "#C44343", deep: "#7A1F1F" },  // red
  }[stageId] || { bg: "#F4F4F6", fg: "#6E6B64", deep: "#3B3A35" };       // fallback = neutral
}

/* Price field differs by type — buyers declare a budget range, sellers
   state an expected price. Both are pre-formatted strings with € suffix. */
function leadPrice(lead) {
  return lead.type === "seller" ? lead.expectedPrice : lead.budget;
}

/* Timeline likewise differs — buyer.timeline is purchase horizon,
   seller.sellingTimeline is listing horizon. */
function leadTimeline(lead) {
  return lead.type === "seller" ? lead.sellingTimeline : lead.timeline;
}

/* French formatter for the ISO createdAt field. Stored ISO (sortable),
   displayed French. When the backend lands and real timestamps come
   in, this is the single function to upgrade (moment/intl).

   v0.10.4 — Path A shipped. createdAt is now a full ISO datetime
   string ("2026-04-18T10:15:00Z" in state). The formatter gained a
   `showTime` opt + a `longMonth` opt so the mobile card can render
   "06 avril · à 16h35" (full month name + middle-dot separator +
   French time style `16h35`) while the desktop table keeps its
   terse "18 avr. 2026" (abbreviated month + year, no time).

   Options:
     - showYear   (default true)   append " 2026"
     - showTime   (default false)  append " · à 16h35"
     - longMonth  (default false)  use "avril" instead of "avr."
   Non-ISO or malformed input falls through as-is so bugs are visible.
*/
const MONTHS_FR_SHORT = ["janv.", "févr.", "mars", "avr.", "mai", "juin",
                         "juil.", "août", "sept.", "oct.", "nov.", "déc."];
const MONTHS_FR_LONG  = ["janvier", "février", "mars", "avril", "mai", "juin",
                         "juillet", "août", "septembre", "octobre", "novembre", "décembre"];
function formatLeadDate(iso, opts) {
  if (!iso) return "—";
  // Accept both date-only "YYYY-MM-DD" and full ISO "YYYY-MM-DDTHH:MM:SSZ".
  // Date portion is always the first 10 chars; the T marker splits off time.
  const datePart = iso.slice(0, 10);
  const [y, m, d] = datePart.split("-").map(Number);
  if (!y || !m || !d) return iso;  // malformed — show raw
  const showYear   = !opts || opts.showYear !== false;
  const showTime   = opts && opts.showTime === true;
  const longMonth  = opts && opts.longMonth === true;
  const monthName  = (longMonth ? MONTHS_FR_LONG : MONTHS_FR_SHORT)[m - 1];
  let out = `${String(d).padStart(2, "0")} ${monthName}`;
  if (showYear) out += ` ${y}`;
  if (showTime && iso.length >= 16 && iso.charAt(10) === "T") {
    // Extract HH:MM from the ISO; render as French-style "16h35".
    const hh = iso.slice(11, 13);
    const mm = iso.slice(14, 16);
    out += ` · à ${hh}h${mm}`;
  }
  return out;
}

/* Extract numeric budget for sort. budget/expectedPrice are formatted strings
   like "1 200 000 €" — strip non-digits and parse. Missing values sort last
   (returned Infinity in asc, -Infinity conceptually in desc via sign flip).
   Returns 0 if nothing numeric (unset). */
function leadPriceNumeric(lead) {
  const raw = lead.type === "seller" ? lead.expectedPrice : lead.budget;
  if (!raw) return 0;
  const digits = String(raw).replace(/\D/g, "");
  return digits ? parseInt(digits, 10) : 0;
}

/* score sort order: hot > warm > cold (decreasing urgency).
   Unknown scores sort last. */
const SCORE_ORDER = { hot: 3, warm: 2, cold: 1 };
function leadScoreOrder(lead) { return SCORE_ORDER[lead.score] || 0; }

/* Agent name lookup for sort. Unassigned leads sort as empty string (top in
   asc, bottom in desc). */
function leadAgentName(lead) {
  if (lead.assignedAgentId == null) return "";
  const agent = state.team.find(t => t.id === lead.assignedAgentId);
  return agent ? agent.name : "";
}

/* Sort comparator factory. Returns a function (a, b) => number per column.
   Direction applied by the caller (multiply result by -1 for desc). */
function leadComparator(column) {
  switch (column) {
    case "name":   return (a, b) => a.name.localeCompare(b.name,   "fr");
    case "budget": return (a, b) => leadPriceNumeric(a) - leadPriceNumeric(b);
    case "zone":   return (a, b) => (a.zone || "").localeCompare(b.zone || "", "fr");
    case "score":  return (a, b) => leadScoreOrder(a) - leadScoreOrder(b);
    case "agent":  return (a, b) => leadAgentName(a).localeCompare(leadAgentName(b), "fr");
    case "date":   return (a, b) => (a.createdAt || "").localeCompare(b.createdAt || "");  // ISO string compare = chronological
    default:       return (a, b) => a.id - b.id;
  }
}

/**
 * Button primitive. Every clickable text-action uses this.
 * Icon-only buttons use `.icon-btn` directly (topbar plus/bell).
 *
 *   variant: "default" | "primary" | "ghost" | "danger"   (default: "default")
 *   size:    "sm" | "md" | "lg"                           (default: "md")
 *   block:   boolean — full-width                         (default: false)
 *   icon:    SVG string (from icon.*()) placed before label
 *   label:   button text
 *   action:  data-action value to dispatch on click
 *   disabled: boolean
 *   extra:   additional class names (rare)
 */
function renderButton({ variant = "default", size = "md", block = false, icon = "", label = "", action = "", disabled = false, extra = "" } = {}) {
  const classes = [
    "btn",
    variant !== "default" && `btn--${variant}`,
    size !== "md" && `btn--${size}`,
    block && "btn--block",
    extra,
  ].filter(Boolean).join(" ");
  const attrs = [
    `class="${classes}"`,
    action ? `data-action="${action}"` : "",
    disabled ? `disabled aria-disabled="true"` : "",
  ].filter(Boolean).join(" ");
  return `<button ${attrs}>${icon}${label ? `<span>${label}</span>` : ""}</button>`;
}
