<!doctype html>
<!--
  Open House Prospects — Step 1 Shell
  v0.6.1 — drawer integrated + mobile fix + route placeholders
  Reference: docs/DESIGN_SPEC.md
  Workflow: docs/DESIGN_PROTOCOL.md

  Changes vs v0.5.1:
  - Drawer (lead detail panel) integrated. Click any lead card to open.
    Structure matches drawer_mockup.html: below-topbar, respects-sidebar, 480px,
    no backdrop, clickable cards behind. Mobile: full-screen takeover, back-arrow
    replaces close-X, tabs scroll horizontally, body-scroll locked.
  - 6 dummy leads added to state.leads (schema preview of DATA_MODEL.md).
    Step 2 will swap these cards for a real table row structure; the drawer
    contract stays the same (state.drawer = { leadId, tab }).
  - Drawer contents are placeholder — 4 tabs (Infos, Qualification, Activité,
    Notes), clicking each switches the active tab but the body still shows the
    placeholder. Real form/timeline/notes content lands in Step 3.
  - ESC key closes drawer/menus/sidebar (a11y).
  - Clicking the same lead twice toggles the drawer closed; clicking a
    different lead swaps contents without re-animating.
  - CSS architecture: media queries moved to end of stylesheet (mobile-first
    cascade) — previously desktop .drawer{width:480px} was overriding the
    mobile width:100% rule due to source order.
  - Route-aware content: non-Leads routes now show "à venir" placeholder
    instead of incorrectly showing Leads content.
  - Removed unused tokens: --accent-purple, --accent-pink, --purple-soft,
    --pink-soft. Added --violet-soft for the "En cours" status pill.
-->
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Open House Prospects</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
  /* ═══════════════════════════════════════════════════════════════
     DESIGN TOKENS — single source of truth. Every color, radius,
     shadow, font-size lives here. No magic numbers below this block.
     ═══════════════════════════════════════════════════════════════ */
  :root {
    /* Neutrals — cool palette (locked) */
    --frame:          #F5F5F7;
    --sidebar-bg:     #FAFAFB;
    --panel:          #FFFFFF;
    --surface-tint:   #F4F4F6;  /* general tint surface */
    --hover-warm:     #EFEFF2;  /* nav hover (name retained from warm era — it's just "hover") */
    --active-warm:    #E7E7EC;  /* nav active */
    --row-hover:      #FAFAFB;

    --border-subtle:  #ECECEF;
    --border-divider: #E6E6EA;
    --border-strong:  #D8D8DE;  /* NEW — visible borders (icon buttons, user menu, search) */

    --text-primary:   #1C1C1F;
    --text-body:      #3D3A35;
    --text-secondary: #6E6B64;
    --text-muted:     #9B9892;

    /* Accents */
    --accent-blue:    #5B6DFF;
    --accent-green:   #4CC38A;
    --accent-red:     #FF6B6B;
    --accent-amber:   #F5B94C;

    /* Accent-soft (badge tints) */
    --blue-soft:   #E8ECFF;
    --green-soft:  #E4F4E9;
    --red-soft:    #FDE7E7;
    --amber-soft:  #FBF0DC;
    --violet-soft: #EDE7FF;  /* for "En cours" status pill */

    /* Radius */
    --r-xs: 6px;
    --r-sm: 10px;
    --r-md: 14px;
    --r-lg: 16px;
    --r-xl: 20px;
    --r-pill: 999px;

    /* Shadow */
    --shadow-none:   none;
    --shadow-xs:     0 1px 2px rgba(0,0,0,0.02);
    --shadow-sm:     0 2px 8px rgba(0,0,0,0.03);
    --shadow-md:     0 8px 24px rgba(0,0,0,0.04);
    --shadow-shell:  0 8px 32px rgba(0,0,0,0.04);
    --shadow-drawer: -12px 0 40px rgba(0,0,0,0.08);

    /* Type */
    --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;

    /* Layout */
    --sidebar-w: 260px;
    --header-h: 88px;
    --shell-pad: 24px;
  }

  /* Cool palette is now the default — warm A/B toggle removed at design lock */

  /* ═══════════════════════════════════════════════════════════════
     BASE
     ═══════════════════════════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-sans);
    background: var(--frame);
    color: var(--text-body);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  input, select { font: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border-divider); border-radius: var(--r-pill); }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ═══════════════════════════════════════════════════════════════
     APP SHELL
     ═══════════════════════════════════════════════════════════════ */
  .app-shell {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    min-height: 100vh;
    background: var(--frame);
  }

  /* ───────── Sidebar ───────── */
  .sidebar {
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border-divider);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 8px;
    margin-bottom: 16px;
  }
  .brand-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, #5B6DFF 0%, #9B7CFF 100%);
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 3px;
    padding: 6px;
  }
  .brand-mark span {
    background: rgba(255,255,255,0.9);
    border-radius: 2px;
  }
  .brand-mark span:nth-child(2) { background: rgba(255,255,255,0.6); }
  .brand-mark span:nth-child(3) { background: rgba(255,255,255,0.7); }
  .brand-mark span:nth-child(4) { background: rgba(255,255,255,0.95); }

  .brand-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.2px;
  }

  /* Agency + city switcher */
  .agency-switcher {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    cursor: pointer;
    margin-bottom: 20px;
    transition: border-color 120ms ease, background 120ms ease;
  }
  .agency-switcher:hover { background: var(--hover-warm); }
  .agency-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #1C1C1F;
    color: #fff;
    display: grid;
    place-items: center;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: -0.2px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .agency-avatar[data-variant="logo"] {
    background: #FFFFFF;
    border: 1px solid var(--border-strong);
    padding: 4px;
  }
  .agency-avatar img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .agency-text {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    line-height: 1.2;
  }
  .agency-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .agency-city {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .agency-city svg {
    width: 11px;
    height: 11px;
    display: inline-block;
    vertical-align: -1px;
    margin-right: 3px;
    stroke-width: 2;
    color: var(--text-muted);
  }
  .agency-switcher > svg { color: var(--text-muted); flex-shrink: 0; transition: transform 160ms ease; }
  .agency-switcher[aria-expanded="true"] > svg { transform: rotate(180deg); }

  .agency-switcher-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  .agency-switcher-wrap .agency-switcher { margin-bottom: 0; }

  .agency-menu {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    box-shadow: var(--shadow-md);
    padding: 6px;
    z-index: 40;
  }
  .agency-menu-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 6px 10px 4px;
  }
  .agency-menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: var(--r-xs);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-body);
    cursor: pointer;
    transition: background 100ms ease;
  }
  .agency-menu-item svg {
    width: 14px;
    height: 14px;
    color: var(--text-muted);
    flex-shrink: 0;
    stroke-width: 2;
  }
  .agency-menu-item span {
    flex: 1;
  }
  .agency-menu-item:hover { background: var(--hover-warm); }
  .agency-menu-item[data-active="true"] {
    color: var(--text-primary);
    font-weight: 600;
  }
  .agency-menu-item[data-active="true"] svg:last-child {
    color: var(--accent-blue);
  }

  /* Section label */
  .nav-section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: 0.8px;
    padding: 0 10px;
    margin: 0 0 8px;
    text-transform: uppercase;
  }
  .nav-group + .nav-group { margin-top: 20px; }

  /* Nav items */
  .nav-list { list-style: none; padding: 0; margin: 0; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 40px;
    padding: 0 10px;
    border-radius: var(--r-sm);
    color: var(--text-body);
    cursor: pointer;
    transition: background 120ms ease;
    position: relative;
  }
  .nav-item svg {
    width: 16px;
    height: 16px;
    color: var(--text-secondary);
    flex-shrink: 0;
    stroke-width: 1.5;
  }
  .nav-item-label {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
  }
  .nav-item-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    background: var(--panel);
    padding: 2px 7px;
    border-radius: var(--r-pill);
    border: 1px solid var(--border-subtle);
  }
  .nav-item:hover { background: var(--hover-warm); }
  .nav-item[data-active="true"] {
    background: var(--active-warm);
  }
  .nav-item[data-active="true"] .nav-item-label { font-weight: 600; color: var(--text-primary); }
  .nav-item[data-active="true"] svg { color: var(--text-primary); }

  /* Sidebar footer */
  .sidebar-spacer { flex: 1; }

  .sidebar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 10px;
    height: 40px;
    color: var(--text-secondary);
    font-size: 14px;
  }
  .sidebar-row svg { width: 16px; height: 16px; stroke-width: 1.5; }
  .sidebar-row-label { flex: 1; }

  /* Toggle switch */
  .switch {
    position: relative;
    width: 32px;
    height: 18px;
    border-radius: var(--r-pill);
    background: var(--border-divider);
    cursor: pointer;
    transition: background 140ms ease;
  }
  .switch::after {
    content: "";
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
    box-shadow: var(--shadow-xs);
    transition: transform 160ms cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .switch[data-on="true"] { background: var(--text-primary); }
  .switch[data-on="true"]::after { transform: translateX(14px); }

  /* Help / info card at bottom */
  .sidebar-card {
    margin-top: 16px;
    padding: 16px;
    border-radius: var(--r-md);
    background: var(--blue-soft);
    border: 1px solid rgba(91, 109, 255, 0.12);
  }
  .sidebar-card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  .sidebar-card-body {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 12px;
    line-height: 1.4;
  }
  /* Sidebar feedback-card CTA.
     Intentionally NOT using .btn — this is tuned to the card's compact container.
     Generic buttons (drawer, forms, filters) use the .btn system. */
  .sidebar-card-cta {
    display: block;
    width: 100%;
    padding: 8px 12px;
    background: var(--text-primary);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    border-radius: var(--r-sm);
    text-align: center;
    transition: background 120ms ease;
  }
  .sidebar-card-cta:hover { background: #000; }

  /* ═══════════════════════════════════════════════════════════════
     MAIN CONTENT
     ═══════════════════════════════════════════════════════════════ */
  .main {
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  /* ───────── Top header ───────── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 30;
    height: var(--header-h);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    background: var(--frame);
    transition: box-shadow 180ms ease;
  }
  .topbar[data-scrolled="true"] {
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06), 0 8px 24px rgba(0, 0, 0, 0.04);
  }
  .page-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.4px;
    margin: 0;
  }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .topbar-actions-icons {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Avatar stack */
  .avatar-stack {
    display: flex;
    align-items: center;
  }
  .avatar-stack .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--frame);
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    display: grid;
    place-items: center;
    margin-left: -10px;
  }
  .avatar-stack .avatar:first-child { margin-left: 0; }
  .avatar-more {
    margin-left: -10px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--panel);
    border: 2px solid var(--frame);
    color: var(--text-secondary);
    font-size: 11px;
    font-weight: 600;
    display: grid;
    place-items: center;
    box-shadow: var(--shadow-xs);
  }

  /* Icon button */
  .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    color: var(--text-body);
    display: grid;
    place-items: center;
    position: relative;
    box-shadow: var(--shadow-xs);
    transition: all 120ms ease;
  }
  .icon-btn:hover {
    border-color: var(--text-muted);
    color: var(--text-primary);
    box-shadow: var(--shadow-sm);
  }
  .icon-btn svg { width: 18px; height: 18px; stroke-width: 2; }

  .notif-badge {
    position: absolute;
    top: -3px;
    right: -3px;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    border-radius: var(--r-pill);
    background: var(--accent-red);
    color: #fff;
    font-size: 9px;
    font-weight: 600;
    display: grid;
    place-items: center;
    border: 2px solid var(--frame);
    line-height: 1;
  }

  /* ═══════════════════════════════════════════════════════════════
     BUTTON SYSTEM (Option B — Bordered clean)
     Locked in Step 1. Every clickable text-action in the product
     uses these classes. Icon-only buttons use .icon-btn instead.
     ═══════════════════════════════════════════════════════════════ */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 9px 14px;
    font: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-body);
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    cursor: pointer;
    white-space: nowrap;
    box-shadow: var(--shadow-xs);
    transition: all 120ms ease;
  }
  .btn svg {
    width: 15px;
    height: 15px;
    stroke-width: 1.75;
    flex-shrink: 0;
  }
  .btn:hover {
    border-color: var(--text-muted);
    box-shadow: var(--shadow-sm);
  }
  .btn:active {
    transform: translateY(0.5px);
  }
  .btn:disabled,
  .btn[aria-disabled="true"] {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* Variants */
  .btn--primary {
    background: var(--text-primary);
    color: #fff;
    border-color: var(--text-primary);
    font-weight: 600;
  }
  .btn--primary:hover {
    background: #000;
    border-color: #000;
  }
  .btn--ghost {
    background: transparent;
    border-color: transparent;
    box-shadow: none;
  }
  .btn--ghost:hover {
    background: var(--surface-tint);
    border-color: transparent;
    box-shadow: none;
  }
  .btn--danger {
    border-color: #F5BDBD;
    color: #C63636;
  }
  .btn--danger:hover {
    background: #FDE7E7;
    border-color: #E89898;
  }

  /* Sizes */
  .btn--sm {
    padding: 6px 11px;
    font-size: 12px;
  }
  .btn--sm svg { width: 13px; height: 13px; }
  .btn--lg {
    padding: 12px 20px;
    font-size: 14px;
  }
  .btn--lg svg { width: 16px; height: 16px; }

  /* Full-width (for drawer footers, mobile actions, forms) */
  .btn--block { width: 100%; }

  /* Search */
  .search {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 320px;
    height: 40px;
    padding: 0 16px;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-pill);
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .search:focus-within {
    border-color: var(--text-secondary);
    box-shadow: 0 0 0 3px rgba(91, 109, 255, 0.08);
  }
  .search svg {
    width: 16px;
    height: 16px;
    color: var(--text-body);
    stroke-width: 2;
    flex-shrink: 0;
  }
  .search input {
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    font-size: 14px;
    color: var(--text-primary);
  }
  .search input::placeholder { color: var(--text-muted); }

  /* User menu */
  .user-menu-wrap {
    position: relative;
  }
  .user-menu {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px 4px 4px;
    border-radius: var(--r-pill);
    background: var(--panel);
    border: 1px solid var(--border-strong);
    box-shadow: var(--shadow-xs);
    transition: all 120ms ease;
  }
  .user-menu:hover {
    border-color: var(--text-muted);
    box-shadow: var(--shadow-sm);
  }
  .user-menu[aria-expanded="true"] {
    border-color: var(--text-muted);
    background: var(--surface-tint);
  }
  .user-menu .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    display: grid;
    place-items: center;
  }
  .user-menu svg {
    width: 14px;
    height: 14px;
    color: var(--text-secondary);
    transition: transform 160ms ease;
  }
  .user-menu[aria-expanded="true"] svg { transform: rotate(180deg); }

  /* User menu dropdown */
  .user-menu-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 260px;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-md);
    box-shadow: var(--shadow-md);
    padding: 6px;
    z-index: 40;
  }
  .user-menu-identity {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 10px 12px;
  }
  .user-menu-identity .avatar {
    flex-shrink: 0;
  }
  .user-menu-identity-text {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    line-height: 1.3;
  }
  .user-menu-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .user-menu-email {
    font-size: 12px;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .user-menu-role {
    font-size: 11px;

  /* ───────── Content area (empty in Step 1) ───────── */
  .content {

  .empty-state {

    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;

    padding: 20px 24px;

    border: 1px solid var(--border-subtle);
    border-radius: var(--r-md);
  }
  .scroll-test-card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 6px;
  }
  .scroll-test-card-body {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* ═══════════════════════════════════════════════════════════════
     RESPONSIVE rules live at the bottom of the stylesheet so they
     override all base rules regardless of base-rule source order.
     See end of this <style> block.
     ═══════════════════════════════════════════════════════════════ */

  .hamburger {
    display: none;
    width: 36px;
    height: 36px;
    border-radius: var(--r-sm);
    place-items: center;
    color: var(--text-secondary);
  }
  .hamburger:hover { background: var(--surface-tint); color: var(--text-primary); }
  .hamburger svg { width: 20px; height: 20px; stroke-width: 1.5; }

  .mobile-overlay {
    position: fixed;
    inset: 0;
    background: rgba(28,28,31,0.3);
    backdrop-filter: blur(4px);
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease;
  }
  .mobile-overlay[data-visible="true"] {
    opacity: 1;
    pointer-events: auto;
  }

  /* ═══════════════════════════════════════════════════════════════
     DRAWER (lead detail panel)
     Desktop: below-topbar, respects-sidebar, 480px, no backdrop.
     Mobile:  full-screen takeover with back arrow.
     Structure per DESIGN_SPEC.md §17 drawer-boundaries decision.
     Contents are placeholder — real form lives in Step 3.
     ═══════════════════════════════════════════════════════════════ */
  .drawer {
    position: fixed;
    top: var(--header-h);
    right: 0;
    bottom: 0;
    width: 480px;
    background: var(--panel);
    border-left: 1px solid var(--border-divider);
    box-shadow: -16px 0 48px rgba(0, 0, 0, 0.08);
    display: flex;
    flex-direction: column;
    z-index: 20;
    transform: translateX(100%);
    transition: transform 280ms cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .drawer[data-open="true"] {
    transform: translateX(0);
  }

  .drawer-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .drawer-close {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--surface-tint);
    border: 1px solid var(--border-subtle);
    display: grid;
    place-items: center;
    color: var(--text-secondary);
    flex-shrink: 0;
    cursor: pointer;
    transition: all 120ms ease;
  }
  .drawer-close:hover {
    background: var(--hover-warm);
    color: var(--text-primary);
  }
  .drawer-close svg {
    width: 16px;
    height: 16px;
    stroke-width: 2;
  }
  .drawer-header-text {
    flex: 1;
    min-width: 0;
  }
  .drawer-name {
    font-size: 19px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .drawer-badge {
    display: inline-block;
    padding: 2px 8px;
    background: #E4F4E9;
    color: #2F9D6F;
    font-size: 11px;
    font-weight: 600;
    border-radius: var(--r-pill);
  }
  .drawer-meta {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .drawer-tabs {
    display: flex;
    padding: 0 24px;
    border-bottom: 1px solid var(--border-subtle);
    gap: 24px;
  }
  .drawer-tab {
    padding: 12px 0;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    border-bottom: 2px solid transparent;
    cursor: pointer;
    background: transparent;
    border-top: 0;
    border-left: 0;
    border-right: 0;
    font-family: inherit;
    transition: color 120ms ease, border-color 120ms ease;
  }
  .drawer-tab:hover { color: var(--text-body); }
  .drawer-tab[aria-selected="true"] {
    color: var(--text-primary);
    font-weight: 600;
    border-bottom-color: var(--accent-blue);
  }

  .drawer-body {
    flex: 1;
    padding: 20px 24px;
    overflow-y: auto;
    background: var(--surface-tint);
  }
  .drawer-placeholder {
    padding: 28px 20px;
    border: 1px dashed var(--border-divider);
    border-radius: var(--r-md);
    background: var(--panel);
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.6;
  }
  .drawer-placeholder strong {
    display: block;
    color: var(--text-secondary);
    margin-bottom: 4px;
    font-size: 14px;
  }

  .drawer-footer {
    padding: 14px 24px;
    border-top: 1px solid var(--border-subtle);
    display: flex;
    gap: 10px;
    background: var(--panel);
  }
  .drawer-footer .btn { flex: 1; }

  /* Clickable scroll-test cards (step-1 stand-in for lead rows) */
  .scroll-test-card {
    cursor: pointer;
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .scroll-test-card:hover {
    border-color: var(--border-strong);
    box-shadow: var(--shadow-xs);
  }
  .scroll-test-card[data-selected="true"] {
    background: #F2F5FF;
    border-color: #B5C4FF;
  }
  /* ═══════════════════════════════════════════════════════════════
     RESPONSIVE (placed last so these override all base rules
     regardless of the order base rules appear above)
     ═══════════════════════════════════════════════════════════════ */
  @media (max-width: 1024px) {
    :root { --sidebar-w: 208px; }
    .topbar { padding: 0 24px; }
    .content { padding: 0 24px 24px; }
    .search { width: 240px; }
  }

  @media (max-width: 768px) {
    .app-shell { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 280px;
      height: 100vh;
      height: 100dvh;
      transform: translateX(-100%);
      transition: transform 240ms cubic-bezier(0.22, 0.61, 0.36, 1);
      z-index: 60;
      box-shadow: var(--shadow-shell);
    }
    .sidebar[data-open="true"] { transform: translateX(0); }

    .topbar {
      padding: 0 16px;
      gap: 12px;
      height: 64px;
    }
    .topbar-actions { gap: 6px; }
    .page-title { font-size: 18px; }
    /* Trim the topbar on mobile — keep only bell + user */
    .search,
    .avatar-stack,
    .icon-btn[aria-label="Ajouter un prospect"] {
      display: none;
    }
    .hamburger { display: grid !important; }
    .content { padding: 0 16px 16px; }
    .empty-state { flex-direction: column; align-items: flex-start; gap: 12px; }

    /* Mobile drawer: full-screen takeover, above everything */
    .drawer {
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: auto;
      height: 100vh;
      height: 100dvh;
      border-left: 0;
      box-shadow: none;
      z-index: 70;
    }
    .drawer-header {
      padding: 14px 16px;
      align-items: center;
    }
    .drawer-name { font-size: 17px; }
    .drawer-meta { font-size: 12px; }
    .drawer-tabs {
      padding: 0 16px;
      gap: 18px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .drawer-tab { white-space: nowrap; }
    .drawer-body { padding: 16px; }
    .drawer-footer {
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      gap: 8px;
    }
    /* Mobile: close button becomes a back arrow */
    .drawer-close-icon-desktop { display: none !important; }
    .drawer-close-icon-mobile  { display: inline-grid !important; place-items: center; }

    /* On mobile, lock body scroll behind the drawer */
    body[data-drawer-open="true"] { overflow: hidden; }
  }
  </style>
</head>

<script>

  logout:      () => svg(`<path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/>`),
  close:       () => svg(`<path d="M18 6L6 18M6 6l12 12"/>`),
  arrowLeft:   () => svg(`<path d="M19 12H5M12 19l-7-7 7-7"/>`),
  phone:       () => svg(`<path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>`),

/* ═══════════════════════════════════════════════════════════════
   COMPONENT-SHAPED RENDER FUNCTIONS
   Each returns an HTML string. These map 1:1 to React components
   if we ever port (see docs/DESIGN_PROTOCOL.md).
   ═══════════════════════════════════════════════════════════════ */

function renderBrand() {
  return `
    <div class="brand">
      <div class="brand-left">
        <div class="brand-mark" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
        <span class="brand-name">Open House</span>
      </div>
    </div>
  `;
}

function renderAgencyAvatar(agency) {
  if (agency.logo) {
    return `<div class="agency-avatar" data-variant="logo"><img src="${agency.logo}" alt="${agency.name}" onerror="this.parentElement.removeAttribute('data-variant'); this.parentElement.innerHTML='${agency.initials}'"></div>`;
  }
  return `<div class="agency-avatar">${agency.initials}</div>`;
}

function renderAgencySwitcher(agency) {
  const currentCity = agency.cities.find(c => c.id === agency.currentCityId);
  const cityLabel = currentCity
    ? `${icon.mapPin()}${currentCity.name}`
    : "Toutes les villes";
  const isOpen = state.agencySwitcherOpen;
  return `
    <div class="agency-switcher-wrap">
      <div class="agency-switcher" data-action="toggle-agency-switcher" role="button" tabindex="0" aria-expanded="${isOpen}">
        ${renderAgencyAvatar(agency)}
        <div class="agency-text">
          <div class="agency-name">${agency.name}</div>
          <div class="agency-city">${cityLabel}</div>
        </div>
        ${icon.chevronDown()}
      </div>
      ${isOpen ? renderAgencyMenu(agency) : ""}
    </div>
  `;
}

function renderAgencyMenu(agency) {
  const items = agency.cities.map(c => {
    const active = c.id === agency.currentCityId;
    return `
      <div class="agency-menu-item" data-action="select-city" data-city-id="${c.id}" data-active="${active}" role="menuitem">
        ${icon.mapPin()}
        <span>${c.name}</span>
        ${active ? icon.check() : ""}
      </div>
    `;
  }).join("");
  return `
    <div class="agency-menu" role="menu">

}

function renderNavItem(item, active) {

}

function renderNavGroup(group, activeRoute) {
  return `
    <div class="nav-group">
      <div class="nav-section-label">${group.label}</div>
      <ul class="nav-list">
        ${group.items.map(it => renderNavItem(it, it.id === activeRoute)).join("")}

}

function renderDarkModeRow(on) {

    <div class="sidebar-row">

}

function renderSidebarCard() {

    <div class="sidebar-card">

function renderSidebar() {

/* ───── Topbar ───── */

function renderUserMenuDropdown() {

          <div class="user-menu-name">${u.name}</div>

function renderAvatar(init, tone, size=28) {
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${tone};border-radius:50%;display:grid;place-items:center;color:#fff;font-size:${Math.max(10, Math.round(size * 0.38))}px;font-weight:600;flex-shrink:0;">${init}</div>`;
}

/**
 * Button primitive. Every clickable text-action uses this.
 * Icon-only buttons use `.icon-btn` directly (topbar plus/bell).
 *
 *   variant: "default" | "primary" | "ghost" | "danger"   (default: "default")
 *   size:    "sm" | "md" | "lg"                           (default: "md")
 *   block:   boolean — full-width                         (default: false)
 *   icon:    SVG string (from icon.*()) placed before label
 *   label:   button text
 *   action:  data-action value to dispatch on click
 *   disabled: boolean
 *   extra:   additional class names (rare)
 */
function renderButton({ variant = "default", size = "md", block = false, icon = "", label = "", action = "", disabled = false, extra = "" } = {}) {
  const classes = [
    "btn",
    variant !== "default" && `btn--${variant}`,
    size !== "md" && `btn--${size}`,
    block && "btn--block",
    extra,
  ].filter(Boolean).join(" ");
  const attrs = [
    `class="${classes}"`,
    action ? `data-action="${action}"` : "",
    disabled ? `disabled aria-disabled="true"` : "",
  ].filter(Boolean).join(" ");
  return `<button ${attrs}>${icon}${label ? `<span>${label}</span>` : ""}</button>`;
}

function renderAvatarStack(team, more) {
  // Kept for future uses (assignment dropdowns, agent cards). Not currently rendered in topbar.
  const avatars = team.map(m => renderAvatar(m.initials, m.tone)).join("");
  const moreTag = more > 0 ? `<div class="avatar-more">+${more}</div>` : "";
  return `<div class="avatar-stack">${avatars}${moreTag}</div>`;
}

function renderSearch() {
  return `
    <div class="search">
      ${icon.search()}
      <input type="text" placeholder="Rechercher..." aria-label="Rechercher" />
    </div>
  `;
}

function renderTopbar() {

    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="hamburger" data-action="open-sidebar" aria-label="Ouvrir le menu">${icon.menu()}</button>

/* ───── Step-1 content placeholder ─────

   Other routes show a simple "à venir" placeholder to make routing feel real. */
function renderContent() {

}

function renderRouteContent() {
  if (state.route === "leads") return renderLeadsContent();
  return renderRouteComingSoon();
}

function renderLeadsContent() {
  return `

        <div class="empty-state-title">Shell — étape 1</div>
        <div class="empty-state-body">
          Sidebar + topbar + tiroir en place. Page active : <code>${state.route}</code>. Cliquez une carte pour ouvrir le tiroir. Le contenu réel arrive à l'étape 2 (table) et étape 3 (tiroir).
        </div>

      <div class="empty-state-chip">v0.6.1</div>

function renderRouteComingSoon() {

    agents:    "Agents",
    campaigns: "Campagnes",

  return `

        <div class="empty-state-body">Page à construire. Cette section sera implémentée après l'étape 2 (Leads) et l'étape 3 (tiroir).</div>

function renderButtonDemo() {

  return `
    <div class="scroll-test-card" style="cursor:default;padding:20px 24px;margin-top:16px;">
      <div class="scroll-test-card-title">Système de boutons · v0.6 (Option B)</div>
      <div class="scroll-test-card-body" style="margin-bottom:16px;">
        Aperçu du système verrouillé. Toutes les actions textuelles du produit passent par <code style="font-family:var(--font-mono);font-size:12px;background:var(--surface-tint);padding:1px 5px;border-radius:4px;">renderButton()</code>.
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;">
        ${renderButton({ variant: "primary", label: "Envoyer template" })}
        ${renderButton({ label: "Appeler" })}
        ${renderButton({ variant: "ghost", label: "Annuler" })}
        ${renderButton({ variant: "danger", label: "Supprimer" })}

      <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
        ${renderButton({ variant: "primary", size: "sm", label: "Small" })}
        ${renderButton({ variant: "primary", label: "Default" })}
        ${renderButton({ variant: "primary", size: "lg", label: "Large" })}

function renderLeadCards() {
  // Temporary stand-in for the real leads table.
  // These cards are click targets so we can feel the drawer interaction in the shell stage.
  const cards = state.leads.map(lead => {
    const selected = state.drawer?.leadId === lead.id;
    return `
      <div class="scroll-test-card"
           data-action="open-drawer"
           data-lead-id="${lead.id}"
           data-selected="${selected}"
           role="button" tabindex="0">

            <div class="scroll-test-card-body" style="margin-top:2px;">${lead.budget} · ${lead.city} · ${lead.type}</div>
          </div>

function badgeBg(tone) {
  return {
    green:  "#E4F4E9",
    violet: "#EDE7FF",
    blue:   "#E8ECFF",
    amber:  "#FBF0DC",
  }[tone] || "#F4F4F6";
}
function badgeFg(tone) {
  return {
    green:  "#2F9D6F",
    violet: "#6D48DB",
    blue:   "#5B6DFF",
    amber:  "#8C5A08",
  }[tone] || "#6E6B64";
}

function renderDrawer() {
  // Mounted conditionally — only renders the DOM when state.drawer is set.
  // Sliding animation handled by the data-open attribute on the container.
  if (!state.drawer) return "";
  const lead = state.leads.find(l => l.id === state.drawer.leadId);
  if (!lead) return "";
  const activeTab = state.drawer.tab;
  const tabs = [
    { id: "infos",         label: "Infos" },
    { id: "qualification", label: "Qualification" },
    { id: "activite",      label: "Activité" },
    { id: "notes",         label: "Notes" },
  ];
  return `
    <aside class="drawer" data-open="true" role="dialog" aria-label="Détails du prospect">
      <div class="drawer-header">
        <button class="drawer-close" data-action="close-drawer" aria-label="Fermer">
          <span class="drawer-close-icon-desktop">${icon.close()}</span>
          <span class="drawer-close-icon-mobile" style="display:none;">${icon.arrowLeft()}</span>
        </button>
        <div class="drawer-header-text">
          <div class="drawer-name">
            ${lead.name}
            <span class="drawer-badge" style="background:${badgeBg(lead.statusTone)};color:${badgeFg(lead.statusTone)};">${lead.status}</span>
          </div>
          <div class="drawer-meta">${lead.budget} · ${lead.city} · ${lead.type} · ${lead.timeline}</div>
        </div>
      </div>
      <div class="drawer-tabs" role="tablist">
        ${tabs.map(t => `
          <button class="drawer-tab"
                  role="tab"
                  aria-selected="${t.id === activeTab}"
                  data-action="switch-drawer-tab"
                  data-tab="${t.id}">${t.label}</button>
        `).join("")}
      </div>
      <div class="drawer-body" role="tabpanel">
        <div class="drawer-placeholder">
          <strong>Onglet « ${tabs.find(t => t.id === activeTab).label} »</strong>
          Contenu construit à l'étape 3. Pour l'étape 1 (shell), on évalue la structure, les transitions, et les boundaries du tiroir uniquement.
        </div>
      </div>
      <div class="drawer-footer">
        ${renderButton({ icon: icon.phone(),         label: "Appeler" })}
        ${renderButton({ icon: icon.messageCircle(), label: "WhatsApp" })}
        ${renderButton({ icon: icon.send(),          label: "Template", variant: "primary" })}
      </div>
    </aside>
  `;
}

/* ───── Root render ───── */
function renderApp() {
  return `
    <div class="app-shell">
      ${renderSidebar()}
      <div class="main">
        ${renderTopbar()}
        ${renderContent()}
      </div>
    </div>
    <div class="mobile-overlay" data-visible="${state.sidebarOpen}"></div>
    ${renderDrawer()}
  `;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER + EVENT DELEGATION
   One render function. One event listener. All interactions route
   through data-action / data-route attributes.
   ═══════════════════════════════════════════════════════════════ */
function render() {
  document.getElementById("app").innerHTML = renderApp();
  // Reflect drawer state on body so mobile CSS can lock scroll.
  document.body.setAttribute("data-drawer-open", state.drawer ? "true" : "false");
}

document.addEventListener("click", (e) => {
  // Outside-click closes the agency switcher
  if (state.agencySwitcherOpen && !e.target.closest(".agency-switcher-wrap")) {
    setState({ agencySwitcherOpen: false });
    // fall through so other handlers can still react
  }

  // Outside-click closes the user menu
  if (state.userMenuOpen && !e.target.closest(".user-menu-wrap")) {
    setState({ userMenuOpen: false });
  }

  const target = e.target.closest("[data-action], [data-route]");
  if (!target) return;

  // Nav
  const route = target.getAttribute("data-route");
  if (route) {
    setState({
      route,
      sidebarOpen: false,
      agencySwitcherOpen: false,
      userMenuOpen: false,
    });
    return;
  }

  // Actions
  const action = target.getAttribute("data-action");
  switch (action) {
    case "toggle-darkmode":
      setState({ darkMode: !state.darkMode });
      break;
    case "open-sidebar":
      setState({ sidebarOpen: true });
      break;
    case "toggle-agency-switcher":
      setState({ agencySwitcherOpen: !state.agencySwitcherOpen, userMenuOpen: false });
      break;
    case "toggle-user-menu":
      setState({ userMenuOpen: !state.userMenuOpen, agencySwitcherOpen: false });
      break;
    case "select-city": {
      const cityId = Number(target.getAttribute("data-city-id"));
      setState({
        agency: { ...state.agency, currentCityId: cityId },
        agencySwitcherOpen: false,
      });
      break;
    }
    case "go-profile":
    case "go-preferences":
    case "go-help":
      // Stubs — will route to the right page when those pages exist
      setState({ userMenuOpen: false });
      break;
    case "logout":
      // Stub — real logout posts to /api/auth/logout on the Express backend later
      setState({ userMenuOpen: false });
      break;
    case "add-lead":
      // Stub — opens the "Ajouter un prospect" modal. Form built after Step 2.
      alert("Ajouter un prospect — à venir. Construit après l'étape 2.");
      break;
    case "open-drawer": {
      const leadId = Number(target.getAttribute("data-lead-id"));
      // If clicking the same lead that's open, close. If clicking a different one, swap.
      if (state.drawer?.leadId === leadId) {
        setState({ drawer: null });
      } else {
        setState({ drawer: { leadId, tab: "infos" } });
      }
      break;
    }
    case "close-drawer":
      setState({ drawer: null });
      break;
    case "switch-drawer-tab": {
      const tab = target.getAttribute("data-tab");
      setState({ drawer: { ...state.drawer, tab } });
      break;
    }
  }
});

// Close mobile sidebar on overlay click
document.addEventListener("click", (e) => {
  if (e.target.classList.contains("mobile-overlay")) {
    setState({ sidebarOpen: false });
  }
});

/* ESC key closes open drawers and dropdowns */
document.addEventListener("keydown", (e) => {
  if (e.key !== "Escape") return;
  if (state.drawer)              { setState({ drawer: null });             return; }
  if (state.userMenuOpen)        { setState({ userMenuOpen: false });      return; }
  if (state.agencySwitcherOpen)  { setState({ agencySwitcherOpen: false });return; }
  if (state.sidebarOpen)         { setState({ sidebarOpen: false });       return; }
});

/* Scroll-aware topbar: add a subtle bottom border once content scrolls under it */
let scrolledState = false;
window.addEventListener("scroll", () => {
  const scrolled = window.scrollY > 4;
  if (scrolled !== scrolledState) {
    scrolledState = scrolled;
    const topbar = document.querySelector(".topbar");
    if (topbar) topbar.setAttribute("data-scrolled", scrolled ? "true" : "false");
  }
}, { passive: true });

/* Initial render */
render();
</script>
