<!doctype html>
<!--
  Open House Prospects — Step 2 Leads page (Layer 1 complete)
  v0.7.0 — chip no longer carries a dev suffix
  Reference: docs/DESIGN_SPEC.md
  Workflow: docs/DESIGN_PROTOCOL.md

  v0.7.0 ships Step 2 Layer 1: the Leads page with a working toggle,
  in-page search, pipeline bar, filter tabs, and a clickable card list
  that opens the drawer. Data model enriched to 12 leads matching
  docs/DATA_MODEL.md shape. Built through four dev phases (p1 foundation,
  p2 Variation A, p3 Variation B, p4 cleanup) — this is p4 shipping as
  the final v0.7.0. Variation B (tinted toggle + type-accent surface)
  won the A/B. Variation A code is deleted; winner's route renamed from
  "leads-b" back to the canonical "leads"; nav collapsed to a single
  entry; CSS class suffix "-b" dropped from the winner.

  What v0.7.0 introduces on the Leads page:
  - Compact segmented toggle (Acquéreurs / Vendeurs) with a 4px
    type-accent band above it — blue for Acquéreurs, amber for Vendeurs.
    Flipping the toggle re-palettes the whole surface in one place via
    a --type-accent CSS custom property set on the page root's
    mode-buyer / mode-seller class.
  - Context chip next to the toggle: "10 acquéreurs actifs" /
    "3 vendeurs actifs" — raw type count, singular/plural grammar.
  - Controls row: visible-count meta on the left, page-level search on
    the right. Topbar search is suppressed on the Leads route (global
    search is deferred).
  - Pipeline bar: one tinted cell per pipeline stage for the active
    type (6 cells for buyer, 6 for seller). Each cell is a filter
    shortcut — clicking a stage selects the matching filter tab below.
  - Filter tabs: Tous · [pipeline stages] · Perdu. Dark-fill active state.
  - Lead cards: avatar + name + email, price + zone + timeline, source
    icon, score chip (Chaud / Tiède / Froid), status pill, verified
    check, assigned-agent avatar, creation date. Click opens the drawer.
  - Empty states: "Aucun vendeur pour l'instant" when type=seller and
    0 sellers exist; "Aucun résultat" when filters + search yield 0.

  Counts discipline:
    - Context chip     = raw type total (ignores search, honest volume)
    - Pipeline + tabs  = type + search filtered (stable across tab clicks)
    - Visible cards    = all three filters applied

  Pipeline stages are per-agency (state.agency.pipeline.{buyer, seller}
  with { id, label } shape per DATA_MODEL). Every status-reading UI —
  tabs, pipeline bar, status pill, drawer header — reads from this
  array, so renaming or reordering stages at the data level flows
  through without code changes.

  Resolved open decisions (from DESIGN_SPEC §16b):
  - Mono font scope: JetBrains Mono stays loaded; used by .empty-state
    <code> elements and .nav-item-badge. Not extended to card numerics —
    those use DM Sans with `font-variant-numeric: tabular-nums` for
    alignment. Revisit only if Layer 2's table budget column has real
    alignment issues.
  - Feedback card fate: kept. The sidebar doesn't yet feel cramped;
    re-evaluate once Agents / Campagnes / Database get real content.

  What v0.7.0 does NOT include (deferred to later steps):
  - Step 2 Layer 2: the real sortable leads table with bulk checkboxes.
    Currently the Leads page is a richer-than-before card list that
    shows the same data a table would. Layer 2 converts cards → table
    as a separate push.
  - Step 3: drawer tab bodies (Infos / Qualification / Activité / Notes).
    The drawer header reads correctly from the enriched schema; the
    four tabs still show a placeholder body.
  - Step 4+: Tableau de bord, Agents, Campagnes, Database, Paramètres —
    all still on the "à venir" placeholder.
-->
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Open House Prospects</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
  /* ═══════════════════════════════════════════════════════════════
     DESIGN TOKENS — single source of truth. Every color, radius,
     shadow, font-size lives here. No magic numbers below this block.
     ═══════════════════════════════════════════════════════════════ */
  :root {
    /* Neutrals — cool palette (locked) */
    --frame:          #F5F5F7;
    --sidebar-bg:     #FAFAFB;
    --panel:          #FFFFFF;
    --surface-tint:   #F4F4F6;  /* general tint surface */
    --hover-warm:     #EFEFF2;  /* nav hover (name retained from warm era — it's just "hover") */
    --active-warm:    #E7E7EC;  /* nav active */
    --row-hover:      #FAFAFB;

    --border-subtle:  #ECECEF;
    --border-divider: #E6E6EA;
    --border-strong:  #D8D8DE;  /* NEW — visible borders (icon buttons, user menu, search) */

    --text-primary:   #1C1C1F;
    --text-body:      #3D3A35;
    --text-secondary: #6E6B64;
    --text-muted:     #9B9892;

    /* Accents */
    --accent-blue:    #5B6DFF;
    --accent-green:   #4CC38A;
    --accent-red:     #FF6B6B;
    --accent-amber:   #F5B94C;

    /* Accent-soft (badge tints) */
    --blue-soft:   #E8ECFF;
    --green-soft:  #E4F4E9;
    --red-soft:    #FDE7E7;
    --amber-soft:  #FBF0DC;
    --violet-soft: #EDE7FF;  /* for "En cours" status pill */

    /* Radius */
    --r-xs: 6px;
    --r-sm: 10px;
    --r-md: 14px;
    --r-lg: 16px;
    --r-xl: 20px;
    --r-pill: 999px;

    /* Shadow */
    --shadow-none:   none;
    --shadow-xs:     0 1px 2px rgba(0,0,0,0.02);
    --shadow-sm:     0 2px 8px rgba(0,0,0,0.03);
    --shadow-md:     0 8px 24px rgba(0,0,0,0.04);
    --shadow-shell:  0 8px 32px rgba(0,0,0,0.04);
    --shadow-drawer: -12px 0 40px rgba(0,0,0,0.08);

    /* Type */
    --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;

    /* Layout */
    --sidebar-w: 260px;
    --header-h: 88px;
    --shell-pad: 24px;
  }

  /* Cool palette is now the default — warm A/B toggle removed at design lock */

  /* ═══════════════════════════════════════════════════════════════
     BASE
     ═══════════════════════════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-sans);
    background: var(--frame);
    color: var(--text-body);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  input, select { font: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border-divider); border-radius: var(--r-pill); }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ═══════════════════════════════════════════════════════════════
     APP SHELL
     ═══════════════════════════════════════════════════════════════ */
  .app-shell {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    min-height: 100vh;
    background: var(--frame);
  }

  /* ───────── Sidebar ───────── */
  .sidebar {
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border-divider);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 8px;
    margin-bottom: 16px;
  }
  .brand-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, #5B6DFF 0%, #9B7CFF 100%);
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 3px;
    padding: 6px;
  }
  .brand-mark span {
    background: rgba(255,255,255,0.9);
    border-radius: 2px;
  }
  .brand-mark span:nth-child(2) { background: rgba(255,255,255,0.6); }
  .brand-mark span:nth-child(3) { background: rgba(255,255,255,0.7); }
  .brand-mark span:nth-child(4) { background: rgba(255,255,255,0.95); }

  .brand-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.2px;
  }

  /* Agency + city switcher */
  .agency-switcher {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    cursor: pointer;
    margin-bottom: 20px;
    transition: border-color 120ms ease, background 120ms ease;
  }
  .agency-switcher:hover { background: var(--hover-warm); }
  .agency-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #1C1C1F;
    color: #fff;
    display: grid;
    place-items: center;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: -0.2px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .agency-avatar[data-variant="logo"] {
    background: #FFFFFF;
    border: 1px solid var(--border-strong);
    padding: 4px;
  }
  .agency-avatar img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .agency-text {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    line-height: 1.2;
  }
  .agency-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .agency-city {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .agency-city svg {
    width: 11px;
    height: 11px;
    display: inline-block;
    vertical-align: -1px;
    margin-right: 3px;
    stroke-width: 2;
    color: var(--text-muted);
  }
  .agency-switcher > svg { color: var(--text-muted); flex-shrink: 0; transition: transform 160ms ease; }
  .agency-switcher[aria-expanded="true"] > svg { transform: rotate(180deg); }

  .agency-switcher-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  .agency-switcher-wrap .agency-switcher { margin-bottom: 0; }

  .agency-menu {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    box-shadow: var(--shadow-md);
    padding: 6px;
    z-index: 40;
  }
  .agency-menu-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 6px 10px 4px;
  }
  .agency-menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: var(--r-xs);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-body);
    cursor: pointer;
    transition: background 100ms ease;
  }
  .agency-menu-item svg {
    width: 14px;
    height: 14px;
    color: var(--text-muted);
    flex-shrink: 0;
    stroke-width: 2;
  }
  .agency-menu-item span {
    flex: 1;
  }
  .agency-menu-item:hover { background: var(--hover-warm); }
  .agency-menu-item[data-active="true"] {
    color: var(--text-primary);
    font-weight: 600;
  }
  .agency-menu-item[data-active="true"] svg:last-child {
    color: var(--accent-blue);
  }

  /* Section label */
  .nav-section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: 0.8px;
    padding: 0 10px;
    margin: 0 0 8px;
    text-transform: uppercase;
  }
  .nav-group + .nav-group { margin-top: 20px; }

  /* Nav items */
  .nav-list { list-style: none; padding: 0; margin: 0; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 40px;
    padding: 0 10px;
    border-radius: var(--r-sm);
    color: var(--text-body);
    cursor: pointer;
    transition: background 120ms ease;
    position: relative;
  }
  .nav-item svg {
    width: 16px;
    height: 16px;
    color: var(--text-secondary);
    flex-shrink: 0;
    stroke-width: 1.5;
  }
  .nav-item-label {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
  }
  .nav-item-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    background: var(--panel);
    padding: 2px 7px;
    border-radius: var(--r-pill);
    border: 1px solid var(--border-subtle);
  }
  .nav-item:hover { background: var(--hover-warm); }
  .nav-item[data-active="true"] {
    background: var(--active-warm);
  }
  .nav-item[data-active="true"] .nav-item-label { font-weight: 600; color: var(--text-primary); }
  .nav-item[data-active="true"] svg { color: var(--text-primary); }

  /* Sidebar footer */
  .sidebar-spacer { flex: 1; }

  .sidebar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 10px;
    height: 40px;
    color: var(--text-secondary);
    font-size: 14px;
  }
  .sidebar-row svg { width: 16px; height: 16px; stroke-width: 1.5; }
  .sidebar-row-label { flex: 1; }

  /* Toggle switch */
  .switch {
    position: relative;
    width: 32px;
    height: 18px;
    border-radius: var(--r-pill);
    background: var(--border-divider);
    cursor: pointer;
    transition: background 140ms ease;
  }
  .switch::after {
    content: "";
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
    box-shadow: var(--shadow-xs);
    transition: transform 160ms cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .switch[data-on="true"] { background: var(--text-primary); }
  .switch[data-on="true"]::after { transform: translateX(14px); }

  /* Help / info card at bottom */
  .sidebar-card {
    margin-top: 16px;
    padding: 16px;
    border-radius: var(--r-md);
    background: var(--blue-soft);
    border: 1px solid rgba(91, 109, 255, 0.12);
  }
  .sidebar-card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  .sidebar-card-body {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 12px;
    line-height: 1.4;
  }
  /* Sidebar feedback-card CTA.
     Intentionally NOT using .btn — this is tuned to the card's compact container.
     Generic buttons (drawer, forms, filters) use the .btn system. */
  .sidebar-card-cta {
    display: block;
    width: 100%;
    padding: 8px 12px;
    background: var(--text-primary);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    border-radius: var(--r-sm);
    text-align: center;
    transition: background 120ms ease;
  }
  .sidebar-card-cta:hover { background: #000; }

  /* ═══════════════════════════════════════════════════════════════
     MAIN CONTENT
     ═══════════════════════════════════════════════════════════════ */
  .main {
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  /* ───────── Top header ───────── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 30;
    height: var(--header-h);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    background: var(--frame);
    transition: box-shadow 180ms ease;
  }
  .topbar[data-scrolled="true"] {
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06), 0 8px 24px rgba(0, 0, 0, 0.04);
  }
  .page-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.4px;
    margin: 0;
  }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .topbar-actions-icons {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Avatar stack */
  .avatar-stack {
    display: flex;
    align-items: center;
  }
  .avatar-stack .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--frame);
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    display: grid;
    place-items: center;
    margin-left: -10px;
  }
  .avatar-stack .avatar:first-child { margin-left: 0; }
  .avatar-more {
    margin-left: -10px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--panel);
    border: 2px solid var(--frame);
    color: var(--text-secondary);
    font-size: 11px;
    font-weight: 600;
    display: grid;
    place-items: center;
    box-shadow: var(--shadow-xs);
  }

  /* Icon button */
  .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    color: var(--text-body);
    display: grid;
    place-items: center;
    position: relative;
    box-shadow: var(--shadow-xs);
    transition: all 120ms ease;
  }
  .icon-btn:hover {
    border-color: var(--text-muted);
    color: var(--text-primary);
    box-shadow: var(--shadow-sm);
  }
  .icon-btn svg { width: 18px; height: 18px; stroke-width: 2; }

  .notif-badge {
    position: absolute;
    top: -3px;
    right: -3px;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    border-radius: var(--r-pill);
    background: var(--accent-red);
    color: #fff;
    font-size: 9px;
    font-weight: 600;
    display: grid;
    place-items: center;
    border: 2px solid var(--frame);
    line-height: 1;
  }

  /* ═══════════════════════════════════════════════════════════════
     BUTTON SYSTEM (Option B — Bordered clean)
     Locked in Step 1. Every clickable text-action in the product
     uses these classes. Icon-only buttons use .icon-btn instead.
     ═══════════════════════════════════════════════════════════════ */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 9px 14px;
    font: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-body);
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    cursor: pointer;
    white-space: nowrap;
    box-shadow: var(--shadow-xs);
    transition: all 120ms ease;
  }
  .btn svg {
    width: 15px;
    height: 15px;
    stroke-width: 1.75;
    flex-shrink: 0;
  }
  .btn:hover {
    border-color: var(--text-muted);
    box-shadow: var(--shadow-sm);
  }
  .btn:active {
    transform: translateY(0.5px);
  }
  .btn:disabled,
  .btn[aria-disabled="true"] {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* Variants */
  .btn--primary {
    background: var(--text-primary);
    color: #fff;
    border-color: var(--text-primary);
    font-weight: 600;
  }
  .btn--primary:hover {
    background: #000;
    border-color: #000;
  }
  .btn--ghost {
    background: transparent;
    border-color: transparent;
    box-shadow: none;
  }
  .btn--ghost:hover {
    background: var(--surface-tint);
    border-color: transparent;
    box-shadow: none;
  }
  .btn--danger {
    border-color: #F5BDBD;
    color: #C63636;
  }
  .btn--danger:hover {
    background: #FDE7E7;
    border-color: #E89898;
  }

  /* Sizes */
  .btn--sm {
    padding: 6px 11px;
    font-size: 12px;
  }
  .btn--sm svg { width: 13px; height: 13px; }
  .btn--lg {
    padding: 12px 20px;
    font-size: 14px;
  }
  .btn--lg svg { width: 16px; height: 16px; }

  /* Full-width (for drawer footers, mobile actions, forms) */
  .btn--block { width: 100%; }

  /* Search */
  .search {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 320px;
    height: 40px;
    padding: 0 16px;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-pill);
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .search:focus-within {
    border-color: var(--text-secondary);
    box-shadow: 0 0 0 3px rgba(91, 109, 255, 0.08);
  }
  .search svg {
    width: 16px;
    height: 16px;
    color: var(--text-body);
    stroke-width: 2;
    flex-shrink: 0;
  }
  .search input {
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    font-size: 14px;
    color: var(--text-primary);
  }
  .search input::placeholder { color: var(--text-muted); }

  /* Topbar search suppression on the Leads route.
     The topbar search is reserved for future global search. On Leads, the
     page-level search IS the search — so the topbar one hides to avoid two
     competing affordances. Non-Leads routes keep it visible.
     Uses body[data-route] which is set in render(). Base rule, not media-query. */
  body[data-route="leads"] .topbar .search { display: none; }

  /* User menu */
  .user-menu-wrap {
    position: relative;
  }
  .user-menu {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px 4px 4px;
    border-radius: var(--r-pill);
    background: var(--panel);
    border: 1px solid var(--border-strong);
    box-shadow: var(--shadow-xs);
    transition: all 120ms ease;
  }
  .user-menu:hover {
    border-color: var(--text-muted);
    box-shadow: var(--shadow-sm);
  }
  .user-menu[aria-expanded="true"] {
    border-color: var(--text-muted);
    background: var(--surface-tint);
  }
  .user-menu .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    display: grid;
    place-items: center;
  }
  .user-menu svg {
    width: 14px;
    height: 14px;
    color: var(--text-secondary);
    transition: transform 160ms ease;
  }
  .user-menu[aria-expanded="true"] svg { transform: rotate(180deg); }

  /* User menu dropdown */
  .user-menu-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 260px;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-md);
    box-shadow: var(--shadow-md);
    padding: 6px;
    z-index: 40;
  }
  .user-menu-identity {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 10px 12px;
  }
  .user-menu-identity .avatar {
    flex-shrink: 0;
  }
  .user-menu-identity-text {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    line-height: 1.3;
  }
  .user-menu-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .user-menu-email {
    font-size: 12px;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .user-menu-role {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .user-menu-divider {
    height: 1px;
    background: var(--border-subtle);
    margin: 4px 2px;
  }
  .user-menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: var(--r-xs);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-body);
    cursor: pointer;
    transition: background 100ms ease;
  }
  .user-menu-item svg {
    width: 15px;
    height: 15px;
    color: var(--text-secondary);
    flex-shrink: 0;
    stroke-width: 1.7;
  }
  .user-menu-item:hover { background: var(--hover-warm); }
  .user-menu-item--danger {
    color: var(--accent-red);
  }
  .user-menu-item--danger svg {
    color: var(--accent-red);
  }
  .user-menu-item--danger:hover {
    background: var(--red-soft);
  }

  /* ───────── Content area ───────── */
  .content {
    flex: 1;
    padding: 0 32px 32px;
    min-height: 0;
  }

  /* Step-1 empty state (will be removed in Step 2) */
  .empty-state {
    margin-top: 4px;
    padding: 24px 28px;
    border: 1px dashed var(--border-divider);
    border-radius: var(--r-md);
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .empty-state-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .empty-state-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
  }
  .empty-state-body {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .empty-state code {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 1px 5px;
    background: var(--surface-tint);
    border-radius: var(--r-xs);
    color: var(--text-body);
  }
  .empty-state-chip {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 4px 10px;
    background: var(--surface-tint);
    border-radius: var(--r-pill);
    white-space: nowrap;
  }

  /* ═══════════════════════════════════════════════════════════════
     RESPONSIVE rules live at the bottom of the stylesheet so they
     override all base rules regardless of base-rule source order.
     See end of this <style> block.
     ═══════════════════════════════════════════════════════════════ */

  .hamburger {
    display: none;
    width: 36px;
    height: 36px;
    border-radius: var(--r-sm);
    place-items: center;
    color: var(--text-secondary);
  }
  .hamburger:hover { background: var(--surface-tint); color: var(--text-primary); }
  .hamburger svg { width: 20px; height: 20px; stroke-width: 1.5; }

  .mobile-overlay {
    position: fixed;
    inset: 0;
    background: rgba(28,28,31,0.3);
    backdrop-filter: blur(4px);
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease;
  }
  .mobile-overlay[data-visible="true"] {
    opacity: 1;
    pointer-events: auto;
  }

  /* ═══════════════════════════════════════════════════════════════
     DRAWER (lead detail panel)
     Desktop: below-topbar, respects-sidebar, 480px, no backdrop.
     Mobile:  full-screen takeover with back arrow.
     Structure per DESIGN_SPEC.md §17 drawer-boundaries decision.
     Contents are placeholder — real form lives in Step 3.
     ═══════════════════════════════════════════════════════════════ */
  .drawer {
    position: fixed;
    top: var(--header-h);
    right: 0;
    bottom: 0;
    width: 480px;
    background: var(--panel);
    border-left: 1px solid var(--border-divider);
    box-shadow: -16px 0 48px rgba(0, 0, 0, 0.08);
    display: flex;
    flex-direction: column;
    z-index: 20;
    transform: translateX(100%);
    transition: transform 280ms cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .drawer[data-open="true"] {
    transform: translateX(0);
  }

  .drawer-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  /* Close button on desktop uses the same .icon-btn style as the topbar + and bell.
     Positioned by DOM order — it comes AFTER the header-text in the flex row,
     so it sits on the right. On mobile it's overridden to be a top-left back arrow. */
  .drawer-close {
    flex-shrink: 0;
    order: 2;         /* force to the right end of the flex row on desktop */
  }
  .drawer-header-text {
    flex: 1;
    min-width: 0;
    order: 1;
  }
  .drawer-name {
    font-size: 19px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .drawer-badge {
    display: inline-block;
    padding: 2px 8px;
    background: #E4F4E9;
    color: #2F9D6F;
    font-size: 11px;
    font-weight: 600;
    border-radius: var(--r-pill);
  }
  .drawer-meta {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .drawer-tabs {
    display: flex;
    padding: 0 24px;
    border-bottom: 1px solid var(--border-subtle);
    gap: 24px;
  }
  .drawer-tab {
    padding: 12px 0;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    border-bottom: 2px solid transparent;
    cursor: pointer;
    background: transparent;
    border-top: 0;
    border-left: 0;
    border-right: 0;
    font-family: inherit;
    transition: color 120ms ease, border-color 120ms ease;
  }
  .drawer-tab:hover { color: var(--text-body); }
  .drawer-tab[aria-selected="true"] {
    color: var(--text-primary);
    font-weight: 600;
    border-bottom-color: var(--accent-blue);
  }

  .drawer-body {
    flex: 1;
    padding: 20px 24px;
    overflow-y: auto;
    background: var(--surface-tint);
  }
  .drawer-placeholder {
    padding: 28px 20px;
    border: 1px dashed var(--border-divider);
    border-radius: var(--r-md);
    background: var(--panel);
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.6;
  }
  .drawer-placeholder strong {
    display: block;
    color: var(--text-secondary);
    margin-bottom: 4px;
    font-size: 14px;
  }

  .drawer-footer {
    padding: 14px 24px;
    border-top: 1px solid var(--border-subtle);
    display: flex;
    gap: 10px;
    background: var(--panel);
  }
  .drawer-footer .btn { flex: 1; }

  /* ═══════════════════════════════════════════════════════════════
     LEADS PAGE — v0.7.0 controls + card list
     Base rules only. Mobile-specific rules live in the @media block
     at the bottom of this stylesheet (source-order cascade — see §5
     architecture notes in HANDOFF).
     ═══════════════════════════════════════════════════════════════ */

  /* Utility row: meta left, page search right. */
  .leads-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .leads-meta {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: -0.05px;
  }

  /* Page-level Leads search. Shorter and less prominent than the topbar
     search (which is hidden on Leads routes anyway — see Phase 1 CSS).
     Matches the .search pill shape for visual rhyme. */
  .leads-search {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 320px;
    max-width: 100%;
    height: 38px;
    padding: 0 14px;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-pill);
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .leads-search:focus-within {
    border-color: var(--text-secondary);
    box-shadow: 0 0 0 3px rgba(91, 109, 255, 0.08);
  }
  .leads-search svg {
    width: 16px;
    height: 16px;
    color: var(--text-body);
    stroke-width: 2;
    flex-shrink: 0;
  }
  .leads-search input {
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    font-family: inherit;
    font-size: 13px;
    color: var(--text-primary);
    min-width: 0;
  }
  .leads-search input::placeholder { color: var(--text-muted); }

  /* Pipeline bar — one cell per pipeline stage. Tinted bg = stage color.
     Cells are flex:1 so they fill the row, scroll horizontally on narrow. */
  .pipeline-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .pipeline-bar::-webkit-scrollbar { display: none; }
  .pipeline-cell {
    flex: 1 1 0;
    min-width: 120px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    padding: 12px 14px;
    background: var(--cell-bg, var(--surface-tint));
    border: 1px solid transparent;
    border-radius: var(--r-sm);
    color: var(--cell-fg, var(--text-secondary));
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: border-color 120ms ease, transform 60ms ease;
  }
  .pipeline-cell:hover { border-color: currentColor; }
  .pipeline-cell:active { transform: translateY(0.5px); }
  .pipeline-cell[aria-pressed="true"] {
    border-color: currentColor;
    box-shadow: inset 0 0 0 1px currentColor;
  }
  .pipeline-cell-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: -0.1px;
    line-height: 1.3;
  }
  .pipeline-cell-count {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
    line-height: 1;
  }

  /* Filter tabs — horizontal scrollable pills, "Tous · [stages] · Perdu". */
  .filter-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 18px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .filter-tab {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 12px;
    background: var(--panel);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-pill);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: -0.1px;
    transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
  }
  .filter-tab:hover { background: var(--row-hover); color: var(--text-primary); }
  .filter-tab[aria-selected="true"] {
    background: var(--text-primary);
    border-color: var(--text-primary);
    color: var(--panel);
  }
  .filter-tab-count {
    background: var(--surface-tint);
    color: var(--text-secondary);
    font-size: 11px;
    font-weight: 500;
    padding: 1px 6px;
    border-radius: var(--r-pill);
    line-height: 1.4;
  }
  .filter-tab[aria-selected="true"] .filter-tab-count {
    background: rgba(255, 255, 255, 0.15);
    color: var(--panel);
  }

  /* Score chip — Chaud / Tiède / Froid. Colored dot + label inside a
     tinted pill. Chosen so all three weights read at the same visual
     volume (no one chip shouts louder than another). */
  .score-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 9px;
    border-radius: var(--r-pill);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: -0.1px;
    line-height: 1.3;
  }
  .score-chip-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .score-chip--hot  { background: #FCEBEB; color: #A32D2D; }
  .score-chip--hot  .score-chip-dot { background: #E24B4A; }
  .score-chip--warm { background: #FAEEDA; color: #854F0B; }
  .score-chip--warm .score-chip-dot { background: #F5B94C; }
  .score-chip--cold { background: #E6F1FB; color: #0C447C; }
  .score-chip--cold .score-chip-dot { background: #85B7EB; }

  /* Source icon — small branded tile. Not brand SVG — consistency at
     18px beats fidelity, and avoids trademark concerns. */
  .source-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border-radius: 5px;
    font-size: 10px;
    font-weight: 600;
    color: #FFF;
    flex-shrink: 0;
    line-height: 1;
    letter-spacing: -0.2px;
  }
  .source-icon--ig     { background: #E1306C; }
  .source-icon--fb     { background: #1877F2; }
  .source-icon--web    { background: var(--text-secondary); }
  .source-icon--email  { background: #5B6DFF; }
  .source-icon--manual { background: #1C1C1F; }

  /* Status pill — same shape as drawer-badge but usable inline anywhere. */
  .status-pill {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: var(--r-pill);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: -0.1px;
    white-space: nowrap;
  }

  /* Lead card — stacked list of clickable rows. Structure: identity
     (avatar + name + email) · meta (price + zone + timeline) · signals
     (source, score, status, verified, agent, date). The three regions
     flex horizontally on desktop and wrap on narrow. */
  .lead-card-stack {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .lead-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 18px;
    background: var(--panel);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-md);
    cursor: pointer;
    transition: border-color 120ms ease, box-shadow 120ms ease, background 120ms ease;
  }
  .lead-card:hover {
    border-color: var(--border-strong);
    background: var(--row-hover);
    box-shadow: var(--shadow-xs);
  }
  .lead-card[data-selected="true"] {
    background: #F2F5FF;
    border-color: #B5C4FF;
  }
  .lead-card-identity {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 2 1 220px;
    min-width: 0;
  }
  .lead-card-identity-text { min-width: 0; }
  .lead-card-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: -0.1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lead-card-email {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lead-card-meta {
    flex: 1 1 180px;
    min-width: 0;
    font-variant-numeric: tabular-nums;
  }
  .lead-card-price {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: -0.2px;
  }
  .lead-card-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .lead-card-signals {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: nowrap;
    flex-shrink: 0;
  }
  .lead-card-date {
    font-size: 12px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    min-width: 58px;
    text-align: right;
  }
  .lead-verified {
    width: 18px;
    height: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #2F9D6F;
    flex-shrink: 0;
  }
  .lead-verified svg { width: 14px; height: 14px; stroke-width: 2.5; }
  .lead-verified--off { color: var(--text-muted); font-size: 14px; }
  .lead-agent {
    display: inline-flex;
    align-items: center;
    flex-shrink: 0;
  }
  .lead-agent--none { color: var(--text-muted); font-size: 14px; }

  /* Empty-state inside the leads list (no-match / no-sellers). Softer than
     the main app empty-state — visually a card at the spot where rows
     would have been. */
  .leads-empty {
    padding: 40px 24px;
    text-align: center;
    background: var(--panel);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-md);
  }
  .leads-empty-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 6px;
  }
  .leads-empty-body {
    font-size: 13px;
    color: var(--text-secondary);
    max-width: 440px;
    margin: 0 auto;
    line-height: 1.55;
  }

  /* ═══════════════════════════════════════════════════════════════
     LEADS — toggle + type-accent surface cues.
     Everything type-aware reads from --type-accent / --type-accent-bg /
     --type-accent-strong, which are set on the .leads mode-* root
     class. Flipping the toggle re-palettes the whole surface in one
     place. Shared primitives (pipeline-bar, filter-tabs, lead-card)
     stay neutral and are rendered by the same functions regardless.
     ═══════════════════════════════════════════════════════════════ */
  .leads {
    --type-accent:        var(--accent-blue);
    --type-accent-bg:     var(--blue-soft);
    --type-accent-strong: var(--accent-blue);
  }
  .leads.mode-seller {
    --type-accent:        #8C5A08;              /* amber-deep (readable) */
    --type-accent-bg:     var(--amber-soft);
    --type-accent-strong: var(--accent-amber);  /* vibrant for the strip */
  }

  /* 4px band at the very top. Visual commitment to "this surface is
     type-aware" — picks up the vibrant accent, not the text accent. */
  .leads .leads-topedge {
    height: 4px;
    background: var(--type-accent-strong);
    border-radius: 2px;
    margin-bottom: 14px;
  }

  /* Toggle row: compact pill + context chip on the same line. */
  .leads .leads-toggle-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  /* Compact segmented pill toggle. */
  .leads-toggle {
    display: inline-flex;
    background: var(--surface-tint);
    border-radius: var(--r-pill);
    padding: 3px;
    gap: 2px;
  }
  .leads-toggle-tab {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 14px;
    background: transparent;
    border: 0;
    border-radius: var(--r-pill);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    letter-spacing: -0.1px;
    white-space: nowrap;
    transition: background 120ms ease, color 120ms ease;
  }
  .leads-toggle-tab svg { width: 14px; height: 14px; opacity: 0.7; }
  .leads-toggle-tab:hover:not([aria-selected="true"]) { color: var(--text-primary); }
  .leads .leads-toggle-tab[aria-selected="true"] {
    background: var(--panel);
    color: var(--type-accent);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
  }
  .leads .leads-toggle-tab[aria-selected="true"] svg {
    opacity: 1;
    color: var(--type-accent);
  }

  /* Context chip: pill echoing the active type's palette.
     Sits next to the toggle; carries the raw type count in words. */
  .leads-context-chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 6px 12px;
    border-radius: var(--r-pill);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: -0.1px;
    white-space: nowrap;
  }
  .leads-context-chip svg {
    width: 12px;
    height: 12px;
    stroke-width: 2;
    flex-shrink: 0;
  }
  .leads .leads-context-chip {
    background: var(--type-accent-bg);

/* ═══════════════════════════════════════════════════════════════
   LEAD DATA HELPERS — pure lookups, no DOM. Used by the drawer header
   and by every Leads-page primitive that touches stage or type data.
   Kept here (between state and renderers) so any renderer can use them.
   ═══════════════════════════════════════════════════════════════ */

/* "buyer" → "Acquéreur", "seller" → "Vendeur". Falls back to the raw key. */
function typeLabel(typeKey) {
  return { buyer: "Acquéreur", seller: "Vendeur" }[typeKey] || typeKey;
}

/* Look up a stage label from the agency pipeline. "lost" is a terminal state
   outside the pipeline array — renders as "Perdu". Unknown ids fall back to
   the id itself so missing data is visible rather than silently blank. */
function stageLabel(typeKey, stageId) {
  if (stageId === "lost") return "Perdu";
  const pipeline = state.agency.pipeline[typeKey] || [];
  const stage = pipeline.find(s => s.id === stageId);
  return stage ? stage.label : stageId;
}

/* Stage id → { bg, fg } pill colors. Values chosen to match DESIGN_SPEC §8
   status semantics (new = blue, progress = violet, qualified = green,
   converted = dark green, terminal-fail = red, amber for offer/mandate-signed).
   Buyer and seller stage ids share colors where the semantic matches
   ("contacted" same in both, "converted" ↔ "sold" both dark green, etc.).
   If the status CSS tokens get formalized in :root later, swap hex for var(). */
function stageColors(stageId) {
  return {
    // Buyer pipeline
    to_process:      { bg: "#E8ECFF", fg: "#5B6DFF" },  // blue — fresh
    contacted:       { bg: "#EDE7FF", fg: "#6D48DB" },  // violet — in motion
    qualified:       { bg: "#E4F4E9", fg: "#2F9D6F" },  // green — qualified
    visit_planned:   { bg: "#E8ECFF", fg: "#5B6DFF" },  // blue — progressing
    offer_made:      { bg: "#FBF0DC", fg: "#8C5A08" },  // amber — committed
    converted:       { bg: "#D8EEDF", fg: "#1F7D54" },  // dark green — won
    // Seller pipeline (shared where semantically equivalent)
    estimation_sent: { bg: "#EDE7FF", fg: "#6D48DB" },  // violet
    appointment:     { bg: "#E8ECFF", fg: "#5B6DFF" },  // blue
    mandate_signed:  { bg: "#FBF0DC", fg: "#8C5A08" },  // amber
    sold:            { bg: "#D8EEDF", fg: "#1F7D54" },  // dark green
    // Terminal
    lost:            { bg: "#FDE7E7", fg: "#C44343" },  // red
  }[stageId] || { bg: "#F4F4F6", fg: "#6E6B64" };       // fallback = neutral
}

/* Price field differs by type — buyers declare a budget range, sellers
   state an expected price. Both are pre-formatted strings with € suffix. */
function leadPrice(lead) {
  return lead.type === "seller" ? lead.expectedPrice : lead.budget;
}

/* Timeline likewise differs — buyer.timeline is purchase horizon,
   seller.sellingTimeline is listing horizon. */
function leadTimeline(lead) {
  return lead.type === "seller" ? lead.sellingTimeline : lead.timeline;
}

/**
 * Button primitive. Every clickable text-action uses this.
 * Icon-only buttons use `.icon-btn` directly (topbar plus/bell).
 *
 *   variant: "default" | "primary" | "ghost" | "danger"   (default: "default")
 *   size:    "sm" | "md" | "lg"                           (default: "md")
 *   block:   boolean — full-width                         (default: false)
 *   icon:    SVG string (from icon.*()) placed before label
 *   label:   button text
 *   action:  data-action value to dispatch on click
 *   disabled: boolean
 *   extra:   additional class names (rare)
 */
function renderButton({ variant = "default", size = "md", block = false, icon = "", label = "", action = "", disabled = false, extra = "" } = {}) {
  const classes = [
    "btn",
    variant !== "default" && `btn--${variant}`,
    size !== "md" && `btn--${size}`,
    block && "btn--block",
    extra,
  ].filter(Boolean).join(" ");
  const attrs = [
    `class="${classes}"`,
    action ? `data-action="${action}"` : "",
    disabled ? `disabled aria-disabled="true"` : "",
  ].filter(Boolean).join(" ");
  return `<button ${attrs}>${icon}${label ? `<span>${label}</span>` : ""}</button>`;
}

/* ───── Leads content (Step 2 Layer 1) ─────
   Route "leads" renders the Leads page. Every primitive below is
   data-driven off state + the helpers defined earlier (stageLabel,
   stageColors, typeLabel, leadPrice, leadTimeline). */

/* Single source of truth for the filtered view. Returns the visible leads
   plus the counts used by the context chip, pipeline bar, and filter tabs.

   Counts discipline:
   - typeCounts    = raw totals per type, ignoring search. Powers the
                     context chip so "10 acquéreurs actifs / 3 vendeurs
                     actifs" reads the honest volume even mid-search.
   - stageCounts   = per-stage counts within current type + search. Powers
                     both the pipeline bar and the filter tabs. Counts stay
                     stable as the user clicks between tabs.
   - lostCount     = same scope as stageCounts but for the terminal "lost".
   - totalFiltered = type + search filtered total; shown in "Tous" tab. */
function computeLeadsView() {
  const type     = state.leadType;
  const pipeline = state.agency.pipeline[type] || [];
  const search   = state.leadsSearch.trim().toLowerCase();

  // Raw per-type totals (ignore search — context chip must read true volume).
  const typeCounts = {
    buyer:  state.leads.filter(l => l.type === "buyer").length,
    seller: state.leads.filter(l => l.type === "seller").length,
  };

  // Apply type + search to get the set all tab/pipeline counts are based on.
  const baseFiltered = state.leads.filter(l => {
    if (l.type !== type) return false;
    if (!search) return true;
    const hay = `${l.name} ${l.email} ${l.zone || ""}`.toLowerCase();
    return hay.includes(search);
  });

  // Count per stage id, plus terminal "lost".
  const stageCounts = {};
  pipeline.forEach(s => { stageCounts[s.id] = 0; });
  let lostCount = 0;
  baseFiltered.forEach(l => {
    if (l.status === "lost") lostCount++;
    else if (stageCounts[l.status] !== undefined) stageCounts[l.status]++;
  });

  // Apply filter tab on top of the base set.
  const visible = baseFiltered.filter(l => {
    if (state.filterTab === "all")  return true;
    if (state.filterTab === "lost") return l.status === "lost";
    return l.status === state.filterTab;
  });

  return {
    visible,
    pipeline,
    type,
    search,
    counts: { stageCounts, lostCount, totalFiltered: baseFiltered.length, typeCounts },
  };
}

/* Compact segmented pill toggle. Active option's text + icon recolor via
   --type-accent (set on the .leads parent's mode-buyer / mode-seller class,
   so the whole surface re-palettes in one place when the toggle flips). */
function renderLeadsToggle() {
  const opt = (typeKey, iconKey, label) => {
    const active = state.leadType === typeKey;
    return `
      <button class="leads-toggle-tab"
              role="tab"
              aria-selected="${active}"
              data-action="set-lead-type"
              data-type="${typeKey}">
        ${icon[iconKey]()}
        <span>${label}</span>
      </button>
    `;
  };
  return `
    <div class="leads-toggle" role="tablist" aria-label="Type de lead">
      ${opt("buyer",  "home", "Acquéreurs")}
      ${opt("seller", "key",  "Vendeurs")}
    </div>
  `;
}

/* Context chip: shows raw active-type count in words. Lives next to the
   toggle so the type-aware signal reinforces the toggle rather than
   fighting it. Grammar handles singular/plural. */
function renderLeadsContextChip(typeKey, count) {
  const noun    = typeKey === "buyer" ? "acquéreur" : "vendeur";
  const plural  = count === 1 ? "" : "s";
  const adj     = count === 1 ? "actif" : "actifs";
  const iconKey = typeKey === "buyer" ? "home" : "key";
  return `
    <span class="leads-context-chip" aria-label="${count} ${noun}${plural} ${adj}">
      ${icon[iconKey]()}
      <span>${count} ${noun}${plural} ${adj}</span>
    </span>
  `;
}

/* In-page search. Distinct from topbar search (topbar is hidden on the
   Leads route via body[data-route="leads"] CSS — see §topbar-search
   suppression near the top of the stylesheet). Input events delegated. */
function renderLeadsSearch() {
  const value = state.leadsSearch.replace(/"/g, "&quot;");
  return `
    <div class="leads-search">
      ${icon.search()}
      <input type="text"
             placeholder="Rechercher par nom, email, zone…"
             aria-label="Rechercher dans les leads"
             value="${value}"
             data-action="filter-search"
             autocomplete="off" />
    </div>
  `;
}

/* Controls row between toggle and pipeline bar: meta on the left,
   page-level search on the right. "N leads visibles" reflects current view. */
function renderLeadsControlsRow(visibleCount) {
  return `
    <div class="leads-controls-row">
      <div class="leads-meta">${visibleCount} lead${visibleCount === 1 ? "" : "s"} visible${visibleCount === 1 ? "" : "s"} · mis à jour il y a 2 min</div>
      ${renderLeadsSearch()}
    </div>
  `;
}

/* Pipeline bar: one cell per stage in the active type's pipeline. Cells
   are clickable — they shortcut to set-filter-tab so clicking a stage
   highlights the matching tab below. Perdu and "all" are NOT in the bar —
   the bar is the happy-path progression; terminal and aggregate live in
   the filter tabs. */
function renderPipelineBar(pipeline, stageCounts, activeTab) {
  const cells = pipeline.map(stage => {
    const c = stageColors(stage.id);
    const n = stageCounts[stage.id] || 0;
    const active = activeTab === stage.id;
    return `
      <button class="pipeline-cell"
              data-action="set-filter-tab"
              data-tab-id="${stage.id}"
              aria-pressed="${active}"
              style="--cell-bg:${c.bg};--cell-fg:${c.fg};">
        <span class="pipeline-cell-label">${stage.label}</span>
        <span class="pipeline-cell-count">${n}</span>
      </button>
    `;
  }).join("");
  return `<div class="pipeline-bar" role="group" aria-label="Répartition par étape du pipeline">${cells}</div>`;
}

/* Filter tabs: Tous · [pipeline stages] · Perdu. Each shows a count of
   leads matching that bucket given current type + search (not current
   tab). Active tab is highlighted. */
function renderFilterTabs(pipeline, counts, activeTab) {
  const tab = (id, label, count) => {
    const active = activeTab === id;
    return `
      <button class="filter-tab"
              role="tab"
              aria-selected="${active}"
              data-action="set-filter-tab"
              data-tab-id="${id}">
        <span class="filter-tab-label">${label}</span>
        <span class="filter-tab-count">${count}</span>
      </button>
    `;
  };
  const stageTabs = pipeline.map(s => tab(s.id, s.label, counts.stageCounts[s.id] || 0)).join("");
  return `
    <div class="filter-tabs" role="tablist" aria-label="Filtrer par statut">
      ${tab("all",  "Tous",  counts.totalFiltered)}
      ${stageTabs}
      ${tab("lost", "Perdu", counts.lostCount)}
    </div>
  `;
}

/* Score chip: Chaud / Tiède / Froid with a colored dot. */
function renderScoreChip(score) {
  const map = {
    hot:  { label: "Chaud", mod: "hot"  },
    warm: { label: "Tiède", mod: "warm" },
    cold: { label: "Froid", mod: "cold" },
  };
  const m = map[score] || { label: score || "—", mod: "none" };
  return `<span class="score-chip score-chip--${m.mod}"><span class="score-chip-dot"></span>${m.label}</span>`;
}

/* Source icon: compact branded tile. Pure CSS + initial letter — we avoid
   shipping brand SVGs both for trademark hygiene and for a consistent
   visual weight across sources at 18px. */
function renderSourceIcon(source) {
  const map = {
    ig:     { char: "IG", title: "Instagram" },
    fb:     { char: "f",  title: "Facebook" },
    web:    { char: "◎",  title: "Site web" },
    email:  { char: "@",  title: "Email" },
    manual: { char: "+",  title: "Ajout manuel" },
  };
  const m = map[source] || { char: "?", title: source || "Inconnu" };
  return `<span class="source-icon source-icon--${source}" title="${m.title}" aria-label="Source : ${m.title}">${m.char}</span>`;
}

/* Lead card: click target for the drawer. Richer than the v0.6.2 shell
   card — previews roughly the data set the Step 2 Layer 2 table will
   show. Structure: avatar · primary column (name + email) · meta column
   (price + zone + timeline) · right cluster (source, score, status,
   verified, agent, date). Wraps gracefully on narrow widths. */
function renderLeadCard(lead) {
  const selected  = state.drawer?.leadId === lead.id;
  const sc        = stageColors(lead.status);
  const statusLbl = stageLabel(lead.type, lead.status);
  const agent     = lead.assignedAgentId != null
    ? state.team.find(t => t.id === lead.assignedAgentId)
    : null;
  const verified  = lead.phoneVerified
    ? `<span class="lead-verified" title="Téléphone vérifié" aria-label="Téléphone vérifié">${icon.check()}</span>`
    : `<span class="lead-verified lead-verified--off" title="Non vérifié" aria-label="Non vérifié">—</span>`;
  const agentCell = agent
    ? `<span class="lead-agent" title="${agent.name}">${renderAvatar(agent.initials, agent.tone, 22)}</span>`
    : `<span class="lead-agent lead-agent--none" title="Non assigné">—</span>`;

  return `
    <div class="lead-card"
         data-action="open-drawer"
         data-lead-id="${lead.id}"
         data-selected="${selected}"
         role="button" tabindex="0">
      <div class="lead-card-identity">
        ${renderAvatar(lead.initials, lead.tone, 36)}
        <div class="lead-card-identity-text">
          <div class="lead-card-name">${lead.name}</div>
          <div class="lead-card-email">${lead.email}</div>
        </div>
      </div>
      <div class="lead-card-meta">
        <div class="lead-card-price">${leadPrice(lead)}</div>
        <div class="lead-card-sub">${lead.zone} · ${leadTimeline(lead)}</div>
      </div>
      <div class="lead-card-signals">
        ${renderSourceIcon(lead.source)}
        ${renderScoreChip(lead.score)}
        <span class="status-pill" style="background:${sc.bg};color:${sc.fg};">${statusLbl}</span>
        ${verified}
        ${agentCell}
        <span class="lead-card-date">${lead.createdAt}</span>
      </div>
    </div>
  `;
}

/* Empty states. kind="no-sellers" when type=seller and no seller leads
   exist at all. kind="no-match" when filter + search returned nothing. */
function renderLeadsEmptyState(kind) {
  if (kind === "no-sellers") {
    return `
      <div class="leads-empty">
        <div class="leads-empty-title">Aucun vendeur pour l'instant</div>
        <div class="leads-empty-body">Les leads vendeurs arrivent via les formulaires Meta marqués « vendeur » ou par ajout manuel. Utilisez le bouton « + » en haut à droite pour saisir un vendeur.</div>
      </div>
    `;
  }
  return `
    <div class="leads-empty">
      <div class="leads-empty-title">Aucun résultat</div>
      <div class="leads-empty-body">Aucun lead ne correspond à ce filtre. Changez d'onglet, effacez la recherche, ou essayez un autre critère.</div>
    </div>
  `;
}

/* List of lead cards OR an empty state card. */
function renderLeadsList(view) {
  // "No sellers anywhere" takes priority over filter-no-match.
  if (view.type === "seller" && view.counts.typeCounts.seller === 0) {
    return `<div class="lead-card-stack">${renderLeadsEmptyState("no-sellers")}</div>`;
  }
  if (view.visible.length === 0) {
    return `<div class="lead-card-stack">${renderLeadsEmptyState("no-match")}</div>`;
  }
  return `<div class="lead-card-stack">${view.visible.map(renderLeadCard).join("")}</div>`;
}

/* Leads page composition. Wrapped in a .leads root that carries a
   mode-buyer or mode-seller class — every type-accent CSS rule reads
   from custom properties set by that class, so the whole surface
   re-palettes in one place when the user flips the toggle. */
function renderLeadsContent() {
  const view      = computeLeadsView();
  const modeClass = `mode-${state.leadType}`;
  const typeCount = view.counts.typeCounts[state.leadType];
  return `
    <div class="leads ${modeClass}">
      <div class="leads-topedge" aria-hidden="true"></div>
      <div class="leads-toggle-row">
        ${renderLeadsToggle()}
        ${renderLeadsContextChip(state.leadType, typeCount)}
      </div>
      ${renderLeadsControlsRow(view.visible.length)}
      ${renderPipelineBar(view.pipeline, view.counts.stageCounts, state.filterTab)}
      ${renderFilterTabs(view.pipeline, view.counts, state.filterTab)}
      ${renderLeadsList(view)}
    </div>
  `;
}

function renderContent() {
  return `
    <main class="content">
      ${renderRouteContent()}
    </main>
  `;
}

function renderRouteContent() {
  if (state.route === "leads") return renderLeadsContent();
  return renderRouteComingSoon();
}

function renderRouteComingSoon() {
  const labels = {
    dashboard: "Tableau de bord",
    agents:    "Agents",
    campaigns: "Campagnes",
    database:  "Database",
    settings:  "Paramètres",
    help:      "Aide",
  };
  const title = labels[state.route] || state.route;
  return `
    <div class="empty-state">
      <div class="empty-state-left">
        <div class="empty-state-title">${title}</div>
        <div class="empty-state-body">Page à construire. Cette section sera implémentée après l'étape 2 (Leads) et l'étape 3 (tiroir).</div>
      </div>
      <div class="empty-state-chip">v0.7.0</div>
    </div>
  `;
}

function isMobile() {
  // Matches the breakpoint used in the @media query at the bottom of <style>.
  return window.matchMedia("(max-width: 768px)").matches;
}

function renderDrawer() {
  // Mounted conditionally — only renders the DOM when state.drawer is set.
  // Sliding animation handled by the data-open attribute on the container.
  // Opened from the Leads page by clicking a lead card (data-action="open-drawer").
  if (!state.drawer) return "";
  const lead = state.leads.find(l => l.id === state.drawer.leadId);
  if (!lead) return "";
  const activeTab = state.drawer.tab;
  const tabs = [
    { id: "infos",         label: "Infos" },
    { id: "qualification", label: "Qualification" },
    { id: "activite",      label: "Activité" },
    { id: "notes",         label: "Notes" },
  ];
  const statusC = stageColors(lead.status);
  return `
    <aside class="drawer" data-open="true" role="dialog" aria-label="Détails du prospect">
      <div class="drawer-header">
        <div class="drawer-header-text">
          <div class="drawer-name">
            ${lead.name}
            <span class="drawer-badge" style="background:${statusC.bg};color:${statusC.fg};">${stageLabel(lead.type, lead.status)}</span>
          </div>
          <div class="drawer-meta">${leadPrice(lead)} · ${lead.zone} · ${typeLabel(lead.type)} · ${leadTimeline(lead)}</div>
        </div>
        <button class="icon-btn drawer-close" data-action="close-drawer" aria-label="Fermer">
          ${isMobile() ? icon.arrowLeft() : icon.close()}
        </button>
      </div>
      <div class="drawer-tabs" role="tablist">
        ${tabs.map(t => `
          <button class="drawer-tab"
                  role="tab"
                  aria-selected="${t.id === activeTab}"
                  data-action="switch-drawer-tab"
                  data-tab="${t.id}">${t.label}</button>
        `).join("")}
      </div>
      <div class="drawer-body" role="tabpanel">
        <div class="drawer-placeholder">
          <strong>Onglet « ${tabs.find(t => t.id === activeTab).label} »</strong>
          Contenu à venir — onglet construit à l'étape 3. Pour l'instant la structure, les transitions et les boundaries du tiroir sont opérationnelles.
        </div>
      </div>
      <div class="drawer-footer">
        ${renderButton({ icon: icon.phone(),         label: "Appeler" })}
        ${renderButton({ icon: icon.messageCircle(), label: "WhatsApp" })}
        ${renderButton({ icon: icon.send(),          label: "Template", variant: "primary" })}
      </div>
    </aside>
  `;
}

/* ───── Root render ───── */
function renderApp() {
  return `
    <div class="app-shell">
      ${renderSidebar()}
      <div class="main">
        ${renderTopbar()}
        ${renderContent()}
      </div>
    </div>
    <div class="mobile-overlay" data-visible="${state.sidebarOpen}"></div>
    ${renderDrawer()}
  `;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER + EVENT DELEGATION
   One render function. One event listener. All interactions route
   through data-action / data-route attributes.
   ═══════════════════════════════════════════════════════════════ */
function render() {
  document.getElementById("app").innerHTML = renderApp();
  // Reflect drawer state on body so mobile CSS can lock scroll.
  document.body.setAttribute("data-drawer-open", state.drawer ? "true" : "false");
  // Reflect active route on body. Used by route-scoped CSS (e.g. topbar
  // search suppression on Leads routes). Kept inside render() so state and
  // DOM stay in sync — same pragmatic pattern as the drawer attr above.
  document.body.setAttribute("data-route", state.route);
  // Sync browser tab title with current route.
  document.title = `${routeTitles[state.route] || "Open House"} · Open House Prospects`;
}

document.addEventListener("click", (e) => {
  // Outside-click closes the agency switcher
  if (state.agencySwitcherOpen && !e.target.closest(".agency-switcher-wrap")) {
    setState({ agencySwitcherOpen: false });
    // fall through so other handlers can still react
  }

  // Outside-click closes the user menu
  if (state.userMenuOpen && !e.target.closest(".user-menu-wrap")) {
    setState({ userMenuOpen: false });
  }

  const target = e.target.closest("[data-action], [data-route]");
  if (!target) return;

  // Nav
  const route = target.getAttribute("data-route");
  if (route) {
    setState({
      route,
      sidebarOpen: false,
      agencySwitcherOpen: false,
      userMenuOpen: false,
    });
    return;
  }

  // Actions
  const action = target.getAttribute("data-action");
  switch (action) {
    case "toggle-darkmode":
      setState({ darkMode: !state.darkMode });
      break;
    case "open-sidebar":
      setState({ sidebarOpen: true });
      break;
    case "toggle-agency-switcher":
      setState({ agencySwitcherOpen: !state.agencySwitcherOpen, userMenuOpen: false });
      break;
    case "toggle-user-menu":
      setState({ userMenuOpen: !state.userMenuOpen, agencySwitcherOpen: false });
      break;
    case "select-city": {
      const cityId = Number(target.getAttribute("data-city-id"));
      setState({
        agency: { ...state.agency, currentCityId: cityId },
        agencySwitcherOpen: false,
      });
      break;
    }
    case "go-profile":
    case "go-preferences":
    case "go-help":
      // Stubs — will route to the right page when those pages exist
      setState({ userMenuOpen: false });
      break;
    case "logout":
      // Stub — real logout posts to /api/auth/logout on the Express backend later
      setState({ userMenuOpen: false });
      break;
    case "add-lead":
      // Stub — opens the "Ajouter un prospect" modal. Form built after Step 2.
      alert("Ajouter un prospect — à venir. Construit après l'étape 2.");
      break;
    case "open-drawer": {
      const leadId = Number(target.getAttribute("data-lead-id"));
      // If clicking the same lead that's open, close. If clicking a different one, swap.
      if (state.drawer?.leadId === leadId) {
        setState({ drawer: null });
      } else {
        setState({ drawer: { leadId, tab: "infos" } });
      }
      break;
    }
    case "close-drawer":
      setState({ drawer: null });
      break;
    case "switch-drawer-tab": {
      const tab = target.getAttribute("data-tab");
      setState({ drawer: { ...state.drawer, tab } });
      break;
    }
    case "set-lead-type": {
      // Toggle Acquéreurs ↔ Vendeurs. Always reset filterTab to "all" — stage
      // ids aren't guaranteed to exist across types (e.g. "visit_planned" is
      // buyer-only), so carrying an active tab across a type flip risks an
      // active filter that matches nothing.
      const typeKey = target.getAttribute("data-type");
      if (typeKey === state.leadType) break;  // no-op if clicking the active tab
      setState({ leadType: typeKey, filterTab: "all" });
      break;
    }
    case "set-filter-tab": {
      const tabId = target.getAttribute("data-tab-id");
      if (tabId === state.filterTab) break;
      setState({ filterTab: tabId });
      break;
    }
    case "filter-search":
      // Bubbled by input events via the delegated input listener below.
      // Mouse-clicking the input field also fires click; ignore here.
      break;
  }
});

// Close mobile sidebar on overlay click
document.addEventListener("click", (e) => {
  if (e.target.classList.contains("mobile-overlay")) {
    setState({ sidebarOpen: false });
  }
});

/* Delegated input listener for the Leads-page search. State drives render,
   so every keystroke re-renders the whole app — including the input. That
   would lose focus and cursor position mid-typing. We capture both before
   setState and restore them after it synchronously rebuilds the DOM. */
document.addEventListener("input", (e) => {
  const target = e.target.closest("[data-action='filter-search']");
  if (!target) return;
  const value     = target.value;
  const cursorPos = target.selectionStart ?? value.length;
  setState({ leadsSearch: value });
  const next = document.querySelector("[data-action='filter-search']");
  if (next) {
    next.focus();
    try { next.setSelectionRange(cursorPos, cursorPos); } catch (_) { /* no-op on unsupported inputs */ }
  }
});

/* ESC key closes open drawers and dropdowns */
document.addEventListener("keydown", (e) => {
  if (e.key !== "Escape") return;
  if (state.drawer)              { setState({ drawer: null });             return; }
  if (state.userMenuOpen)        { setState({ userMenuOpen: false });      return; }
  if (state.agencySwitcherOpen)  { setState({ agencySwitcherOpen: false });return; }
  if (state.sidebarOpen)         { setState({ sidebarOpen: false });       return; }
});

/* Scroll-aware topbar: add a subtle bottom border once content scrolls under it */
let scrolledState = false;
window.addEventListener("scroll", () => {
  const scrolled = window.scrollY > 4;
  if (scrolled !== scrolledState) {
    scrolledState = scrolled;
    const topbar = document.querySelector(".topbar");
    if (topbar) topbar.setAttribute("data-scrolled", scrolled ? "true" : "false");
  }
}, { passive: true });

/* Re-render across the mobile breakpoint so the drawer close button
   swaps between X (desktop) and back-arrow (mobile) on window resize. */
let wasMobile = isMobile();
window.addEventListener("resize", () => {
  const nowMobile = isMobile();
  if (nowMobile !== wasMobile) {
    wasMobile = nowMobile;
    if (state.drawer) render();
  }
}, { passive: true });

/* Initial render */
render();
</script>

</body>
</html>
